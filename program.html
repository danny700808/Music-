<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>夏至狂響曲｜節目單</title>
  <style>
    :root{--bg:#070707;--text:#fffaf0;--muted:rgba(255,250,240,.72);--gold:#f0d58a;--line:rgba(255,255,255,.16)}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;}
    body{min-height:100svh;background:linear-gradient(180deg,#050505,#15100a 52%,#050505);overflow-x:hidden;}
    header{position:sticky;top:0;z-index:10;padding:12px 14px;background:linear-gradient(180deg,rgba(0,0,0,.92),rgba(0,0,0,.65));backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)}
    .topbar{max-width:920px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .title{min-width:0}.title strong{display:block;font-size:18px;letter-spacing:.08em;color:var(--gold)}
    .home{flex:0 0 auto;text-decoration:none;color:#20160a;background:linear-gradient(135deg,#f0d58a,#b98d3f);font-weight:800;border-radius:999px;padding:10px 14px;font-size:14px;box-shadow:0 8px 22px rgba(0,0,0,.25)}
    main{max-width:920px;margin:0 auto;padding:18px 14px 110px;text-align:center;}
    .viewer{position:relative;width:100%;touch-action:pan-y;}
    .pagebox{width:min(100%,720px);margin:0 auto;border-radius:20px;overflow:hidden;background:rgba(255,255,255,.06);border:1px solid rgba(240,213,138,.25);box-shadow:0 18px 52px rgba(0,0,0,.42);}
    .pagebox img{display:block;width:100%;height:auto;max-height:calc(100svh - 160px);object-fit:contain;background:#111;}
    .dots{display:flex;justify-content:center;flex-wrap:wrap;gap:7px;margin:10px auto 0;}
    .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.28);border:0;padding:0}.dot.active{background:var(--gold);transform:scale(1.25)}
    .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(0deg,rgba(0,0,0,.94),rgba(0,0,0,.62),transparent);}
    .bottom-inner{max-width:520px;margin:0 auto;display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;}
    .navbtn,.home2{border:1px solid var(--line);background:rgba(255,255,255,.12);color:var(--text);border-radius:16px;padding:13px 14px;font-size:15px;font-weight:800;text-decoration:none;min-height:48px;display:grid;place-items:center;-webkit-tap-highlight-color:transparent;}
    .navbtn:active,.home2:active{transform:scale(.985)}
    .count{color:var(--gold);font-size:13px;font-weight:800;min-width:54px;text-align:center;}
    .empty{padding:28px 18px;color:var(--muted);line-height:1.7;}
    @media (min-width:780px){main{padding-bottom:120px}.navbtn{font-size:16px}.pagebox{border-radius:24px}}
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="title"><strong>節目單</strong></div>
      <a class="home" href="index.html?v=10">回主頁</a>
    </div>
  </header>

  <main>
    <section class="viewer" id="viewer" aria-live="polite">
      <div class="pagebox" id="pagebox">
        <img id="pageImage" src="page01.jpg" alt="節目單第 1 頁" />
      </div>
      <div class="dots" id="dots" aria-label="頁碼指示"></div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="節目單翻頁">
    <div class="bottom-inner">
      <button class="navbtn" type="button" id="prevBtn">‹ 上一頁</button>
      <div class="count" id="count">1 / 8</div>
      <button class="navbtn" type="button" id="nextBtn">下一頁 ›</button>
    </div>
    <div style="max-width:520px;margin:10px auto 0;">
      <a class="home2" href="index.html?v=10">回主頁</a>
    </div>
  </nav>

  <script>
    const pages = [
      { src: 'page01.jpg', label: '第 1 頁' },
      { src: 'page02.jpg', label: '第 2 頁' },
      { src: 'page03.jpg', label: '第 3 頁' },
      { src: 'page04.jpg', label: '第 4 頁' },
      { src: 'page05.jpg', label: '第 5 頁' },
      { src: 'page06.jpg', label: '第 6 頁' },
      { src: 'page07.jpg', label: '第 7 頁' },
      { src: 'page08.jpg', label: '第 8 頁' }
    ];

    let index = 0;
    const img = document.getElementById('pageImage');
    const count = document.getElementById('count');
    const dots = document.getElementById('dots');
    const pagebox = document.getElementById('pagebox');

    pages.forEach((_, i) => {
      const b = document.createElement('button');
      b.className = 'dot';
      b.type = 'button';
      b.setAttribute('aria-label', `前往第 ${i + 1} 頁`);
      b.addEventListener('click', () => show(i));
      dots.appendChild(b);
    });

    function show(i){
      index = (i + pages.length) % pages.length;
      img.src = pages[index].src;
      img.alt = `節目單${pages[index].label}`;
      count.textContent = `${index + 1} / ${pages.length}`;
      [...dots.children].forEach((d, n) => d.classList.toggle('active', n === index));
    }

    img.onerror = function(){
      pagebox.innerHTML = '<div class="empty">找不到這一頁圖片。請確認 GitHub 裡是否有 page01.jpg 到 page08.jpg。</div>';
    };

    document.getElementById('prevBtn').addEventListener('click', () => show(index - 1));
    document.getElementById('nextBtn').addEventListener('click', () => show(index + 1));
    document.addEventListener('keydown', (e) => {
      if(e.key === 'ArrowLeft') show(index - 1);
      if(e.key === 'ArrowRight') show(index + 1);
    });

    let startX = 0;
    let startY = 0;
    const viewer = document.getElementById('viewer');
    viewer.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });
    viewer.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if(Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy) * 1.2){
        if(dx < 0) show(index + 1);
        else show(index - 1);
      }
    }, { passive: true });

    show(0);
  </script>
</body>
</html>
