<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>夏至狂響曲｜節目單</title>
  <style>
    :root {
      --bg: #060606;
      --text: #fffaf0;
      --gold: #f0d58a;
      --line: rgba(255,255,255,.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }

    body {
      min-height: 100svh;
      background: linear-gradient(180deg, #050505, #15100a 52%, #050505);
      overflow-x: hidden;
    }

    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 16px 14px 118px;
      text-align: center;
    }

    .viewer {
      position: relative;
      width: 100%;
      touch-action: pan-y;
    }

    .pagebox {
      width: min(100%, 720px);
      margin: 0 auto;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(240,213,138,.25);
      box-shadow: 0 18px 52px rgba(0,0,0,.42);
    }

    .pagebox img {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(100svh - 138px);
      object-fit: contain;
      background: #111;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(0deg, rgba(0,0,0,.96), rgba(0,0,0,.72), transparent);
    }

    .bottom-inner {
      max-width: 520px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
    }

    .navbtn,
    .home {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.12);
      color: var(--text);
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 15px;
      font-weight: 900;
      text-decoration: none;
      min-height: 48px;
      display: grid;
      place-items: center;
      -webkit-tap-highlight-color: transparent;
    }

    .navbtn:active,
    .home:active {
      transform: scale(.985);
    }

    .count {
      color: var(--gold);
      font-size: 14px;
      font-weight: 900;
      min-width: 58px;
      text-align: center;
    }

    .home-wrap {
      max-width: 520px;
      margin: 10px auto 0;
    }

    .empty {
      padding: 28px 18px;
      color: rgba(255,255,255,.72);
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main>
    <section class="viewer" id="viewer" aria-live="polite">
      <div class="pagebox" id="pagebox">
        <img id="pageImage" src="page01.jpg?v=20260608d" alt="節目單第 1 頁" />
      </div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="節目單翻頁">
    <div class="bottom-inner">
      <button class="navbtn" type="button" id="prevBtn">‹ 上一頁</button>
      <div class="count" id="count">1 / 8</div>
      <button class="navbtn" type="button" id="nextBtn">下一頁 ›</button>
    </div>
    <div class="home-wrap">
      <a class="home" href="index.html?v=10">回主頁</a>
    </div>
  </nav>

  <script>
    const pages = [
      { src: 'page01.jpg?v=20260608d', label: '第 1 頁' },
      { src: 'page02.jpg?v=20260608d', label: '第 2 頁' },
      { src: 'page03.jpg?v=20260608d', label: '第 3 頁' },
      { src: 'page04.jpg?v=20260608d', label: '第 4 頁' },
      { src: 'page05.jpg?v=20260608d', label: '第 5 頁' },
      { src: 'page06.jpg?v=20260608d', label: '第 6 頁' },
      { src: 'page07.jpg?v=20260608d', label: '第 7 頁' },
      { src: 'page08.jpg?v=20260608d', label: '第 8 頁' }
    ];

    let index = 0;
    const img = document.getElementById('pageImage');
    const count = document.getElementById('count');
    const pagebox = document.getElementById('pagebox');

    function show(i) {
      index = (i + pages.length) % pages.length;
      img.src = pages[index].src;
      img.alt = `節目單${pages[index].label}`;
      count.textContent = `${index + 1} / ${pages.length}`;
    }

    img.onerror = function() {
      pagebox.innerHTML = '<div class="empty">找不到這一頁圖片。請確認 GitHub 裡是否有 page01.jpg 到 page08.jpg。</div>';
    };

    document.getElementById('prevBtn').addEventListener('click', () => show(index - 1));
    document.getElementById('nextBtn').addEventListener('click', () => show(index + 1));

    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft') show(index - 1);
      if (event.key === 'ArrowRight') show(index + 1);
    });

    let startX = 0;
    let startY = 0;
    const viewer = document.getElementById('viewer');

    viewer.addEventListener('touchstart', (event) => {
      startX = event.touches[0].clientX;
      startY = event.touches[0].clientY;
    }, { passive: true });

    viewer.addEventListener('touchend', (event) => {
      const dx = event.changedTouches[0].clientX - startX;
      const dy = event.changedTouches[0].clientY - startY;

      if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy) * 1.2) {
        if (dx < 0) show(index + 1);
        else show(index - 1);
      }
    }, { passive: true });

    show(0);
  </script>
</body>
</html>
