<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>節目單</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #05090d;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 520px;
      min-height: 100vh;
      background: #05090d;
      overflow: hidden;
    }

    .top-label {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 7px 16px;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 999px;
      background: rgba(5, 9, 13, 0.58);
      color: rgba(255,255,255,0.9);
      font-size: 15px;
      letter-spacing: 0.08em;
      backdrop-filter: blur(6px);
    }

    .viewer {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      touch-action: pan-y;
    }

    .track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.38s ease;
    }

    .slide {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #05090d;
      position: relative;
    }

    .slide img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      background: #05090d;
    }

    .nav-btn {
      position: fixed;
      top: 51%;
      z-index: 30;
      width: 58px;
      height: 58px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(5,9,13,0.55);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 500;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(5px);
      user-select: none;
    }

    .nav-btn.left {
      left: 14px;
    }

    .nav-btn.right {
      right: 14px;
    }

    .nav-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }

    .bottom-hint {
      position: fixed;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      z-index: 25;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(5, 9, 13, 0.58);
      color: rgba(255,255,255,0.9);
      font-size: 15px;
      letter-spacing: 0.06em;
      backdrop-filter: blur(5px);
      white-space: nowrap;
    }

    .fallback {
      color: #fff;
      text-align: center;
      padding: 30px;
      font-size: 16px;
      line-height: 1.7;
      word-break: break-all;
    }

    @media (max-width: 390px) {
      .nav-btn {
        width: 52px;
        height: 52px;
        font-size: 38px;
      }

      .nav-btn.left {
        left: 10px;
      }

      .nav-btn.right {
        right: 10px;
      }

      .bottom-hint {
        bottom: 22px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top-label" id="pageLabel">封面</div>

    <section class="viewer" id="viewer">
      <div class="track" id="track"></div>
    </section>

    <button class="nav-btn left" id="prevBtn" type="button" aria-label="上一頁">‹</button>
    <button class="nav-btn right" id="nextBtn" type="button" aria-label="下一頁">›</button>
    <div class="bottom-hint">左右滑動查看節目</div>
  </main>

  <script>
    // 使用你 GitHub 現有檔案，不需要重新上傳圖片。
    // 第一張封面就是 cover.jpg，不再用黑底大字封面蓋住它。
    const VERSION = "20260608-2120";

    const pages = [
      { file: "cover.jpg", label: "封面" },
      { file: "page01.jpg", label: "第 1 頁" },
      { file: "page02.jpg", label: "第 2 頁" },
      { file: "page03.jpg", label: "第 3 頁" },
      { file: "page04.jpg", label: "第 4 頁" },
      { file: "page05.jpg", label: "第 5 頁" },
      { file: "page06.jpg", label: "第 6 頁" },
      { file: "page07.jpg", label: "第 7 頁" },
      { file: "page08.jpg", label: "第 8 頁" }
    ];

    const track = document.getElementById("track");
    const viewer = document.getElementById("viewer");
    const pageLabel = document.getElementById("pageLabel");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    let current = 0;
    let startX = 0;
    let currentX = 0;
    let isDragging = false;

    function assetUrl(file) {
      return "./" + file + "?v=" + VERSION;
    }

    function buildSlides() {
      track.innerHTML = "";

      pages.forEach((item, index) => {
        const slide = document.createElement("div");
        slide.className = "slide";

        const img = document.createElement("img");
        img.src = assetUrl(item.file);
        img.alt = item.label;
        img.loading = index === 0 ? "eager" : "lazy";

        img.onerror = () => {
          slide.innerHTML = `
            <div class="fallback">
              圖片讀取失敗<br>
              檔名：${item.file}<br>
              請測試網址最後加：/${item.file}
            </div>
          `;
        };

        slide.appendChild(img);
        track.appendChild(slide);
      });

      update();
    }

    function update() {
      track.style.transform = `translateX(${-current * 100}%)`;
      pageLabel.textContent = pages[current].label;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === pages.length - 1;
    }

    function goTo(index) {
      current = Math.max(0, Math.min(index, pages.length - 1));
      update();
    }

    prevBtn.addEventListener("click", () => goTo(current - 1));
    nextBtn.addEventListener("click", () => goTo(current + 1));

    viewer.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
      currentX = startX;
      isDragging = true;
    }, { passive: true });

    viewer.addEventListener("touchmove", (e) => {
      if (!isDragging) return;
      currentX = e.touches[0].clientX;
    }, { passive: true });

    viewer.addEventListener("touchend", () => {
      if (!isDragging) return;
      const diff = currentX - startX;

      if (Math.abs(diff) > 55) {
        if (diff < 0) {
          goTo(current + 1);
        } else {
          goTo(current - 1);
        }
      }

      isDragging = false;
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") goTo(current - 1);
      if (e.key === "ArrowRight") goTo(current + 1);
    });

    buildSlides();
  </script>
</body>
</html>
