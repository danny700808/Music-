<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>夏至狂響曲｜節目單</title>
  <style>
    :root{--bg:#071018;--gold:#f7d878;--white:#fff;--muted:rgba(255,255,255,.72);}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;overflow:hidden}
    .app{position:fixed;inset:0;background:#05090e;color:#fff;touch-action:pan-y}
    .page{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateX(18px);transition:.28s ease;pointer-events:none}
    .page.active{opacity:1;transform:translateX(0);pointer-events:auto}
    .page img{max-width:100vw;max-height:100vh;width:auto;height:auto;display:block;object-fit:contain}
    .cover img{width:100vw;height:100vh;max-width:none;max-height:none;object-fit:cover}
    .shade{position:absolute;left:0;right:0;bottom:0;height:38vh;background:linear-gradient(0deg,rgba(0,0,0,.82),rgba(0,0,0,.48),rgba(0,0,0,0));pointer-events:none}
    .coverText{position:absolute;left:0;right:0;bottom:56px;text-align:center;padding:0 24px;z-index:2}
    .title{display:inline-block;font-size:52px;letter-spacing:.16em;font-weight:900;color:#ffe8a3;text-shadow:0 3px 12px #000;margin:0 auto 12px;border-top:1px solid rgba(247,216,120,.8);border-bottom:1px solid rgba(247,216,120,.8);padding:6px 16px}
    .hint{font-size:16px;color:var(--muted);letter-spacing:.12em;margin-top:8px}
    .swipeIcon{font-size:34px;color:#fff;margin-top:12px;opacity:.9}
    .tap{position:absolute;top:0;bottom:0;width:34%;z-index:5;border:0;background:transparent;color:transparent}
    .tap.left{left:0}.tap.right{right:0}
    .arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:6;width:48px;height:48px;border-radius:999px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:34px;line-height:44px;text-align:center;backdrop-filter:blur(4px)}
    .arrow.left{left:12px}.arrow.right{right:12px}
    .dots{position:absolute;left:0;right:0;bottom:18px;display:flex;gap:8px;justify-content:center;z-index:8}
    .dot{width:8px;height:8px;border-radius:999px;background:rgba(255,255,255,.38)}
    .dot.active{background:#fff;width:22px}
    .counter{position:absolute;top:calc(env(safe-area-inset-top) + 12px);left:50%;transform:translateX(-50%);z-index:8;background:rgba(0,0,0,.36);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:6px 12px;font-size:13px;color:rgba(255,255,255,.86);backdrop-filter:blur(4px)}
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="page cover active"><img src="assets/cover.jpg" alt="節目單封面"><div class="shade"></div><div class="coverText"><div class="title">節目單</div><div class="hint">左右滑動查看節目</div><div class="swipeIcon">← ☝ →</div></div></section>
    <section class="page"><img src="assets/page01.jpg" alt="第 1 頁"></section>
    <section class="page"><img src="assets/page02.jpg" alt="第 2 頁"></section>
    <section class="page"><img src="assets/page03.jpg" alt="第 3 頁"></section>
    <section class="page"><img src="assets/page04.jpg" alt="第 4 頁"></section>
    <section class="page"><img src="assets/page05.jpg" alt="第 5 頁"></section>
    <section class="page"><img src="assets/page06.jpg" alt="第 6 頁"></section>
    <section class="page"><img src="assets/page07.jpg" alt="第 7 頁"></section>
    <section class="page"><img src="assets/page08.jpg" alt="第 8 頁"></section>
    <button class="tap left" id="prevTap" aria-label="上一頁"></button>
    <button class="tap right" id="nextTap" aria-label="下一頁"></button>
    <div class="arrow left">‹</div><div class="arrow right">›</div>
    <div class="counter" id="counter">封面</div>
    <div class="dots" id="dots"></div>
  </main>
  <script>
    const pages=[...document.querySelectorAll('.page')], dots=document.getElementById('dots'), counter=document.getElementById('counter');
    let idx=0, startX=0, endX=0;
    pages.forEach((_,i)=>{const d=document.createElement('span');d.className='dot'+(i===0?' active':'');dots.appendChild(d)});
    function show(n){idx=Math.max(0,Math.min(pages.length-1,n));pages.forEach((p,i)=>p.classList.toggle('active',i===idx));[...dots.children].forEach((d,i)=>d.classList.toggle('active',i===idx));counter.textContent=idx===0?'封面':`第 ${idx} / 8 頁`}
    function next(){show(idx+1)} function prev(){show(idx-1)}
    document.getElementById('nextTap').onclick=next; document.getElementById('prevTap').onclick=prev;
    document.addEventListener('touchstart',e=>{startX=e.changedTouches[0].clientX},{passive:true});
    document.addEventListener('touchend',e=>{endX=e.changedTouches[0].clientX; const dx=endX-startX; if(Math.abs(dx)>45){dx<0?next():prev()}},{passive:true});
    document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next(); if(e.key==='ArrowLeft')prev()});
  </script>
</body>
</html>
