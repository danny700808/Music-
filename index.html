<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>節目單</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #05090d;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 520px;
      min-height: 100vh;
      background: #05090d;
      overflow: hidden;
    }

    .top-label {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 8px 18px;
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 999px;
      background: rgba(5, 9, 13, 0.56);
      color: rgba(255,255,255,0.92);
      font-size: 15px;
      letter-spacing: 0.08em;
      backdrop-filter: blur(6px);
      white-space: nowrap;
    }

    .viewer {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      touch-action: pan-y;
    }

    .track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.38s ease;
    }

    .slide {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #05090d;
      position: relative;
      padding: 0;
    }

    .slide img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      background: #05090d;
    }

    /* 底部控制列：不再把箭頭放在左右中間，避免擋住封面文字 */
    .bottom-controls {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(5, 9, 13, 0.68);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.24);
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      user-select: none;
    }

    .nav-btn:disabled {
      opacity: 0.32;
      cursor: default;
    }

    .hint-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 110px;
      padding: 0 2px;
      color: rgba(255,255,255,0.92);
      line-height: 1.2;
    }

    .hint-main {
      font-size: 14px;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .hint-sub {
      margin-top: 3px;
      font-size: 11px;
      color: rgba(255,255,255,0.62);
      white-space: nowrap;
    }

    .fallback {
      color: #fff;
      text-align: center;
      padding: 30px;
      font-size: 16px;
      line-height: 1.7;
      word-break: break-all;
    }

    @media (max-width: 520px) {
      .top-label {
        top: 16px;
      }

      .bottom-controls {
        bottom: max(18px, env(safe-area-inset-bottom));
        width: calc(100% - 24px);
        max-width: 360px;
        justify-content: space-between;
      }

      .nav-btn {
        width: 46px;
        height: 46px;
        font-size: 27px;
      }

      .hint-main {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top-label" id="pageLabel">封面</div>

    <section class="viewer" id="viewer">
      <div class="track" id="track"></div>
    </section>

    <div class="bottom-controls">
      <button class="nav-btn" id="prevBtn" type="button" aria-label="上一頁">‹</button>
      <div class="hint-wrap">
        <div class="hint-main">左右滑動查看</div>
        <div class="hint-sub">也可按左右按鈕換頁</div>
      </div>
      <button class="nav-btn" id="nextBtn" type="button" aria-label="下一頁">›</button>
    </div>
  </main>

  <script>
    const VERSION = "20260608-2148";

    const pages = [
      { file: "cover.jpg", label: "封面" },
      { file: "page01.jpg", label: "第 1 頁" },
      { file: "page02.jpg", label: "第 2 頁" },
      { file: "page03.jpg", label: "第 3 頁" },
      { file: "page04.jpg", label: "第 4 頁" },
      { file: "page05.jpg", label: "第 5 頁" },
      { file: "page06.jpg", label: "第 6 頁" },
      { file: "page07.jpg", label: "第 7 頁" },
      { file: "page08.jpg", label: "第 8 頁" }
    ];

    const track = document.getElementById("track");
    const viewer = document.getElementById("viewer");
    const pageLabel = document.getElementById("pageLabel");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    let current = 0;
    let startX = 0;
    let currentX = 0;
    let isDragging = false;

    function assetUrl(file) {
      return "./" + file + "?v=" + VERSION;
    }

    function buildSlides() {
      track.innerHTML = "";

      pages.forEach((item) => {
        const slide = document.createElement("div");
        slide.className = "slide";

        const img = document.createElement("img");
        img.src = assetUrl(item.file);
        img.alt = item.label;
        img.loading = item.file === "cover.jpg" ? "eager" : "lazy";

        img.onerror = () => {
          slide.innerHTML = `
            <div class="fallback">
              圖片讀取失敗<br>
              檔名：${item.file}
            </div>
          `;
        };

        slide.appendChild(img);
        track.appendChild(slide);
      });

      update();
    }

    function update() {
      track.style.transform = `translateX(${-current * 100}%)`;
      pageLabel.textContent = pages[current].label;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === pages.length - 1;
    }

    function goTo(index) {
      current = Math.max(0, Math.min(index, pages.length - 1));
      update();
    }

    prevBtn.addEventListener("click", () => goTo(current - 1));
    nextBtn.addEventListener("click", () => goTo(current + 1));

    viewer.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
      currentX = startX;
      isDragging = true;
    }, { passive: true });

    viewer.addEventListener("touchmove", (e) => {
      if (!isDragging) return;
      currentX = e.touches[0].clientX;
    }, { passive: true });

    viewer.addEventListener("touchend", () => {
      if (!isDragging) return;
      const diff = currentX - startX;

      if (Math.abs(diff) > 55) {
        if (diff < 0) {
          goTo(current + 1);
        } else {
          goTo(current - 1);
        }
      }

      isDragging = false;
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") goTo(current - 1);
      if (e.key === "ArrowRight") goTo(current + 1);
    });

    buildSlides();
  </script>
</body>
</html>
