<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>節目單｜入口</title>
  <style>
    :root{
      --bg:#070707;
      --card:rgba(255,255,255,.075);
      --card2:rgba(255,255,255,.11);
      --gold:#d7b56d;
      --gold2:#fff1bd;
      --text:#fffaf0;
      --muted:rgba(255,250,240,.72);
      --line:rgba(255,255,255,.16);
      --shadow:0 22px 70px rgba(0,0,0,.52);
    }
    *{box-sizing:border-box;}
    html,body{margin:0;min-height:100%;}
    body{
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 16% 10%, rgba(215,181,109,.22), transparent 28%),
        radial-gradient(circle at 86% 14%, rgba(255,255,255,.10), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(215,181,109,.13), transparent 34%),
        linear-gradient(180deg,#111 0%,#050505 100%);
      overflow-x:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.026) 1px, transparent 1px);
      background-size:34px 34px;
      mask-image:linear-gradient(180deg,rgba(0,0,0,.82),transparent 78%);
    }
    .page{
      position:relative;
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 18px max(28px, env(safe-area-inset-bottom));
    }
    .panel{
      width:min(460px,100%);
      border:1px solid var(--line);
      border-radius:34px;
      background:linear-gradient(180deg,rgba(255,255,255,.11),rgba(255,255,255,.055));
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      padding:26px 20px 22px;
      text-align:center;
      overflow:hidden;
      position:relative;
    }
    .panel::before{
      content:"";
      position:absolute;
      left:20px;right:20px;top:0;
      height:5px;
      border-radius:0 0 999px 999px;
      background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      color:var(--gold2);
      border:1px solid rgba(215,181,109,.30);
      background:rgba(215,181,109,.10);
      border-radius:999px;
      padding:8px 13px;
      font-size:13px;
      font-weight:800;
      letter-spacing:.12em;
      margin-bottom:18px;
    }
    h1{
      margin:0;
      font-size:clamp(31px,8vw,44px);
      line-height:1.08;
      letter-spacing:.08em;
      color:var(--gold2);
      text-shadow:0 4px 24px rgba(215,181,109,.25);
      font-weight:1000;
    }
    .sub{
      margin:14px auto 26px;
      color:var(--muted);
      font-size:15px;
      line-height:1.8;
      max-width:330px;
      font-weight:650;
    }
    .choices{
      display:grid;
      gap:14px;
    }
    .choice{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      text-align:left;
      text-decoration:none;
      color:var(--text);
      border:1px solid rgba(255,255,255,.16);
      background:linear-gradient(135deg,var(--card2),var(--card));
      border-radius:24px;
      padding:17px 17px;
      min-height:88px;
      box-shadow:0 14px 34px rgba(0,0,0,.26);
      transition:transform .16s ease, border-color .16s ease, background .16s ease;
    }
    .choice:active{transform:scale(.985);}
    .choice:hover{border-color:rgba(215,181,109,.42);}
    .icon{
      width:48px;height:48px;
      border-radius:18px;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,rgba(215,181,109,.30),rgba(255,241,189,.12));
      border:1px solid rgba(215,181,109,.25);
      font-size:24px;
    }
    .choiceText{min-width:0;flex:1;}
    .choiceTitle{
      font-size:21px;
      font-weight:1000;
      letter-spacing:.08em;
      color:#fff6d2;
      margin-bottom:5px;
    }
    .choiceDesc{
      font-size:13px;
      line-height:1.55;
      color:rgba(255,250,240,.65);
      font-weight:650;
    }
    .arrow{
      flex:0 0 auto;
      width:34px;height:34px;
      display:flex;align-items:center;justify-content:center;
      border-radius:999px;
      color:#111;
      background:linear-gradient(135deg,var(--gold2),var(--gold));
      font-size:22px;
      font-weight:1000;
    }
    .note{
      margin:20px 0 0;
      color:rgba(255,250,240,.52);
      font-size:12px;
      line-height:1.7;
      font-weight:650;
    }
    @media (max-width:420px){
      .page{padding-left:14px;padding-right:14px;}
      .panel{border-radius:28px;padding:24px 16px 18px;}
      .choice{padding:15px 14px;min-height:82px;border-radius:22px;}
      .icon{width:44px;height:44px;border-radius:16px;}
      .choiceTitle{font-size:20px;}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel" aria-label="節目單入口">
      <div class="eyebrow">WELCOME</div>
      <h1>節目單</h1>
      <p class="sub">請選擇要查看的內容，點選後即可進入節目單或觀看節目導覽影片。</p>

      <div class="choices">
        <a class="choice" href="program.html">
          <div class="icon" aria-hidden="true">♫</div>
          <div class="choiceText">
            <div class="choiceTitle">節目單</div>
            <div class="choiceDesc">查看演出節目與頁面內容</div>
          </div>
          <div class="arrow" aria-hidden="true">›</div>
        </a>

        <a class="choice" href="video.html">
          <div class="icon" aria-hidden="true">▶</div>
          <div class="choiceText">
            <div class="choiceTitle">節目導覽影片</div>
            <div class="choiceDesc">觀看 YouTube 導覽影片</div>
          </div>
          <div class="arrow" aria-hidden="true">›</div>
        </a>
      </div>

      <p class="note">建議用手機直式觀看，按鈕已依手機版調整。</p>
    </section>
  </main>
</body>
</html>
