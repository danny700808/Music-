function addText(cls,text,left,top,width){const d=document.createElement('div');d.className=cls;d.textContent=text;d.style.left=left+'px';d.style.top=top+'px';if(width)d.style.width=width+'px';chart.appendChild(d)}

function renderSeat(block,row,seat){
  const seats=block.rows[row];
  const seatIndex=seats.indexOf(seat); if(seatIndex<0)return;
  const key=`${block.id}-${row}-${seat}`;
  const el=document.createElement('div'); el.className='seat'; el.dataset.key=key;
  let left;
  if(block.align==='right'){
    // 左側區塊：所有排以靠近中間走道的右邊界對齊。
    left=block.right-seats.length*CELL_W+seatIndex*CELL_W;
  }else if(block.align==='left'){
    // 右側區塊：所有排以靠近中間走道的左邊界對齊。
    left=block.left+seatIndex*CELL_W;
  }else{
    // 中間區塊：依原座號欄位保留左右凸出與缺口。
    const idx=block.order.indexOf(seat); if(idx<0)return;
    left=block.x+idx*CELL_W;
  }
  el.style.left=left+'px';
  const rowKeys=Object.keys(block.rows).map(Number); const rowIndex=rowKeys.indexOf(row);
  el.style.top=(block.y+rowIndex*CELL_H)+'px';
  const initial=frontAssignments[key]||['','normal'];
  initialData[key]={name:initial[0],status:initial[1]};
  currentData[key]={...initialData[key]};
  el.innerHTML='<span class="seat-number"></span><span class="seat-name"></span>';
  el.addEventListener('click',()=>openEditor(key)); chart.appendChild(el); seatEls.set(key,el); updateSeat(key);
}
blocks.forEach(block=>Object.entries(block.rows).forEach(([row,seats])=>seats.forEach(seat=>renderSeat(block,+row,seat))));

function displaySeatNumber(key){const parts=key.split('-');return key.startsWith('WC-')?`16-${parts.at(-1)}`:`${parts.at(-2)}-${parts.at(-1)}`}
function updateSeat(key){const el=seatEls.get(key);if(!el)return;const d=currentData[key];el.classList.remove('normal','assigned','empty','wheelchair','has-name');el.classList.add(d.status||'normal');const number=displaySeatNumber(key);el.querySelector('.seat-number').textContent=number;el.querySelector('.seat-name').textContent=d.name||'';if(d.name)el.classList.add('has-name');el.title=`${number}${d.name?'\n'+d.name:''}`}

const editor=document.getElementById('editor'),seatId=document.getElementById('seatId'),seatName=document.getElementById('seatName'),seatStatus=document.getElementById('seatStatus');let editingKey='';
function openEditor(key){editingKey=key;seatId.value=displaySeatNumber(key);seatName.value=currentData[key]?.name||'';seatStatus.value=currentData[key]?.status||'normal';document.getElementById('editorTitle').textContent='編輯座位';editor.showModal()}
document.getElementById('cancelEdit').onclick=()=>editor.close();
document.getElementById('clearName').onclick=()=>seatName.value='';
document.getElementById('applyEdit').onclick=()=>{
  currentData[editingKey]={name:seatName.value.trim(),status:seatStatus.value};
  updateSeat(editingKey);
  editor.close();
  saveLocal();
  scheduleCloudSave();
};

const allowedStatuses=new Set(['normal','assigned','empty','wheelchair']);
let saveTimer=null,pendingCloudSave=false;
function setSyncStatus(text,kind='warn'){
  const el=document.getElementById('syncStatus');
  if(!el)return;
  el.textContent=text;
  el.classList.remove('ok','warn','error');
  el.classList.add(kind);
}
function cleanSeatRecord(value){
  const d=value&&typeof value==='object'?value:{};
  return {name:String(d.name||''),status:allowedStatuses.has(d.status)?d.status:'normal'};
}
function currentSeatSnapshot(){
  const seats={};
  Object.keys(currentData).forEach(k=>seats[k]=cleanSeatRecord(currentData[k]));
  return seats;
}
function applySeatData(data){
  if(!data||typeof data!=='object')return;
  Object.keys(data).forEach(k=>{if(currentData[k])currentData[k]=cleanSeatRecord(data[k])});
  Object.keys(currentData).forEach(updateSeat);
}
function saveLocal(){try{localStorage.setItem('huludun-seats-v1',JSON.stringify(currentSeatSnapshot()))}catch(e){console.warn(e)}}
function loadLocal(){try{const d=JSON.parse(localStorage.getItem('huludun-seats-v1')||'null');if(d)applySeatData(d)}catch(e){console.warn(e)}}
async function saveCloud({silent=false}={}){
  saveLocal();
  if(!firebaseUser){
    pendingCloudSave=true;
    setSyncStatus('雲端登入中…','warn');
    if(!silent)alert('Firebase 還在登入中，稍後會自動同步。');
    return;
  }
  try{
    setSyncStatus('同步中…','warn');
    await setDoc(seatMapDoc,{
      type:'seatMapSnapshot',
      title:'葫蘆墩文化中心座位表',
      seats:currentSeatSnapshot(),
      updatedAt:serverTimestamp(),
      updatedBy:firebaseUser.uid
    },{merge:true});
    setSyncStatus('已同步到雲端','ok');
    if(!silent)alert('已同步到雲端，其他人重新打開座位表就會看到最新資料。');
  }catch(err){
    console.error(err);
    setSyncStatus('雲端同步失敗','error');
    if(!silent)alert('雲端同步失敗：'+(err.message||err)+'\n目前已先保存在這台裝置。');
  }
}
function scheduleCloudSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>saveCloud({silent:true}),650);
}
function startFirebaseSync(){
  setSyncStatus('雲端連線中…','warn');
  onAuthStateChanged(auth,u=>{
    firebaseUser=u;
    if(u){
      setSyncStatus('讀取雲端中…','warn');
      if(pendingCloudSave){pendingCloudSave=false;saveCloud({silent:true})}
    }
  });
  signInAnonymously(auth).catch(err=>{
    console.error(err);
    setSyncStatus('雲端登入失敗','error');
    alert('Firebase 匿名登入失敗，請確認 Authentication 已啟用匿名登入。');
  });
  onSnapshot(seatMapDoc,snap=>{
    if(!snap.exists()){
      setSyncStatus('尚未建立雲端資料','warn');
      return;
    }
    const data=snap.data()||{};
    if(data.seats&&typeof data.seats==='object'){
      applySeatData(data.seats);
      saveLocal();
      setSyncStatus('已讀取雲端資料','ok');
    }
  },err=>{
    console.error(err);
    setSyncStatus('雲端讀取失敗','error');
    alert('Firestore 讀取失敗，請確認 Firestore 規則允許匿名使用者讀取。');
  });
}
loadLocal();
startFirebaseSync();

document.getElementById('save').onclick=()=>saveCloud({silent:false});
document.getElementById('print').onclick=()=>window.print();
document.getElementById('reset').onclick=()=>{if(confirm('確定還原初始資料？這會同步覆蓋雲端座位資料。')){Object.keys(initialData).forEach(k=>currentData[k]={...initialData[k]});Object.keys(currentData).forEach(updateSeat);saveCloud({silent:false})}};
document.getElementById('export').onclick=()=>{const blob=new Blob([JSON.stringify(currentSeatSnapshot(),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='葫蘆墩文化中心座位資料.json';a.click();URL.revokeObjectURL(a.href)};

};
function setZoom(z){zoom=Math.max(.2,Math.min(2.6,z));document.documentElement.style.setProperty('--zoom',zoom);document.getElementById('zoomLabel').textContent=Math.round(zoom*100)+'%'}
function fitWhole(){const vw=viewport.clientWidth-36;setZoom(Math.min(.95,vw/3400))}
function centerOnZone(zoneKey){
  const zone=zoneViews[zoneKey]||zoneViews.all;
  document.querySelectorAll('[data-zone]').forEach(el=>el.classList.toggle('active',el.dataset.zone===zoneKey));
  document.getElementById('currentZoneLabel').textContent=zone.label;
  if(zoneKey==='all'){
    fitWhole();
    requestAnimationFrame(()=>viewport.scrollTo({left:0,top:0,behavior:'smooth'}));
    return;
  }
  setZoom(zone.zoom);
  requestAnimationFrame(()=>{
    const reserve=document.getElementById('overview')?.offsetWidth||0;
    const visibleW=Math.max(360,viewport.clientWidth-reserve-52);
    const visibleH=Math.max(320,viewport.clientHeight-40);
    const targetLeft=(zone.x+zone.w/2)*zoom-visibleW/2;
    const targetTop=(zone.y+zone.h/2)*zoom-visibleH/2;
    viewport.scrollTo({left:Math.max(0,targetLeft),top:Math.max(0,targetTop),behavior:'smooth'});
  });
}
document.getElementById('zoomIn').onclick=()=>setZoom(zoom+.1);document.getElementById('zoomOut').onclick=()=>setZoom(zoom-.1);
document.getElementById('fit').onclick=()=>centerOnZone('all');
document.querySelectorAll('[data-zone]').forEach(el=>el.addEventListener('click',()=>centerOnZone(el.dataset.zone)));
window.addEventListener('resize',()=>{});
})();
