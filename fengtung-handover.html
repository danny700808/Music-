<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>豐東管樂交接資料庫</title>
<style>
:root {
  --bg:#f7f4ed;
  --panel:#fffdf8;
  --text:#2d2922;
  --muted:#7a7166;
  --line:#e4d9c8;
  --roleBg:#DDEBF7;
  --roleAccent:#5B9BD5;
  --danger:#b94a48;
  --shadow:0 12px 28px rgba(48,39,24,.10);
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
  background:linear-gradient(180deg,#fbf7ee 0%,#f2eadf 100%);
  color:var(--text);
  line-height:1.7;
}
.wrap { max-width:1080px; margin:0 auto; }
header { padding:22px 14px 8px; }
.hero { background:#fff; border:1px solid var(--line); border-radius:22px; padding:22px 20px; box-shadow:var(--shadow); }
.hero h1 { margin:0; font-size:clamp(26px,5vw,40px); letter-spacing:.05em; text-align:center; }
main { padding:10px 14px 34px; }
button, textarea, input, select { font:inherit; }
.btn { border:none; border-radius:13px; padding:10px 14px; cursor:pointer; font-weight:800; background:var(--roleAccent); color:#fff; }
.btn.secondary { background:#fff; color:var(--text); border:1px solid var(--line); }
.btn.ghost { background:#fff; color:var(--roleAccent); border:1px solid var(--line); }
.btn.danger { background:var(--danger); color:#fff; }
.btn.small { padding:3px 8px; border-radius:999px; font-size:12px; line-height:1.45; margin-left:6px; vertical-align:baseline; }
.status { display:none !important; }

/* 成果展進度表 */
.scheduleShell { margin:16px 0 18px; }
.scheduleDetails { background:#fffdf8; border:1px solid var(--line); border-radius:22px; box-shadow:var(--shadow); overflow:hidden; }
.scheduleDetails > summary { list-style:none; cursor:pointer; user-select:none; padding:18px 20px; font-size:clamp(22px,4vw,32px); font-weight:950; display:flex; justify-content:space-between; align-items:center; gap:12px; }
.scheduleDetails > summary::-webkit-details-marker { display:none; }
.scheduleDetails > summary::after { content:"點開查看"; font-size:14px; color:var(--muted); font-weight:800; }
.scheduleDetails[open] > summary::after { content:"收合"; }
.scheduleBody { border-top:1px solid var(--line); padding:14px; }
.scheduleTop { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:10px; }
.scheduleHint { color:var(--muted); font-size:13px; font-weight:700; }
.a4Scroll { overflow-x:auto; padding-bottom:8px; }
.a4Sheet { width:980px; max-width:980px; margin:0 auto; background:#fff; border:2px solid #222; padding:0; }
.scheduleTable { width:100%; border-collapse:collapse; table-layout:fixed; font-size:13px; line-height:1.35; }
.scheduleTable th, .scheduleTable td { border:1px solid #222; padding:5px 6px; vertical-align:top; word-break:break-word; white-space:pre-wrap; }
.scheduleTable th { text-align:center; background:#f6f2e8; font-weight:900; }
.scheduleTable .timeCol { width:72px; text-align:center; }
.scheduleTable .taskCol { width:390px; }
.scheduleTable .personCol { width:115px; }
.scheduleTable .noteCol { width:220px; }
.scheduleActions { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
.scheduleActions button { font-size:11px; padding:2px 6px; border-radius:999px; }

/* 角色區塊 */
.roleGrid { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:12px; margin:16px 0 18px; }
.roleBtn { appearance:none; border:2px solid transparent; border-radius:18px; padding:18px 10px; min-height:76px; cursor:pointer; font-weight:900; font-size:20px; color:#2d2922; box-shadow:0 7px 18px rgba(41,32,18,.07); transition:.16s; }
.roleBtn:hover { transform:translateY(-2px); }
.roleBtn.active { border-color:var(--roleAccent); box-shadow:0 0 0 4px rgba(255,255,255,.8), var(--shadow); }
.rolePanel { background:var(--roleBg); border:2px solid rgba(0,0,0,.08); border-radius:24px; padding:16px; box-shadow:var(--shadow); }
.rolePanelTop { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
.rolePanel h2 { margin:0; font-size:clamp(24px,4.5vw,34px); }
.list { display:flex; flex-direction:column; gap:10px; }
.sectionBlock { display:flex; flex-direction:column; gap:10px; }
.sectionBlock + .sectionBlock { margin-top:18px; }
.sectionTitle { display:flex; align-items:center; gap:10px; font-size:22px; font-weight:900; margin:8px 2px 6px; color:#2d2922; }
.sectionTitle::after { content:""; height:1px; background:rgba(120,100,70,.22); flex:1; }
.sectionHint { font-size:15px; color:var(--muted); font-weight:700; margin:0 2px 12px; line-height:1.5; }
.item { background:rgba(255,255,255,.88); border:1px solid rgba(120,100,70,.18); border-left:8px solid var(--roleAccent); border-radius:18px; padding:13px 14px 12px; }
.item.added { border-left-style:dashed; background:#fff; }
.item.collab { background:rgba(255,255,255,.70); border-left-width:5px; }
.itemHead { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
.eventTitleWrap { flex:1 1 auto; min-width:0; display:flex; align-items:baseline; flex-wrap:wrap; gap:6px 9px; }
.eventTitle { font-size:22px; line-height:1.35; font-weight:900; letter-spacing:.01em; overflow:visible; white-space:normal; word-break:break-word; }
.textEditLink { appearance:none; border:0; background:transparent; color:var(--roleAccent); font-size:13px; font-weight:800; line-height:1.2; padding:0 2px; cursor:pointer; text-decoration:none; }
.eventLines { margin:8px 0 0; display:flex; flex-direction:column; gap:6px; }
.eventLine { display:flex; align-items:flex-start; gap:8px; font-size:16px; line-height:1.7; font-weight:600; white-space:pre-wrap; word-break:break-word; }
.eventLine .dot { color:#111; font-size:18px; line-height:1.55; flex:0 0 auto; }
.eventLine .lineText { flex:1 1 auto; }
.ownerMeta { display:flex; gap:7px; flex-wrap:wrap; margin:9px 0 0; }
.ownerPill { font-size:13px; line-height:1.25; font-weight:800; padding:4px 8px; border:1px solid rgba(120,100,70,.20); border-radius:999px; background:rgba(255,255,255,.86); color:#4f463c; white-space:normal; }
.ownerPill span { color:var(--roleAccent); }
.itemActions { display:flex; gap:7px; flex-wrap:wrap; margin-top:9px; }
.itemActions .btn.ghost { font-size:13px; line-height:1.2; padding:6px 9px; border-radius:10px; white-space:normal; }
.relatedBox { flex:0 0 auto; position:relative; }
.relatedBox summary { list-style:none; user-select:none; cursor:pointer; border:1px solid var(--line); border-radius:999px; background:#fff; color:var(--roleAccent); font-weight:900; font-size:14px; padding:6px 10px; line-height:1.25; box-shadow:0 4px 12px rgba(41,32,18,.06); white-space:normal; }
.relatedBox summary::-webkit-details-marker { display:none; }
.relatedBox[open] summary { background:var(--roleAccent); color:#fff; border-color:var(--roleAccent); }
.relatedPanel { position:absolute; right:0; top:calc(100% + 8px); z-index:20; width:min(330px,82vw); background:#fffdf8; border:1px solid var(--line); border-radius:16px; box-shadow:0 16px 40px rgba(42,34,20,.18); padding:10px; display:flex; flex-direction:column; gap:8px; }
.relatedPanelTitle { font-weight:900; color:var(--text); border-bottom:1px solid var(--line); padding:0 2px 6px; margin-bottom:2px; }
.relatedFile { background:#fff; border:1px solid rgba(120,100,70,.16); border-radius:12px; padding:8px 9px; display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.relatedFile button.openFile { appearance:none; border:0; background:transparent; color:var(--roleAccent); font-weight:800; text-decoration:none; text-align:left; padding:0; cursor:pointer; overflow:visible; text-overflow:clip; white-space:normal; word-break:break-word; }
.relatedFileActions { flex:0 0 auto; white-space:nowrap; }
.empty { background:#fff; border:1px dashed var(--line); border-radius:18px; padding:18px; color:var(--muted); }

/* modal */
.modalBackdrop { position:fixed; inset:0; background:rgba(30,24,15,.48); display:none; align-items:center; justify-content:center; padding:16px; z-index:50; }
.modalBackdrop.show { display:flex; }
.modal { width:min(680px,100%); max-height:88vh; overflow:auto; background:#fffdf8; border-radius:22px; box-shadow:0 24px 80px rgba(0,0,0,.28); padding:18px; }
.modal h2 { margin:0 0 10px; }
label { display:block; font-weight:900; margin-bottom:6px; }
input[type="text"], textarea, select { width:100%; border:1px solid var(--line); border-radius:14px; padding:11px; background:#fff; color:var(--text); }
input[type="text"], select { min-height:46px; }
textarea { min-height:150px; resize:vertical; }
.field { margin-bottom:12px; }
.field.hidden { display:none; }
.modalActions { display:flex; justify-content:flex-end; gap:8px; margin-top:12px; flex-wrap:wrap; }
.previewModal { width:min(920px,96vw); max-height:90vh; display:flex; flex-direction:column; gap:10px; }
.previewTop { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.previewTitle { font-size:18px; font-weight:900; word-break:break-word; }
.previewClose { border:none; background:#fff; color:#333; border:1px solid var(--line); border-radius:999px; width:38px; height:38px; font-size:22px; cursor:pointer; }
.previewBody { max-height:75vh; overflow:auto; display:flex; align-items:center; justify-content:center; background:#f7f4ed; border-radius:14px; padding:10px; }
.previewBody img { max-width:100%; max-height:72vh; object-fit:contain; border-radius:8px; }
@media (max-width:920px) { .roleGrid { grid-template-columns:repeat(3,minmax(0,1fr)); } }
@media (max-width:620px) {
  header { padding:12px 10px 6px; }
  main { padding:8px 10px 26px; }
  .hero { padding:18px 14px; border-radius:18px; }
  .roleGrid { grid-template-columns:repeat(2,minmax(0,1fr)); gap:9px; }
  .roleBtn { min-height:64px; font-size:18px; padding:14px 8px; }
  .rolePanel { padding:12px; border-radius:20px; }
  .eventTitle { font-size:20px; }
  .eventLine { font-size:16px; }
  .ownerPill, .itemActions .btn.ghost { font-size:12px; }
  .relatedBox { margin-top:2px; }
  .scheduleDetails > summary { padding:14px 16px; }
}
</style>
</head>

<header>
  <div class="wrap hero"><h1>豐東管樂交接資料庫</h1></div>
</header>
<main>
  <div class="wrap">
    <section class="scheduleShell">
      <details class="scheduleDetails" id="scheduleDetails">
        <summary>成果展進度表</summary>
        <div class="scheduleBody">
          <div class="scheduleTop">
            <div class="scheduleHint">點開後可修改時間、事項、主要負責人、協助負責人與備註。</div>
            <button class="btn" id="addScheduleBtn">＋新增行程</button>
          </div>
          <div class="a4Scroll"><div class="a4Sheet" id="scheduleContent"></div></div>
        </div>
      </details>
    </section>

    <div id="roleGrid" class="roleGrid"></div>
    <section id="rolePanel" class="rolePanel">
      <div class="rolePanelTop">
        <h2 id="currentRoleTitle"></h2>
        <button class="btn" id="addItemBtn">＋新增一項</button>
      </div>
      <p class="status" id="statusText">連線中…</p>
      <div id="content" class="list"></div>
    </section>
  </div>
</main>

<div class="modalBackdrop" id="modalBackdrop">
  <div class="modal">
    <h2 id="modalTitle">新增內容</h2>
    <form id="modalForm">
      <div class="field" id="titleField">
        <label for="titleInput">大項</label>
        <input type="text" id="titleInput" name="title" placeholder="例如：學生請假與臨時狀況">
      </div>
      <div class="field" id="contentField">
        <label for="contentInput" id="contentLabel">小項</label>
        <textarea id="contentInput" name="content" required placeholder="把這一項要記錄的細項內容寫在這裡"></textarea>
      </div>
      <div class="modalActions">
        <button type="button" class="btn secondary" id="cancelModalBtn">取消</button>
        <button type="submit" class="btn">儲存</button>
      </div>
    </form>
  </div>
</div>

<div class="modalBackdrop" id="assignBackdrop">
  <div class="modal">
    <h2>調整負責人</h2>
    <form id="assignForm">
      <div class="field">
        <label for="mainRoleSelect">主要負責人</label>
        <select id="mainRoleSelect"></select>
      </div>
      <div class="field">
        <label for="backupRoleSelect">備援負責人</label>
        <select id="backupRoleSelect"></select>
      </div>
      <div class="modalActions">
        <button type="button" class="btn secondary" id="cancelAssignBtn">取消</button>
        <button type="submit" class="btn">儲存</button>
      </div>
    </form>
  </div>
</div>

<div class="modalBackdrop" id="scheduleModalBackdrop">
  <div class="modal">
    <h2 id="scheduleModalTitle">新增行程</h2>
    <form id="scheduleForm">
      <div class="field">
        <label for="scheduleTime">時間</label>
        <input type="text" id="scheduleTime" placeholder="例如：09:00">
      </div>
      <div class="field">
        <label for="scheduleTask">事項</label>
        <textarea id="scheduleTask" required placeholder="這個時間要做的事情"></textarea>
      </div>
      <div class="field">
        <label for="schedulePrimary">主要負責人</label>
        <input type="text" id="schedulePrimary" placeholder="例如：會長、總務、全體幹部">
      </div>
      <div class="field">
        <label for="scheduleBackup">協助負責人</label>
        <input type="text" id="scheduleBackup" placeholder="例如：文書、家長志工">
      </div>
      <div class="field">
        <label for="scheduleNote">備註</label>
        <textarea id="scheduleNote" placeholder="補充備註"></textarea>
      </div>
      <div class="modalActions">
        <button type="button" class="btn secondary" id="cancelScheduleBtn">取消</button>
        <button type="submit" class="btn">儲存</button>
      </div>
    </form>
  </div>
</div>

<div class="modalBackdrop" id="previewBackdrop">
  <div class="modal previewModal">
    <div class="previewTop">
      <div class="previewTitle" id="previewTitle">圖片預覽</div>
      <button class="previewClose" id="closePreviewBtn" type="button">×</button>
    </div>
    <div class="previewBody" id="previewBody"></div>
  </div>
</div>

<input id="fileInput" type="file" style="display:none" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx">

  '團務老師': { bg:'#DDEBF7', accent:'#5B9BD5' },
  '會長': { bg:'#FFF2CC', accent:'#BF9000' },
  '總務': { bg:'#E2F0D9', accent:'#70AD47' },

const $ = id => document.getElementById(id);
function esc(s='') { return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function safePart(s) { return String(s || 'file').replace(/[\/#?%*:|"<>]/g, '_').slice(0,80); }
function roleStyle(role) { return roleColors[role] || roleColors['團務老師']; }
function setRoleVars(role) {
  const c = roleStyle(role);
  document.documentElement.style.setProperty('--roleBg', c.bg);
  document.documentElement.style.setProperty('--roleAccent', c.accent);
}
function normalizeRole(role) {
  if(!role) return '尚未指定';
  if(role === '全體' || role === '幹部／全體幹部' || role === '全體／新增') return '全體幹部';
  return role;
}
function roleDisplayName(role) { return ROLES.find(r => r.id === role)?.name || role; }
function expandsToRole(value, role) {
  const v = normalizeRole(value);
  if(v === '尚未指定') return role === '全體幹部';
  if(v === role) return true;
  if(v === '全體幹部') return role === '全體幹部' || ['團務老師','會長','總務','文書','攝影'].includes(role);
  return false;
}
function createdMs(e) {
  const c = e.createdAt;
  if(c?.toMillis) return c.toMillis();
  if(typeof c === 'number') return c;
  if(typeof c === 'string') return Date.parse(c) || 0;
  return 0;
}
function latestOf(list) { return list.slice().sort((a,b)=>createdMs(a)-createdMs(b)).at(-1) || null; }
function isMine(e) { return currentUser && e.ownerUid === currentUser.uid; }

function textEdits(parentId) { return entries.filter(e => e.type === 'textEdit' && e.parentId === parentId); }
function replyEdits(parentId) { return entries.filter(e => e.type === 'replyEdit' && e.parentId === parentId); }
function assignments(parentId) { return entries.filter(e => e.type === 'assignment' && e.parentId === parentId); }
function repliesFor(parentId) { return entries.filter(e => e.type === 'reply' && e.parentId === parentId); }
function filesFor(parentId) { return entries.filter(e => e.type === 'file' && e.parentId === parentId); }
function baseById(id) { return BASE_RECORDS.find(r => r.id === id); }
function entryById(id) { return entries.find(e => e.id === id); }
function customItems() { return entries.filter(e => e.type === 'item' && !e.parentId); }

function latestTextEdit(id) { return latestOf(textEdits(id)); }
function latestReplyEdit(id) { return latestOf(replyEdits(id)); }
function latestAssignment(id) { return latestOf(assignments(id)); }
function defaultBackup(record) {
  const first = (record.collabs || []).map(normalizeRole).find(r => r && r !== normalizeRole(record.main));
  return first || '尚未指定';
}
function effectiveMain(record) {
  const a = latestAssignment(record.id);
  if(a?.primaryRole) return normalizeRole(a.primaryRole);
  return normalizeRole(record.main || record.role || '尚未指定');
}
function effectiveBackup(record) {
  const a = latestAssignment(record.id);
  if(a?.backupRole) return normalizeRole(a.backupRole);
  if(record.kind === 'base') return defaultBackup(record);
  return normalizeRole(record.backupRole || '尚未指定');
}
function displayRecord(record) {
  const edit = latestTextEdit(record.id);
  return {
    id: record.id,
    title: edit?.title || record.item || record.title || '新增項目',
    content: edit?.content ?? (record.description ?? record.content ?? ''),
    main: effectiveMain(record),
    backup: effectiveBackup(record)
  };
}
function primaryForRole(record, role) { return expandsToRole(effectiveMain(record), role); }
function backupForRole(record, role) { return !primaryForRole(record, role) && expandsToRole(effectiveBackup(record), role); }

/* 成果展進度表 */
function scheduleDeletes() { return new Set(entries.filter(e => e.type === 'scheduleDelete').map(e => e.parentId)); }
function scheduleEdits(id) { return entries.filter(e => e.type === 'scheduleEdit' && e.parentId === id); }
function scheduleDisplay(row) {
  const e = latestOf(scheduleEdits(row.id));
  return {
    id: row.id,
    time: e?.time ?? row.time ?? '',
    task: e?.task ?? row.task ?? '',
    primary: e?.primary ?? row.primary ?? '',
    backup: e?.backup ?? row.backup ?? '',
    note: e?.note ?? row.note ?? '',
    order: row.order ?? 0
  };
}
function allScheduleRows() {
  const del = scheduleDeletes();
  const bases = SCHEDULE_ROWS.filter(r => !del.has(r.id)).map((r,i) => scheduleDisplay({...r, order:i+1}));
  const customs = entries.filter(e => e.type === 'scheduleRow' && !del.has(e.id)).map(e => scheduleDisplay({...e, order:e.order || createdMs(e) || 999999}));
  return [...bases, ...customs].sort((a,b)=>(a.order||0)-(b.order||0));
}
function renderSchedule() {
  const rows = allScheduleRows();
  $('scheduleContent').innerHTML = `<table class="scheduleTable">
    <thead><tr>
      <th class="timeCol">時間</th>
      <th class="taskCol">事項</th>
      <th class="personCol">主要負責人</th>
      <th class="personCol">協助負責人</th>
      <th class="noteCol">備註</th>
    </tr></thead>
    <tbody>
      ${rows.map(r => `<tr>
        <td class="timeCol">${esc(r.time)}</td>
        <td class="taskCol">${esc(r.task)}<div class="scheduleActions"><button class="btn secondary small" data-schedule-edit="${esc(r.id)}">修改</button><button class="btn danger small" data-schedule-delete="${esc(r.id)}">刪除</button></div></td>
        <td>${esc(r.primary)}</td>
        <td>${esc(r.backup)}</td>
        <td>${esc(r.note)}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}
function openScheduleModal(id=null) {
  if(!currentUser) { alert('Firebase 連線尚未完成，請稍後再試。'); return; }
  scheduleEditing = id ? { mode:'edit', id } : { mode:'new' };
  let d = { time:'', task:'', primary:'', backup:'', note:'' };
  if(id) d = allScheduleRows().find(r => r.id === id) || d;
  $('scheduleModalTitle').textContent = id ? '修改行程' : '新增行程';
  $('scheduleTime').value = d.time || '';
  $('scheduleTask').value = d.task || '';
  $('schedulePrimary').value = d.primary || '';
  $('scheduleBackup').value = d.backup || '';
  $('scheduleNote').value = d.note || '';
  $('scheduleModalBackdrop').classList.add('show');
  setTimeout(()=>$('scheduleTask').focus(), 50);
}
function closeScheduleModal() {
  $('scheduleModalBackdrop').classList.remove('show');
  scheduleEditing = null;
}
async function saveSchedule(e) {
  e.preventDefault();
  if(!currentUser) return;
  const data = {
    time: $('scheduleTime').value.trim(),
    task: $('scheduleTask').value.trim(),
    primary: $('schedulePrimary').value.trim(),
    backup: $('scheduleBackup').value.trim(),
    note: $('scheduleNote').value.trim()
  };
  if(!data.task) return;
  try {
    if(scheduleEditing?.mode === 'edit') {
      if(!confirm('確定要修改這一列行程嗎？')) return;
      await addDoc(entriesCol, { type:'scheduleEdit', parentId:scheduleEditing.id, ...data, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    } else {
      await addDoc(entriesCol, { type:'scheduleRow', ...data, order:Date.now(), ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    }
    closeScheduleModal();
  } catch(err) { alert('儲存行程失敗：' + (err.message || err)); }
}
async function deleteScheduleRow(id) {
  if(!currentUser) { alert('Firebase 連線尚未完成，請稍後再試。'); return; }
  if(!confirm('確定要刪除這一列行程嗎？')) return;
  try {
    await addDoc(entriesCol, { type:'scheduleDelete', parentId:id, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
  } catch(err) { alert('刪除行程失敗：' + (err.message || err)); }
}

function eventLine(text, editAttr='', deleteHtml='') {
  if(!text) return '';
  return `<div class="eventLine"><span class="dot">•</span><span class="lineText">${esc(text)}</span>${editAttr ? ` <button class="textEditLink" ${editAttr}>修改</button>` : ''}${deleteHtml}</div>`;
}
function childLines(parentId) {
  const replies = repliesFor(parentId);
  return replies.map(e => {
    const edit = latestReplyEdit(e.id);
    const content = edit?.content ?? e.content ?? '';
    const del = isMine(e) ? ` <button class="btn danger small" data-delete="${esc(e.id)}">刪除</button>` : '';
    return eventLine(content, `data-edit-reply="${esc(e.id)}"`, del);
  }).join('');
}
function isImageFile(f) {
  return (f.contentType || '').startsWith('image/') || /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(f.fileName || '');
}
function fileIcon(f) {
  const t = f.contentType || '';
  const name = (f.fileName || '').toLowerCase();
  if(isImageFile(f)) return '🖼️';
  if(t === 'application/pdf' || name.endsWith('.pdf')) return '📄';
  if(name.endsWith('.doc') || name.endsWith('.docx')) return '📝';
  if(name.endsWith('.xls') || name.endsWith('.xlsx')) return '📊';
  return '📎';
}
function relatedMaterials(parentId) {
  const files = filesFor(parentId);
  if(!files.length) return '';
  return `<details class="relatedBox">
    <summary>📎 相關資料 ${files.length}</summary>
    <div class="relatedPanel">
      <div class="relatedPanelTitle">相關資料</div>
      ${files.map(f => `<div class="relatedFile">
        <button class="openFile" data-file-open="${esc(f.id)}" title="${esc(f.fileName || '資料')}">${fileIcon(f)} ${esc(f.fileName || '資料')}</button>
        <span class="relatedFileActions">${isMine(f) ? `<button class="btn danger small" data-file-delete="${esc(f.id)}">刪除</button>` : ''}</span>
      </div>`).join('')}
    </div>
  </details>`;
}
function ownerMeta(d) {
  return `<div class="ownerMeta"><span class="ownerPill">主要：<span>${esc(roleDisplayName(d.main))}</span></span><span class="ownerPill">備援：<span>${esc(roleDisplayName(d.backup))}</span></span></div>`;
}
function actionButtons(parentId) {
  return `<div class="itemActions">
    <button class="btn ghost" data-reply="${esc(parentId)}">＋補充內容</button>
    <button class="btn ghost" data-upload="${esc(parentId)}">＋上傳資料</button>
    <button class="btn ghost" data-assign="${esc(parentId)}">調整負責人</button>
  </div>`;
}
function renderCard(record, mode='main', deletable=false) {
  const d = displayRecord(record);
  return `<article class="item ${mode === 'backup' ? 'collab' : ''} ${record.type === 'item' ? 'added' : ''}">
    <div class="itemHead">

    ${actionButtons(record.id)}

}
function sectionHtml(title, hint, cards) {
  if(!cards.length) return '';
  return `<div class="sectionBlock"><div><div class="sectionTitle">${esc(title)}</div>${hint ? `<div class="sectionHint">${esc(hint)}</div>` : ''}</div>${cards.join('')}</div>`;
}
function renderContent() {
  const primaryBases = BASE_RECORDS.filter(r => primaryForRole(r, currentRole)).map(r => renderCard(r, 'main'));
  const primaryItems = customItems().filter(e => primaryForRole(e, currentRole)).map(e => renderCard(e, 'main', isMine(e)));
  const backupBases = BASE_RECORDS.filter(r => backupForRole(r, currentRole)).map(r => renderCard(r, 'backup'));
  const backupItems = customItems().filter(e => backupForRole(e, currentRole)).map(e => renderCard(e, 'backup', isMine(e)));
  $('content').innerHTML = [
    sectionHtml('主要負責', '', [...primaryBases, ...primaryItems]),
    sectionHtml('備援負責', '原負責人不方便時，需要能接手的事情。', [...backupBases, ...backupItems])
  ].join('') || '<div class="empty">目前還沒有內容。</div>';
}
function render() {
  setRoleVars(currentRole);
  renderRoles();
  $('currentRoleTitle').textContent = roleDisplayName(currentRole);
  renderSchedule();
  renderContent();
}

/* 一般內容 modal */
function closeModal() {
  $('modalBackdrop').classList.remove('show');
  $('titleInput').value = '';
  $('contentInput').value = '';
  editing = null;
}
function configureModal() {
  const needsTitle = editing?.mode === 'newItem' || editing?.mode === 'editTop';
  $('titleField').classList.toggle('hidden', !needsTitle);
  $('titleInput').required = needsTitle;
  $('contentLabel').textContent = editing?.mode === 'newItem' ? '小項' : (editing?.mode === 'editTop' ? '內容' : '補充內容');
  $('contentInput').placeholder = editing?.mode === 'newItem' ? '把這一項要記錄的細項內容寫在這裡' : '把要補充或修改的內容寫在這裡';
}
function showModal(title, contentValue='', titleValue='') {
  $('modalTitle').textContent = title;
  $('contentInput').value = contentValue || '';
  $('titleInput').value = titleValue || '';
  configureModal();
  $('modalBackdrop').classList.add('show');
  setTimeout(() => (editing?.mode === 'newItem' || editing?.mode === 'editTop' ? $('titleInput') : $('contentInput')).focus(), 60);
}
async function saveModal(e) {
  e.preventDefault();
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  const content = $('contentInput').value.trim();
  const title = $('titleInput').value.trim();
  if(!content) return;
  try {
    if(editing?.mode === 'editTop') {
      if(!title) return;
      if(!confirm('確定要修改這段文字嗎？')) return;
      await addDoc(entriesCol, { type:'textEdit', parentId:editing.parentId, title, content, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    } else if(editing?.mode === 'editReply') {
      if(!confirm('確定要修改這段文字嗎？')) return;
      await addDoc(entriesCol, { type:'replyEdit', parentId:editing.parentId, content, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    } else if(editing?.mode === 'reply') {
      await addDoc(entriesCol, { type:'reply', role:currentRole, parentId:editing.parentId, content, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    } else if(editing?.mode === 'newItem') {
      if(!title) return;
      await addDoc(entriesCol, { type:'item', role:currentRole, title, content, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    }
    closeModal();
  } catch(err) {
    console.error(err);
    alert('儲存失敗：' + (err.message || err));
  }
}
function openEditTop(parentId) {
  const base = baseById(parentId);
  const item = entryById(parentId);
  const rec = base || item;
  if(!rec) return;
  const d = displayRecord(rec);
  editing = { mode:'editTop', parentId };
  showModal('修改事件', d.content || '', d.title || '');
}
function openEditReply(parentId) {
  const reply = entryById(parentId);
  if(!reply) return;
  const edit = latestReplyEdit(parentId);
  editing = { mode:'editReply', parentId };
  showModal('修改補充內容', edit?.content ?? reply.content ?? '');
}
async function deleteEntry(id) {
  const entry = entryById(id);
  if(!entry || !isMine(entry)) return;
  if(!confirm('確定刪除這一筆內容？')) return;
  try { await deleteDoc(doc(db, 'fengtungHandoverEntries', id)); }
  catch(err) { alert('刪除失敗：' + (err.message || err)); }
}

/* 檔案上傳與預覽 */
function openUpload(parentId) {
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  uploadTarget = parentId;
  $('fileInput').value = '';
  $('fileInput').click();
}
async function handleFilePicked(e) {
  const file = e.target.files && e.target.files[0];
  if(!file || !uploadTarget || !currentUser) return;
  if(file.size > 20 * 1024 * 1024) { alert('檔案不能超過 20MB。'); return; }
  $('statusText').textContent = '檔案上傳中…';
  const path = `fengtung-handover/${safePart(currentRole)}/${safePart(uploadTarget)}/${Date.now()}-${safePart(file.name)}`;
  try {
    const storageRef = ref(storage, path);
    await uploadBytes(storageRef, file, { contentType:file.type || 'application/octet-stream' });
    const fileUrl = await getDownloadURL(storageRef);
    await addDoc(entriesCol, { type:'file', role:currentRole, parentId:uploadTarget, fileName:file.name, fileUrl, storagePath:path, contentType:file.type || '', size:file.size, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    $('statusText').textContent = '已連線 Firebase，可共同填寫。';
  } catch(err) {
    $('statusText').textContent = '已連線 Firebase，可共同填寫。';
    alert('上傳失敗：' + (err.message || err));
  }
}
async function deleteFileEntry(id) {
  const f = entryById(id);
  if(!f || !isMine(f)) return;
  if(!confirm('確定刪除這筆相關資料？')) return;
  try {
    if(f.storagePath) await deleteObject(ref(storage, f.storagePath)).catch(() => {});
    await deleteDoc(doc(db, 'fengtungHandoverEntries', id));
  } catch(err) { alert('刪除相關資料失敗：' + (err.message || err)); }
}
function openFile(id) {
  const f = entryById(id);
  if(!f) return;
  if(isImageFile(f)) {
    $('previewTitle').textContent = f.fileName || '圖片預覽';
    $('previewBody').innerHTML = `<img src="${esc(f.fileUrl)}" alt="${esc(f.fileName || '圖片')}"/>`;
    $('previewBackdrop').classList.add('show');
  } else {
    window.open(f.fileUrl, '_blank', 'noopener');
  }
}
function closePreview() {
  $('previewBackdrop').classList.remove('show');
  $('previewBody').innerHTML = '';
}

/* 負責人 */
function openAssign(parentId) {
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  assignTarget = parentId;
  const rec = baseById(parentId) || entryById(parentId);
  if(!rec) return;
  $('mainRoleSelect').value = effectiveMain(rec);
  $('backupRoleSelect').value = effectiveBackup(rec);
  $('assignBackdrop').classList.add('show');
}
function closeAssign() {
  $('assignBackdrop').classList.remove('show');
  assignTarget = null;
}
async function saveAssign(e) {
  e.preventDefault();
  if(!currentUser || !assignTarget) return;
  try {
    await addDoc(entriesCol, { type:'assignment', parentId:assignTarget, primaryRole:$('mainRoleSelect').value, backupRole:$('backupRoleSelect').value, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    closeAssign();
  } catch(err) { alert('調整負責人失敗：' + (err.message || err)); }
}

/* events */
$('roleGrid').addEventListener('click', e => {
  const btn = e.target.closest('[data-role]');
  if(!btn) return;
  currentRole = btn.dataset.role;
  render();
});
$('content').addEventListener('click', e => {
  const reply = e.target.closest('[data-reply]');
  const editTop = e.target.closest('[data-edit-top]');
  const editReply = e.target.closest('[data-edit-reply]');
  const del = e.target.closest('[data-delete]');
  const upload = e.target.closest('[data-upload]');
  const fileDel = e.target.closest('[data-file-delete]');
  const fileOpen = e.target.closest('[data-file-open]');
  const assign = e.target.closest('[data-assign]');
  if(reply) { editing = { mode:'reply', parentId:reply.dataset.reply }; showModal('補充內容'); return; }
  if(editTop) { openEditTop(editTop.dataset.editTop); return; }
  if(editReply) { openEditReply(editReply.dataset.editReply); return; }
  if(del) { deleteEntry(del.dataset.delete); return; }
  if(upload) { openUpload(upload.dataset.upload); return; }
  if(fileDel) { deleteFileEntry(fileDel.dataset.fileDelete); return; }
  if(fileOpen) { openFile(fileOpen.dataset.fileOpen); return; }
  if(assign) { openAssign(assign.dataset.assign); return; }
});
$('scheduleContent').addEventListener('click', e => {
  const edit = e.target.closest('[data-schedule-edit]');
  const del = e.target.closest('[data-schedule-delete]');
  if(edit) { openScheduleModal(edit.dataset.scheduleEdit); return; }
  if(del) { deleteScheduleRow(del.dataset.scheduleDelete); return; }
});
$('addScheduleBtn').addEventListener('click', () => openScheduleModal());
$('addItemBtn').addEventListener('click', () => { editing = { mode:'newItem' }; showModal('新增一項'); });
$('cancelModalBtn').addEventListener('click', closeModal);
$('modalBackdrop').addEventListener('click', e => { if(e.target.id === 'modalBackdrop') closeModal(); });
$('modalForm').addEventListener('submit', saveModal);
$('fileInput').addEventListener('change', handleFilePicked);
$('cancelAssignBtn').addEventListener('click', closeAssign);
$('assignBackdrop').addEventListener('click', e => { if(e.target.id === 'assignBackdrop') closeAssign(); });
$('assignForm').addEventListener('submit', saveAssign);
$('cancelScheduleBtn').addEventListener('click', closeScheduleModal);
$('scheduleModalBackdrop').addEventListener('click', e => { if(e.target.id === 'scheduleModalBackdrop') closeScheduleModal(); });
$('scheduleForm').addEventListener('submit', saveSchedule);
$('closePreviewBtn').addEventListener('click', closePreview);
$('previewBackdrop').addEventListener('click', e => { if(e.target.id === 'previewBackdrop') closePreview(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape') { closePreview(); closeModal(); closeAssign(); closeScheduleModal(); } });

const roleOptions = ROLES.map(r => `<option value="${esc(r.id)}">${esc(r.name)}</option>`).join('') + `<option value="尚未指定">尚未指定</option>`;
$('mainRoleSelect').innerHTML = roleOptions;
$('backupRoleSelect').innerHTML = roleOptions;

render();

onAuthStateChanged(auth, user => {
  currentUser = user;
  if(user) {
    $('statusText').textContent = '已連線 Firebase，可共同填寫。';
    render();
  }
});
signInAnonymously(auth).catch(err => {
  console.error(err);
  $('statusText').textContent = 'Firebase 匿名登入失敗，請確認 Authentication 已啟用匿名登入。';
});
onSnapshot(query(entriesCol, orderBy('createdAt', 'asc')), snap => {
  entries = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  render();
}, err => {
  console.error(err);
  $('statusText').textContent = 'Firestore 讀取失敗，請確認規則已發布。';
});
</script>
</body>
</html>
