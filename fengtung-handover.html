:root {

* { box-sizing:border-box; }
body {

main { padding:10px 14px 34px; }

.sectionHint { font-size:15px; color:var(--muted); font-weight:700; margin:0 2px 12px; line-height:1.5; }
.status { display:none !important; }
.item { background:rgba(255,255,255,.88); border:1px solid rgba(120,100,70,.18); border-left:8px solid var(--roleAccent); border-radius:18px; padding:14px 14px 13px; }
.itemHead { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.itemHead h3 { flex:1; min-width:0; }
.item h3 { margin:0; font-size:19px; line-height:1.35; }
.item p { margin:6px 0 0; white-space:pre-wrap; color:#3f392f; }
.item.added { border-left-style:dashed; background:#fff; }
.item.collab { background:rgba(255,255,255,.70); border-left-width:5px; }
.itemActions { display:flex; gap:8px; flex-wrap:wrap; margin-top:11px; }
.childList { margin-top:10px; display:flex; flex-direction:column; gap:7px; }
.childLine { background:#fff; border:1px solid rgba(120,100,70,.16); border-radius:13px; padding:8px 10px; }
.childText { white-space:pre-wrap; }
.relatedBox { flex:0 0 auto; position:relative; }
.relatedBox summary { list-style:none; user-select:none; cursor:pointer; border:1px solid var(--line); border-radius:999px; background:#fff; color:var(--roleAccent); font-weight:900; font-size:16px; padding:7px 12px; line-height:1.25; box-shadow:0 4px 12px rgba(41,32,18,.06); white-space:nowrap; }
.relatedBox summary::-webkit-details-marker { display:none; }
.relatedBox[open] summary { background:var(--roleAccent); color:#fff; border-color:var(--roleAccent); }
.relatedPanel { position:absolute; right:0; top:calc(100% + 8px); z-index:20; width:min(320px,82vw); background:#fffdf8; border:1px solid var(--line); border-radius:16px; box-shadow:0 16px 40px rgba(42,34,20,.18); padding:10px; display:flex; flex-direction:column; gap:8px; }
.relatedPanelTitle { font-weight:900; color:var(--text); border-bottom:1px solid var(--line); padding:0 2px 6px; margin-bottom:2px; }
.relatedFile { background:#fff; border:1px solid rgba(120,100,70,.16); border-radius:12px; padding:8px 9px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.relatedFile a { color:var(--roleAccent); font-weight:800; text-decoration:none; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.relatedFileActions { flex:0 0 auto; white-space:nowrap; }
.empty { background:#fff; border:1px dashed var(--line); border-radius:18px; padding:18px; color:var(--muted); }
.status { color:var(--muted); font-size:14px; margin:0 0 10px; }
.modalBackdrop { position:fixed; inset:0; background:rgba(30,24,15,.48); display:none; align-items:center; justify-content:center; padding:16px; z-index:50; }
.modalBackdrop.show { display:flex; }
.modal { width:min(680px,100%); max-height:88vh; overflow:auto; background:#fffdf8; border-radius:22px; box-shadow:0 24px 80px rgba(0,0,0,.28); padding:18px; }
.modal h2 { margin:0 0 10px; }
label { display:block; font-weight:900; margin-bottom:6px; }
input[type="text"], textarea { width:100%; border:1px solid var(--line); border-radius:14px; padding:11px; background:#fff; color:var(--text); }
input[type="text"] { min-height:46px; }
textarea { min-height:150px; resize:vertical; }
.field { margin-bottom:12px; }
.field.hidden { display:none; }
.modalActions { display:flex; justify-content:flex-end; gap:8px; margin-top:12px; flex-wrap:wrap; }

.scheduleDetails > summary { list-style:none; cursor:pointer; user-select:none; padding:18px 20px; font-size:clamp(22px,4vw,32px); font-weight:950; display:flex; justify-content:space-between; align-items:center; gap:12px; }

.scheduleTitleBar { display:flex; justify-content:center; align-items:baseline; gap:8px; margin:4px 0 12px; flex-wrap:wrap; }
.scheduleTitleText { font-size:22px; font-weight:950; letter-spacing:.04em; text-align:center; }
.a4Fit { width:100%; overflow:hidden; touch-action:pan-y pinch-zoom; }
.a4Sheet { width:794px; max-width:none; min-height:1123px; margin:0 auto; background:white; border:1px solid #d8d2c7; box-shadow:0 10px 24px rgba(0,0,0,.12); padding:28px 24px; transform-origin:top left; }

.scheduleTable .taskCol { width:345px; }
.scheduleTable .personCol { width:105px; }
.scheduleTable .noteCol { width:148px; }
.cellEdit { font-size:10px; padding:1px 5px; border-radius:999px; margin-left:3px; vertical-align:baseline; line-height:1.4; }
.timeActions { display:flex; gap:3px; flex-wrap:wrap; justify-content:center; margin-top:4px; }

<header>

<main>

    <section class="scheduleShell">

        </div>

    </section>
    <div id="roleGrid" class="roleGrid"></div>
    <section id="rolePanel" class="rolePanel">
      <div class="rolePanelTop">
        <h2 id="currentRoleTitle"></h2>
        <button class="btn" id="addItemBtn">＋新增一項</button>
      </div>
      <p class="status" id="statusText">連線中…</p>
      <div id="content" class="list"></div>
    </section>
  </div>
</main>

<div class="modalBackdrop" id="modalBackdrop">
  <div class="modal">
    <h2 id="modalTitle">新增內容</h2>
    <form id="modalForm">
      <div class="field" id="titleField">
        <label for="titleInput">大項</label>
        <input type="text" id="titleInput" name="title" placeholder="例如：學生請假與臨時狀況">
      </div>
      <div class="field" id="contentField">
        <label for="contentInput" id="contentLabel">小項</label>
        <textarea id="contentInput" name="content" required placeholder="把這一項要記錄的細項內容寫在這裡"></textarea>
      </div>
      <div class="modalActions">
        <button type="button" class="btn secondary" id="cancelModalBtn">取消</button>
        <button type="submit" class="btn">儲存</button>
      </div>
    </form>
  </div>
</div>

const $ = id => document.getElementById(id);
function esc(s='') { return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function roleStyle(role) { return roleColors[role] || roleColors['團務老師']; }
function setRoleVars(role) {
  const c = roleStyle(role);
  document.documentElement.style.setProperty('--roleBg', c.bg);
  document.documentElement.style.setProperty('--roleAccent', c.accent);
}
function expandsToRole(value, role) {
  if(!value) return false;
  const v = value === '全體' || value === '幹部／全體幹部' ? '全體幹部' : value;
  if(v === role) return true;
  if(v === '全體幹部') return role === '全體幹部' || ['團務老師','會長','總務','文書','攝影'].includes(role);
  return false;
}
function primaryForRole(record, role) { return expandsToRole(record.main, role); }
function collabForRole(record, role) {
  return !primaryForRole(record, role) && (record.collabs || []).some(c => expandsToRole(c, role));
}
function primaryBaseRecordsForRole(role) { return BASE_RECORDS.filter(r => primaryForRole(r, role)); }
function collabBaseRecordsForRole(role) { return BASE_RECORDS.filter(r => collabForRole(r, role)); }
function customItemsForRole(role) { return entries.filter(e => e.type === 'item' && e.role === role && !e.parentId); }
function repliesFor(parentId) { return entries.filter(e => e.type === 'reply' && e.parentId === parentId); }
function filesFor(parentId) { return entries.filter(e => e.type === 'file' && e.parentId === parentId); }
function isMine(e) { return currentUser && e.ownerUid === currentUser.uid; }
function textForBase(r) { return (r.description || '').trim(); }
function roleDisplayName(role) { return ROLES.find(r => r.id === role)?.name || role; }
function safePart(s) { return String(s || 'file').replace(/[\/#?%*:|"<>]/g, '_').slice(0,80); }


function scheduleEditsByParent() {
  const map = new Map();
  entries.filter(e => e.type === 'scheduleCellEdit').forEach(e => map.set(e.parentId + '::' + e.field, e));
  return map;
}
function buildScheduleRows() {
  const cellEdits = scheduleEditsByParent();
  const deletes = new Set(entries.filter(e => e.type === 'scheduleDelete').map(e => e.parentId));
  const rows = BASE_SCHEDULE.filter(r => !deletes.has(r.id)).map(r => {
    const row = {...r};
    ['time','task','primary','backup','note'].forEach(field => {
      const ed = cellEdits.get(r.id + '::' + field);
      if(ed) row[field] = ed.value || '';
    });
    return row;
  });
  entries.filter(e => e.type === 'scheduleRow' && !deletes.has(e.id)).forEach(e => {
    const row = {id:e.id, order:e.order || Date.now(), time:e.time || '', task:e.task || '', primary:e.primary || '', backup:e.backup || '', note:e.note || ''};
    ['time','task','primary','backup','note'].forEach(field => {
      const ed = cellEdits.get(e.id + '::' + field);
      if(ed) row[field] = ed.value || '';
    });
    rows.push(row);
  });
  return rows.sort((a,b)=>(a.order || 0) - (b.order || 0));
}
function getScheduleTitle() {
  const titleDocs = entries.filter(e => e.type === 'scheduleTitle');
  return titleDocs.length ? (titleDocs[titleDocs.length - 1].title || '成果展進度表') : '成果展進度表';
}
function scaleA4Sheet() {
  const fit = $('a4Fit'), sheet = $('scheduleContent');
  if(!fit || !sheet) return;
  const available = fit.clientWidth;
  const full = 794;
  const scale = Math.min(1, available / full);
  sheet.style.transform = `scale(${scale})`;
  sheet.style.marginLeft = scale < 1 ? '0' : 'auto';
  sheet.style.marginRight = scale < 1 ? '0' : 'auto';
  fit.style.height = (sheet.scrollHeight * scale + 2) + 'px';
}
function editableCell(row, field, text) {
  return `${esc(text || '')} <button class="btn secondary cellEdit" data-schedule-cell="${esc(row.id)}" data-field="${esc(field)}">修改</button>`;
}
function renderSchedule() {
  if(!$('scheduleContent')) return;
  const title = getScheduleTitle();
  const summary = $('scheduleSummary');
  if(summary) summary.firstChild.nodeValue = title;
  if($('scheduleTitleText')) $('scheduleTitleText').textContent = title;
  const rows = buildScheduleRows();
  const html = `<table class="scheduleTable"><thead><tr><th class="timeCol">時間</th><th class="taskCol">事項</th><th class="personCol">主要負責人</th><th class="personCol">協助負責人</th><th class="noteCol">備註</th></tr></thead><tbody>${rows.map(r => `<tr>
    <td class="timeCol">${editableCell(r,'time',r.time)}<div class="timeActions"><button class="btn secondary" data-schedule-insert-above="${esc(r.id)}">上方新增</button><button class="btn secondary" data-schedule-insert-below="${esc(r.id)}">下方新增</button><button class="btn danger" data-schedule-delete="${esc(r.id)}">刪除這一列</button></div></td>
    <td class="taskCol">${editableCell(r,'task',r.task)}</td>
    <td class="personCol">${editableCell(r,'primary',r.primary)}</td>
    <td class="personCol">${editableCell(r,'backup',r.backup)}</td>
    <td class="noteCol">${editableCell(r,'note',r.note)}</td>
  </tr>`).join('')}</tbody></table>`;
  $('scheduleContent').innerHTML = html;
  requestAnimationFrame(scaleA4Sheet);
}
function orderForInsert(targetId, below=false) {
  const rows = buildScheduleRows();
  const idx = rows.findIndex(r => r.id === targetId);
  if(idx < 0) return Date.now();
  if(!below) {
    const prev = idx > 0 ? rows[idx-1].order : rows[idx].order - 1000;
    return (prev + rows[idx].order) / 2;
  }
  const next = idx < rows.length - 1 ? rows[idx+1].order : rows[idx].order + 1000;
  return (rows[idx].order + next) / 2;
}
async function editScheduleCell(id, field) {
  const rows = buildScheduleRows();
  const row = rows.find(r => r.id === id);
  if(!row) return;
  const labels = {time:'時間', task:'事項', primary:'主要負責人', backup:'協助負責人', note:'備註'};
  const value = prompt(`修改${labels[field] || field}`, row[field] || '');
  if(value === null) return;
  if(!confirm('確定要修改這一格嗎？')) return;
  await addDoc(entriesCol, {type:'scheduleCellEdit', parentId:id, field, value:value.trim(), ownerUid:currentUser.uid, createdAt:serverTimestamp()});
}
async function insertScheduleRow(targetId, below=false) {

  await addDoc(entriesCol, {type:'scheduleRow', order:orderForInsert(targetId, below), time:time.trim(), task:task.trim(), primary:primary.trim(), backup:backup.trim(), note:note.trim(), ownerUid:currentUser.uid, createdAt:serverTimestamp()});
}

function childLines(parentId) {
  const replies = repliesFor(parentId);
  if(!replies.length) return '';
  return `<div class="childList">${replies.map(e => `
    <div class="childLine"><span class="childText">${esc(e.content)}</span>${isMine(e) ? ` <button class="btn secondary small" data-edit="${e.id}">修改</button><button class="btn danger small" data-delete="${e.id}">刪除</button>` : ''}</div>
  `).join('')}</div>`;

function relatedMaterials(parentId) {
  const files = filesFor(parentId);
  if(!files.length) return '';
  return `<details class="relatedBox">
    <summary>📎 相關資料 ${files.length}</summary>
    <div class="relatedPanel">
      <div class="relatedPanelTitle">相關資料</div>
      ${files.map(f => `
        <div class="relatedFile">
          <a href="${esc(f.fileUrl)}" target="_blank" rel="noopener" title="${esc(f.fileName || '資料')}">${fileIcon(f)} ${esc(f.fileName || '資料')}</a>
          <span class="relatedFileActions">${isMine(f) ? `<button class="btn danger small" data-file-delete="${f.id}">刪除</button>` : ''}</span>
        </div>
      `).join('')}
    </div>
  </details>`;
}

function fileIcon(f) {
  const t = f.contentType || '';
  const name = (f.fileName || '').toLowerCase();
  if(t.startsWith('image/')) return '🖼️';
  if(t === 'application/pdf' || name.endsWith('.pdf')) return '📄';
  if(name.endsWith('.doc') || name.endsWith('.docx')) return '📝';
  if(name.endsWith('.xls') || name.endsWith('.xlsx')) return '📊';
  return '📎';
}

function closeModal() {
  $('modalBackdrop').classList.remove('show');
  $('titleInput').value = '';
  $('contentInput').value = '';
  editing = null;
}

function configureModal() {
  const isNewItem = editing?.mode === 'newItem';
  $('titleField').classList.toggle('hidden', !isNewItem);
  $('titleInput').required = isNewItem;
  $('contentLabel').textContent = isNewItem ? '小項' : '補充內容';
  $('contentInput').placeholder = isNewItem ? '把這一項要記錄的細項內容寫在這裡' : '把要補充的內容寫在這裡';
}

function showModal(title, contentValue='', titleValue='') {
  $('modalTitle').textContent = title;
  $('contentInput').value = contentValue || '';
  $('titleInput').value = titleValue || '';
  configureModal();
  $('modalBackdrop').classList.add('show');
  setTimeout(() => (editing?.mode === 'newItem' ? $('titleInput') : $('contentInput')).focus(), 60);
}

async function saveModal(e) {
  e.preventDefault();
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  const content = $('contentInput').value.trim();
  const title = $('titleInput').value.trim();
  if(!content) return;
  try {
    if(editing?.mode === 'edit') {
      const data = { content, updatedAt: serverTimestamp() };
      if(editing.editType === 'item') data.title = title || '新增項目';
      await updateDoc(doc(db, 'fengtungHandoverEntries', editing.id), data);
    } else if(editing?.mode === 'reply') {
      await addDoc(entriesCol, { type:'reply', role:currentRole, parentId:editing.parentId, content, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    } else if(editing?.mode === 'newItem') {
      if(!title) return;
      await addDoc(entriesCol, { type:'item', role:currentRole, title, content, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    }
    closeModal();
  } catch(err) {
    console.error(err);
    alert('儲存失敗：' + (err.message || err));
  }
}

function openEdit(id) {
  const entry = entries.find(e => e.id === id);
  if(!entry || !isMine(entry)) return;
  editing = { mode:'edit', id, editType:entry.type };
  showModal(entry.type === 'item' ? '修改項目' : '修改內容', entry.content || '', entry.title || '');
}

async function deleteEntry(id) {
  const entry = entries.find(e => e.id === id);

  if(!confirm('確定刪除這一筆內容？')) return;
  try { await deleteDoc(doc(db, 'fengtungHandoverEntries', id)); }
  catch(err) { alert('刪除失敗：' + (err.message || err)); }
}

function openUpload(parentId) {
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  uploadTarget = parentId;
  $('fileInput').value = '';
  $('fileInput').click();
}

async function handleFilePicked(e) {
  const file = e.target.files && e.target.files[0];
  if(!file || !uploadTarget || !currentUser) return;
  if(file.size > 20 * 1024 * 1024) { alert('檔案不能超過 20MB。'); return; }
  $('statusText').textContent = '檔案上傳中…';
  const path = `fengtung-handover/${safePart(currentRole)}/${safePart(uploadTarget)}/${Date.now()}-${safePart(file.name)}`;
  try {
    const storageRef = ref(storage, path);
    await uploadBytes(storageRef, file, { contentType: file.type || 'application/octet-stream' });
    const fileUrl = await getDownloadURL(storageRef);
    await addDoc(entriesCol, {
      type:'file', role:currentRole, parentId:uploadTarget,
      fileName:file.name, fileUrl, storagePath:path, contentType:file.type || '', size:file.size,
      ownerUid:currentUser.uid, createdAt:serverTimestamp()
    });
    $('statusText').textContent = '已連線 Firebase，可共同填寫。';
  } catch(err) {
    console.error(err);
    $('statusText').textContent = '已連線 Firebase，可共同填寫。';
    alert('上傳失敗：' + (err.message || err));
  }
}

async function deleteFileEntry(id) {
  const f = entries.find(e => e.id === id);
  if(!f || !isMine(f)) return;
  if(!confirm('確定刪除這筆相關資料？')) return;
  try {
    if(f.storagePath) await deleteObject(ref(storage, f.storagePath)).catch(() => {});
    await deleteDoc(doc(db, 'fengtungHandoverEntries', id));
  } catch(err) { alert('刪除相關資料失敗：' + (err.message || err)); }
}

  const reply = e.target.closest('[data-reply]');
  const edit = e.target.closest('[data-edit]');
  const del = e.target.closest('[data-delete]');
  const upload = e.target.closest('[data-upload]');
  const fileDel = e.target.closest('[data-file-delete]');
  if(reply) { editing = { mode:'reply', parentId:reply.dataset.reply }; showModal('補充內容'); }
  if(edit) openEdit(edit.dataset.edit);
  if(del) deleteEntry(del.dataset.delete);
  if(upload) openUpload(upload.dataset.upload);
  if(fileDel) deleteFileEntry(fileDel.dataset.fileDelete);
});
$('addItemBtn').addEventListener('click', () => { editing = { mode:'newItem' }; showModal('新增一項'); });
$('cancelModalBtn').addEventListener('click', closeModal);
$('modalBackdrop').addEventListener('click', e => { if(e.target.id === 'modalBackdrop') closeModal(); });
$('modalForm').addEventListener('submit', saveModal);
$('fileInput').addEventListener('change', handleFilePicked);

render();

onAuthStateChanged(auth, user => {
  currentUser = user;
  if(user) {
    $('statusText').textContent = '已連線 Firebase，可共同填寫。';
    renderSchedule();
    renderContent();
  }
});

signInAnonymously(auth).catch(err => {
  console.error(err);
  $('statusText').textContent = 'Firebase 匿名登入失敗，請確認 Authentication 已啟用匿名登入。';
});

onSnapshot(query(entriesCol, orderBy('createdAt', 'asc')), snap => {
  entries = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  renderSchedule();
  renderContent();
}, err => {
  console.error(err);
  $('statusText').textContent = 'Firestore 讀取失敗，請確認規則已發布。';
});
</script>
</body>
</html>
