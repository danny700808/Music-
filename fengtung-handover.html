async function editItemTitle(id){const it=entries.find(x=>x.id===id);if(!it||!currentUser)return;const eff=effectiveItem(it);const title=prompt('修改大項名稱',eff.title);if(title===null)return;if(!confirm('確定要修改大項名稱嗎？'))return;try{await addDoc(entriesCol,{type:'itemEdit',targetId:id,title:title.trim()||'新增項目',content:eff.content,role:it.role,ownerUid:currentUser.uid,createdAt:serverTimestamp()})}catch(err){alert('修改失敗：'+(err.message||err))}}
async function deleteEntry(id){const e=entries.find(x=>x.id===id);if(!e||!confirm('確定刪除這一筆內容？'))return;try{if(isMine(e))await deleteDoc(doc(db,'fengtungHandoverEntries',id));else await addDoc(entriesCol,{type:e.type==='reply'?'replyDelete':'itemDelete',targetId:id,ownerUid:currentUser.uid,createdAt:serverTimestamp()})}catch(err){alert('刪除失敗：'+(err.message||err))}}
async function promptAssign(id){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const b=BASE_RECORDS.find(x=>x.id===id),it=entries.find(x=>x.id===id);const a=b?assignmentForBase(b):assignmentForItem(it);const p=prompt('主要負責人',assignmentRoleName(a.primaryRole));if(p===null)return;const bk=prompt('備援負責人',assignmentRoleName(a.backupRole));if(bk===null)return;if(!confirm('確定要調整負責人嗎？'))return;try{await addDoc(entriesCol,{type:'assignment',parentId:id,primaryRole:normalizeRole(p.trim()),backupRole:normalizeRole(bk.trim()),ownerUid:currentUser.uid,createdAt:serverTimestamp()})}catch(err){alert('調整失敗：'+(err.message||err))}}
async function openUpload(id){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');uploadTarget=id;$('fileInput').value='';$('fileInput').click()} async function handleFilePicked(e){const file=e.target.files?.[0];if(!file||!uploadTarget)return;if(file.size>20*1024*1024)return alert('檔案不能超過20MB。');const path=`fengtung-handover/${safePart(currentRole)}/${safePart(uploadTarget)}/${Date.now()}-${safePart(file.name)}`;try{const sr=ref(storage,path);await uploadBytes(sr,file,{contentType:file.type||'application/octet-stream'});const fileUrl=await getDownloadURL(sr);await addDoc(entriesCol,{type:'file',role:currentRole,parentId:uploadTarget,fileName:file.name,fileUrl,storagePath:path,contentType:file.type||'',size:file.size,ownerUid:currentUser.uid,createdAt:serverTimestamp()})}catch(err){alert('上傳失敗：'+(err.message||err))}} async function deleteFileEntry(id){const f=entries.find(e=>e.id===id);if(!f||!isMine(f)||!confirm('確定刪除這個資料？'))return;try{if(f.storagePath)await deleteObject(ref(storage,f.storagePath)).catch(()=>{});await deleteDoc(doc(db,'fengtungHandoverEntries',id))}catch(err){alert('刪除失敗：'+(err.message||err))}}
function progressEditsFor(id){return entries.filter(e=>e.type==='progressEdit'&&e.scheduleId===id)} function latestProgressEdit(id){const a=progressEditsFor(id);return a.length?a[a.length-1]:null} function progressRows(){const base=PROGRESS_BASE.map(r=>({...r,source:'base'}));const custom=entries.filter(e=>e.type==='progressRow').map(e=>({id:e.scheduleId||e.id,source:'custom',order:typeof e.order==='number'?e.order:999,time:e.time||'',item:e.item||'',primary:e.primary||'',helper:e.helper||'',note:e.note||''}));return[...base,...custom].map(r=>{const ed=latestProgressEdit(r.id);return ed?{...r,time:ed.time??r.time,item:ed.item??r.item,primary:ed.primary??r.primary,helper:ed.helper??r.helper,note:ed.note??r.note,order:typeof ed.order==='number'?ed.order:r.order,hidden:!!ed.hidden}:r}).filter(r=>!r.hidden).sort((a,b)=>(a.order||0)-(b.order||0))}
function progressCell(text,id,field){return`<span class="progressCellText">${esc(text||'')}</span><button type="button" class="progressMiniBtn progressInlineEdit" data-progress-cell="${esc(id)}" data-field="${esc(field)}">修改</button>`} function renderProgress(){if(!$('progressTable'))return;const rows=progressRows();$('progressTable').innerHTML=`<thead><tr><th class="timeCol">時間</th><th class="itemCol">事項</th><th class="ownerCol">主要負責人</th><th class="helperCol">協助負責人</th><th class="noteCol">備註</th></tr></thead><tbody>${rows.map(r=>`<tr><td class="timeCol">${progressCell(r.time,r.id,'time')}<div class="progressActions"><button type="button" class="progressMiniBtn" data-progress-edit="${r.id}">修改整列</button><button type="button" class="progressMiniBtn" data-progress-add-before="${r.id}">上方新增</button><button type="button" class="progressMiniBtn" data-progress-add-after="${r.id}">下方新增</button><button type="button" class="progressMiniBtn danger" data-progress-delete="${r.id}">刪除這一列</button></div></td><td>${progressCell(r.item,r.id,'item')}</td><td>${progressCell(r.primary,r.id,'primary')}</td><td>${progressCell(r.helper,r.id,'helper')}</td><td>${progressCell(r.note,r.id,'note')}</td></tr>`).join('')}</tbody>`}
function openProgressModal(mode,row=null,order=null){progressModalState={mode,rowId:row?.id||null,order};$('progressModalTitle').textContent=mode==='new'?'新增行程':'修改行程';$('progressTimeInput').value=row?.time||'';$('progressItemInput').value=row?.item||'';$('progressPrimaryInput').value=row?.primary||'';$('progressHelperInput').value=row?.helper||'';$('progressNoteInput').value=row?.note||'';$('progressModalBackdrop').classList.add('show')} function closeProgressModal(){$('progressModalBackdrop').classList.remove('show');progressModalState=null} async function saveProgressModal(e){e.preventDefault();if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const data={time:$('progressTimeInput').value.trim(),item:$('progressItemInput').value.trim(),primary:$('progressPrimaryInput').value.trim(),helper:$('progressHelperInput').value.trim(),note:$('progressNoteInput').value.trim(),ownerUid:currentUser.uid,createdAt:serverTimestamp()};if(!data.item)return;try{if(progressModalState.mode==='new'){await addDoc(entriesCol,{type:'progressRow',scheduleId:'progress-'+Date.now()+'-'+Math.random().toString(36).slice(2,7),order:progressModalState.order??Date.now(),...data})}else await addDoc(entriesCol,{type:'progressEdit',scheduleId:progressModalState.rowId,...data});closeProgressModal()}catch(err){alert('儲存行程失敗：'+(err.message||err))}}
async function saveProgressCell(id,field){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const row=progressRows().find(r=>r.id===id);if(!row)return;const label={time:'時間',item:'事項',primary:'主要負責人',helper:'協助負責人',note:'備註'}[field]||'內容';const next=prompt('修改'+label,row[field]||'');if(next===null)return;if(!confirm('確定要修改這一格嗎？'))return;const data={time:row.time||'',item:row.item||'',primary:row.primary||'',helper:row.helper||'',note:row.note||'',order:row.order||0};data[field]=next.trim();try{await addDoc(entriesCol,{type:'progressEdit',scheduleId:id,...data,ownerUid:currentUser.uid,createdAt:serverTimestamp()})}catch(err){alert('修改失敗：'+(err.message||err))}}
async function deleteProgressRow(id){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const row=progressRows().find(r=>r.id===id);if(!row||!confirm('確定要刪除這一列嗎？'))return;try{await addDoc(entriesCol,{type:'progressEdit',scheduleId:id,hidden:true,order:row.order||0,ownerUid:currentUser.uid,createdAt:serverTimestamp()})}catch(err){alert('刪除失敗：'+(err.message||err))}} function addProgressNear(id,after=false){const rows=progressRows(),i=rows.findIndex(r=>r.id===id),row=rows[i],nb=rows[after?i+1:i-1];let order=!row?Date.now():nb?(row.order+nb.order)/2:row.order + (after ? 0.5 : -0.5);openProgressModal('new',null,order)}
$('roleGrid').addEventListener('click',e=>{const b=e.target.closest('[data-role]');if(!b)return;currentRole=b.dataset.role;render()});$('content').addEventListener('click',e=>{const reply=e.target.closest('[data-reply]'),upload=e.target.closest('[data-upload]'),assign=e.target.closest('[data-assign]'),line=e.target.closest('[data-line-edit]'),itemTitle=e.target.closest('[data-item-title-edit]'),del=e.target.closest('[data-delete]'),fileDel=e.target.closest('[data-file-delete]');if(reply){editing={mode:'reply',parentId:reply.dataset.reply};showModal('補充內容')}if(upload)openUpload(upload.dataset.upload);if(assign)promptAssign(assign.dataset.assign);if(line)editLine(line.dataset.lineEdit,line.dataset.lineKind);if(itemTitle)editItemTitle(itemTitle.dataset.itemTitleEdit);if(del)deleteEntry(del.dataset.delete);if(fileDel)deleteFileEntry(fileDel.dataset.fileDelete)});$('addItemBtn').addEventListener('click',()=>{editing={mode:'newItem'};showModal('新增一項')});$('cancelModalBtn').addEventListener('click',closeModal);$('modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')closeModal()});$('modalForm').addEventListener('submit',saveModal);$('fileInput').addEventListener('change',handleFilePicked);
$('progressToggleBtn').addEventListener('click',()=>{$('progressBody').classList.toggle('collapsed');$('progressToggleBtn').textContent=$('progressBody').classList.contains('collapsed')?'展開':'收合'});$('addProgressRowBtn').addEventListener('click',()=>openProgressModal('new',null,Date.now()));$('editProgressTitleBtn').addEventListener('click',()=>alert('標題目前固定為「成果展進度表」。'));$('progressTable').addEventListener('click',e=>{const cell=e.target.closest('[data-progress-cell]'),edit=e.target.closest('[data-progress-edit]'),del=e.target.closest('[data-progress-delete]'),before=e.target.closest('[data-progress-add-before]'),after=e.target.closest('[data-progress-add-after]');if(cell)saveProgressCell(cell.dataset.progressCell,cell.dataset.field);if(edit){const row=progressRows().find(r=>r.id===edit.dataset.progressEdit);if(row)openProgressModal('edit',row)}if(del)deleteProgressRow(del.dataset.progressDelete);if(before)addProgressNear(before.dataset.progressAddBefore,false);if(after)addProgressNear(after.dataset.progressAddAfter,true)});$('cancelProgressModalBtn').addEventListener('click',closeProgressModal);$('progressModalBackdrop').addEventListener('click',e=>{if(e.target.id==='progressModalBackdrop')closeProgressModal()});$('progressModalForm').addEventListener('submit',saveProgressModal);
render();onAuthStateChanged(auth,u=>{currentUser=u;if(u){$('statusText').textContent='已連線 Firebase，可共同填寫。';render()}});signInAnonymously(auth).catch(err=>{$('statusText').textContent='Firebase 匿名登入失敗。';console.error(err)});onSnapshot(query(entriesCol,orderBy('createdAt','asc')),snap=>{entries=snap.docs.map(d=>({id:d.id,...d.data()}));render()},err=>{$('statusText').textContent='Firestore 讀取失敗，請確認規則。';console.error(err)});
</script></body></html>
