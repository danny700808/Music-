<style>
:root {
  --bg:#f7f4ed;
  --panel:#fffdf8;
  --text:#2d2922;

  --line:#e4d9c8;
  --roleBg:#DDEBF7;

* { box-sizing:border-box; }
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
  background:linear-gradient(180deg,#fbf7ee 0%,#f2eadf 100%);
  color:var(--text);
  line-height:1.7;
}
.wrap { max-width:1080px; margin:0 auto; }
header { padding:22px 14px 8px; }
.hero {
  background:#ffffff;
  border:1px solid var(--line);
  border-radius:22px;
  padding:22px 20px;
  box-shadow:var(--shadow);
}
.hero h1 { margin:0; font-size:clamp(26px,5vw,40px); letter-spacing:.05em; text-align:center; }
main { padding:10px 14px 34px; }
.roleGrid {
  display:grid;
  grid-template-columns:repeat(6,minmax(0,1fr));
  gap:12px;
  margin:16px 0 18px;
}
.roleBtn {
  appearance:none;
  border:2px solid transparent;
  border-radius:18px;
  padding:18px 10px;
  min-height:76px;
  cursor:pointer;
  font-weight:900;
  font-size:20px;
  color:#2d2922;
  box-shadow:0 7px 18px rgba(41,32,18,.07);
  transition:.16s;
}
.roleBtn:hover { transform:translateY(-2px); }
.roleBtn.active {
  border-color:var(--roleAccent);
  box-shadow:0 0 0 4px rgba(255,255,255,.8), 0 0 0 7px color-mix(in srgb, var(--roleAccent) 28%, transparent), var(--shadow);
}
.rolePanel {
  background:var(--roleBg);
  border:2px solid color-mix(in srgb, var(--roleAccent) 46%, #fff);
  border-radius:24px;
  padding:16px;
  box-shadow:var(--shadow);
}
.rolePanelTop {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:12px;
}
.rolePanel h2 { margin:0; font-size:clamp(24px,4.5vw,34px); }
button, textarea { font:inherit; }
.btn {
  border:none;
  border-radius:13px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:800;
  background:var(--roleAccent);
  color:#fff;
}
.btn.secondary { background:#fff; color:var(--text); border:1px solid var(--line); }
.btn.ghost { background:#fff; color:var(--roleAccent); border:1px solid color-mix(in srgb, var(--roleAccent) 48%, #fff); }
.btn.danger { background:var(--danger); color:#fff; }
.list { display:flex; flex-direction:column; gap:10px; }
.item {
  background:rgba(255,255,255,.86);
  border:1px solid rgba(120,100,70,.18);
  border-left:8px solid var(--roleAccent);
  border-radius:18px;
  padding:14px 14px 13px;
}
.item h3 { margin:0; font-size:19px; line-height:1.35; }
.item p { margin:6px 0 0; white-space:pre-wrap; color:#3f392f; }
.item.added { border-left-style:dashed; background:#fff; }
.itemActions { display:flex; gap:8px; flex-wrap:wrap; margin-top:11px; }
.empty { background:#fff; border:1px dashed var(--line); border-radius:18px; padding:18px; color:var(--muted); }
.modalBackdrop { position:fixed; inset:0; background:rgba(30,24,15,.48); display:none; align-items:center; justify-content:center; padding:16px; z-index:50; }
.modalBackdrop.show { display:flex; }
.modal { width:min(680px,100%); max-height:88vh; overflow:auto; background:#fffdf8; border-radius:22px; box-shadow:0 24px 80px rgba(0,0,0,.28); padding:18px; }
.modal h2 { margin:0 0 10px; }
label { display:block; font-weight:900; margin-bottom:6px; }
textarea { width:100%; min-height:150px; resize:vertical; border:1px solid var(--line); border-radius:14px; padding:11px; background:#fff; color:var(--text); }
.modalActions { display:flex; justify-content:flex-end; gap:8px; margin-top:12px; flex-wrap:wrap; }
@media (max-width:920px) { .roleGrid { grid-template-columns:repeat(3,minmax(0,1fr)); } }
@media (max-width:620px) {
  header { padding:12px 10px 6px; }
  main { padding:8px 10px 26px; }
  .hero { padding:18px 14px; border-radius:18px; }
  .roleGrid { grid-template-columns:repeat(2,minmax(0,1fr)); gap:9px; }
  .roleBtn { min-height:64px; font-size:18px; padding:14px 8px; }
  .rolePanel { padding:12px; border-radius:20px; }
}
</style>
</head>

<header>

    </section>
  </div>
</main>

      <div class="modalActions">
        <button type="button" class="btn secondary" onclick="closeModal()">取消</button>
        <button type="submit" class="btn">儲存</button>
      </div>
    </form>
  </div>
</div>

const ROLES = [
  { id:'團務老師', name:'團務老師' },
  { id:'會長', name:'會長' },
  { id:'總務', name:'總務' },
  { id:'文書', name:'文書' },
  { id:'攝影', name:'攝影' },
  { id:'全體幹部', name:'全體幹部' }
];

const roleColors = {
  '團務老師': { bg:'#DDEBF7', accent:'#5B9BD5' },
  '會長': { bg:'#FFF2CC', accent:'#BF9000' },
  '總務': { bg:'#E2F0D9', accent:'#70AD47' },
  '文書': { bg:'#EADCF8', accent:'#8E63C7' },
  '攝影': { bg:'#FCE4D6', accent:'#ED7D31' },
  '全體幹部': { bg:'#E7E6E6', accent:'#7F7F7F' }
};

const STORE_KEY = 'fengtung_handover_simple_v2';
const OLD_STORE_KEY = 'fengtung_handover_v1';
let currentRole = '團務老師';
let state = loadState();
let editing = null;

function loadState() {
  try {
    const v2 = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
    if (v2 && Array.isArray(v2.entries)) return v2;
  } catch(e) {}
  try {
    const old = JSON.parse(localStorage.getItem(OLD_STORE_KEY) || 'null');
    if (old) {
      const entries = [];
      (old.tasks || []).forEach(t => entries.push({
        id: t.id || uid('item'), type:'item', role: t.ownerRole || t.main || '團務老師', content: [t.item, t.description].filter(Boolean).join('
'), createdAt: new Date().toISOString()
      }));
      (old.supplements || []).forEach(s => entries.push({
        id: s.id || uid('reply'), type:'reply', role: s.role || '團務老師', parentId: s.recordId, content: s.content || '', createdAt: s.createdAt || new Date().toISOString()
      }));
      return { entries };
    }
  } catch(e) {}
  return { entries: [] };
}
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function uid(prefix='id') { return prefix + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,7); }
function esc(s='') { return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function roleStyle(role) { return roleColors[role] || roleColors['團務老師']; }
function setRoleVars(role) {
  const c = roleStyle(role);
  document.documentElement.style.setProperty('--roleBg', c.bg);
  document.documentElement.style.setProperty('--roleAccent', c.accent);
}
function expandsToRole(value, role) {
  if(!value) return false;
  const v = value === '全體' || value === '幹部／全體幹部' ? '全體幹部' : value;
  if(v === role) return true;
  if(v === '全體幹部') return role === '全體幹部' || ['團務老師','會長','總務','文書','攝影'].includes(role);
  return false;
}
function visibleForRole(record, role) {
  return expandsToRole(record.main, role) || (record.collabs || []).some(c => expandsToRole(c, role));
}
function baseRecordsForRole(role) { return BASE_RECORDS.filter(r => visibleForRole(r, role)); }
function customItemsForRole(role) { return state.entries.filter(e => e.type === 'item' && e.role === role && !e.parentId); }
function repliesFor(parentId) { return state.entries.filter(e => e.type === 'reply' && e.parentId === parentId); }
function textForBase(r) { return (r.description || '').trim(); }

function renderRoles() {
  document.getElementById('roleGrid').innerHTML = ROLES.map(r => {
    const c = roleStyle(r.id);
    return `<button class="roleBtn ${currentRole===r.id?'active':''}" style="background:${c.bg}" onclick="selectRole('${r.id}')">${esc(r.name)}</button>`;
  }).join('');
}
function selectRole(role) { currentRole = role; render(); }

function renderBaseCard(r) {
  const replies = repliesFor(r.id);
  return `
    <article class="item">
      <h3>${esc(r.item)}</h3>
      ${textForBase(r) ? `<p>${esc(textForBase(r))}</p>` : ''}
      <div class="itemActions"><button class="btn ghost" onclick="openReply('${r.id}')">＋補充內容</button></div>
    </article>
    ${replies.map(renderEntryCard).join('')}`;
}
function renderEntryCard(e) {
  return `<article class="item added">
    <p>${esc(e.content)}</p>
    <div class="itemActions">
      <button class="btn secondary" onclick="openEdit('${e.id}')">修改</button>
      <button class="btn danger" onclick="deleteEntry('${e.id}')">刪除</button>
    </div>
  </article>`;
}
function renderContent() {
  const bases = baseRecordsForRole(currentRole);
  const customs = customItemsForRole(currentRole);
  const html = [
    ...bases.map(renderBaseCard),
    ...customs.map(renderEntryCard)
  ].join('');
  document.getElementById('content').innerHTML = html || '<div class="empty">目前還沒有內容。</div>';
}
function render() {
  setRoleVars(currentRole);
  renderRoles();
  document.getElementById('currentRoleTitle').textContent = currentRole;
  renderContent();
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('show');
  document.getElementById('contentInput').value = '';
  editing = null;
}
function showModal(title, value='') {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('contentInput').value = value;
  document.getElementById('modalBackdrop').classList.add('show');
  setTimeout(()=>document.getElementById('contentInput').focus(), 60);
}
document.getElementById('modalBackdrop').addEventListener('click', e => { if(e.target.id === 'modalBackdrop') closeModal(); });
document.getElementById('addItemBtn').addEventListener('click', () => { editing = { mode:'newItem' }; showModal('新增內容'); });
function openReply(parentId) { editing = { mode:'reply', parentId }; showModal('補充內容'); }
function openEdit(id) {
  const entry = state.entries.find(e => e.id === id);
  if(!entry) return;
  editing = { mode:'edit', id };
  showModal('修改內容', entry.content || '');
}
function deleteEntry(id) {
  if(!confirm('確定刪除這一筆內容？')) return;
  state.entries = state.entries.filter(e => e.id !== id);
  saveState();
  renderContent();
}
document.getElementById('modalForm').addEventListener('submit', e => {
  e.preventDefault();
  const content = document.getElementById('contentInput').value.trim();
  if(!content) return;
  if(editing?.mode === 'edit') {
    state.entries = state.entries.map(x => x.id === editing.id ? { ...x, content, updatedAt:new Date().toISOString() } : x);
  } else if(editing?.mode === 'reply') {
    state.entries.push({ id:uid('reply'), type:'reply', role:currentRole, parentId:editing.parentId, content, createdAt:new Date().toISOString() });
  } else {
    state.entries.push({ id:uid('item'), type:'item', role:currentRole, content, createdAt:new Date().toISOString() });
  }
  saveState();
  closeModal();
  renderContent();
});

render();
