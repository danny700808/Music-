<style>
:root {
  --bg:#f7f4ed;
  --panel:#fffdf8;
  --text:#2d2922;
  --muted:#7a7166;
  --line:#e4d9c8;
  --roleBg:#DDEBF7;
  --roleAccent:#5B9BD5;
  --danger:#b94a48;
  --shadow:0 12px 28px rgba(48,39,24,.10);

* { box-sizing:border-box; }
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
  background:linear-gradient(180deg,#fbf7ee 0%,#f2eadf 100%);
  color:var(--text);
  line-height:1.7;
}
.wrap { max-width:1080px; margin:0 auto; }
header { padding:22px 14px 8px; }
.hero { background:#fff; border:1px solid var(--line); border-radius:22px; padding:22px 20px; box-shadow:var(--shadow); }
.hero h1 { margin:0; font-size:clamp(26px,5vw,40px); letter-spacing:.05em; text-align:center; }
main { padding:10px 14px 34px; }
.roleGrid { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:12px; margin:16px 0 18px; }
.roleBtn { appearance:none; border:2px solid transparent; border-radius:18px; padding:18px 10px; min-height:76px; cursor:pointer; font-weight:900; font-size:20px; color:#2d2922; box-shadow:0 7px 18px rgba(41,32,18,.07); transition:.16s; }
.roleBtn:hover { transform:translateY(-2px); }
.roleBtn.active { border-color:var(--roleAccent); box-shadow:0 0 0 4px rgba(255,255,255,.8), var(--shadow); }
.rolePanel { background:var(--roleBg); border:2px solid rgba(0,0,0,.08); border-radius:24px; padding:16px; box-shadow:var(--shadow); }
.rolePanelTop { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
.rolePanel h2 { margin:0; font-size:clamp(24px,4.5vw,34px); }
button, textarea, input { font:inherit; }
.btn { border:none; border-radius:13px; padding:10px 14px; cursor:pointer; font-weight:800; background:var(--roleAccent); color:#fff; }
.btn.secondary { background:#fff; color:var(--text); border:1px solid var(--line); }
.btn.ghost { background:#fff; color:var(--roleAccent); border:1px solid var(--line); }
.btn.danger { background:var(--danger); color:#fff; }
.btn.small { padding:3px 8px; border-radius:999px; font-size:13px; line-height:1.5; margin-left:6px; vertical-align:baseline; }
.list { display:flex; flex-direction:column; gap:10px; }

.item h3 { margin:0; font-size:19px; line-height:1.35; }
.item p { margin:6px 0 0; white-space:pre-wrap; color:#3f392f; }
.item.added { border-left-style:dashed; background:#fff; }
.itemActions { display:flex; gap:8px; flex-wrap:wrap; margin-top:11px; }
.childList { margin-top:10px; display:flex; flex-direction:column; gap:7px; }
.childLine { background:#fff; border:1px solid rgba(120,100,70,.16); border-radius:13px; padding:8px 10px; }
.childText { white-space:pre-wrap; }
.attachments { margin-top:10px; display:flex; flex-direction:column; gap:8px; }
.attachmentBox { margin-top:10px; }
.attachmentBox summary { display:inline-block; cursor:pointer; color:var(--roleAccent); font-weight:900; border:1px solid var(--line); border-radius:999px; padding:5px 11px; background:#fff; list-style:none; }
.attachmentBox summary::-webkit-details-marker { display:none; }
.attachment { background:#fff; border:1px solid rgba(120,100,70,.16); border-radius:13px; padding:8px 10px; }
.attachment a { color:var(--roleAccent); font-weight:800; text-decoration:none; }
.attachment img { display:none; max-width:220px; max-height:160px; border-radius:10px; margin-top:6px; border:1px solid var(--line); object-fit:cover; }
.empty { background:#fff; border:1px dashed var(--line); border-radius:18px; padding:18px; color:var(--muted); }
.status { color:var(--muted); font-size:14px; margin:0 0 10px; }
.modalBackdrop { position:fixed; inset:0; background:rgba(30,24,15,.48); display:none; align-items:center; justify-content:center; padding:16px; z-index:50; }
.modalBackdrop.show { display:flex; }
.modal { width:min(680px,100%); max-height:88vh; overflow:auto; background:#fffdf8; border-radius:22px; box-shadow:0 24px 80px rgba(0,0,0,.28); padding:18px; }
.modal h2 { margin:0 0 10px; }
label { display:block; font-weight:900; margin-bottom:6px; }
input[type="text"], textarea, select { width:100%; border:1px solid var(--line); border-radius:14px; padding:11px; background:#fff; color:var(--text); }
input[type="text"], select { min-height:46px; }
textarea { min-height:150px; resize:vertical; }
.field { margin-bottom:12px; }
.field.hidden { display:none; }
.modalActions { display:flex; justify-content:flex-end; gap:8px; margin-top:12px; flex-wrap:wrap; }

/* 成果展進度表：A4 預覽、手機可左右滑動，避免右側空白框跑版 */
.progressSection { background:#fffdf8; border:1px solid var(--line); border-radius:22px; box-shadow:var(--shadow); margin:14px 0 18px; overflow:hidden; }
.progressTop { display:flex; align-items:center; justify-content:center; gap:12px; padding:18px 22px; border-bottom:1px solid var(--line); background:#b52b1f; color:#fff; position:relative; text-align:center; }
.progressTop h2 { margin:0; font-size:clamp(24px,4.6vw,36px); letter-spacing:.03em; color:#fff; flex:1; }
.progressToggle { position:absolute; right:18px; top:50%; transform:translateY(-50%); background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.45); border-radius:999px; color:#fff; font-weight:900; font-size:16px; cursor:pointer; padding:6px 12px; }
.progressBody { padding:16px; }
.progressBody.collapsed { display:none; }
.progressTabs { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin:0 0 14px; }
.progressTab { border:none; border-radius:12px; padding:12px 10px; background:#b52b1f; color:#fff; font-weight:950; cursor:pointer; letter-spacing:.02em; }
.progressTab.active { background:#8f1d15; box-shadow:inset 0 0 0 2px rgba(255,255,255,.45); }
.progressTab:hover { filter:brightness(.96); }
.progressTitleRow { display:flex; align-items:center; justify-content:center; gap:14px; margin:4px 0 16px; flex-wrap:wrap; }
.progressTitleRow h3 { margin:0; font-size:clamp(25px,5vw,40px); line-height:1.2; font-weight:950; letter-spacing:.04em; }
.progressAddBtn { margin:0 0 12px; }
.progressScroll { width:100%; overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch; border:1px solid #e7dfd2; background:#fff; padding:10px; }
.progressPaper { width:980px; max-width:none; margin:0 auto; background:#fff; padding:18px 18px 22px; }
.progressTable { width:100%; border-collapse:collapse; table-layout:fixed; background:#fff; color:#111; font-size:13px; line-height:1.45; }
.progressTable th, .progressTable td { border:1.4px solid #222; vertical-align:top; padding:8px 7px; word-break:break-word; overflow-wrap:anywhere; }
.progressTable th { background:#f3efe4; text-align:center; font-weight:900; }
.progressTable .timeCol { width:82px; text-align:center; }
.progressTable .itemCol { width:43%; }
.progressTable .ownerCol { width:150px; }
.progressTable .helperCol { width:150px; }
.progressTable .noteCol { width:210px; }
.progressCellText { white-space:pre-wrap; }
.progressActions { display:flex; flex-direction:column; align-items:center; gap:4px; margin-top:5px; }
.progressInlineEdit { display:inline-block; margin-left:5px; }
.progressMiniBtn { border:1px solid #d9cfc0; background:#fffdf8; color:#2d2922; border-radius:999px; padding:2px 7px; font-size:10px; line-height:1.4; font-weight:900; cursor:pointer; vertical-align:baseline; white-space:nowrap; }
.progressMiniBtn.danger { background:#b94a48; border-color:#b94a48; color:#fff; }
.progressMiniBtn:hover { filter:brightness(.96); }
.progressHint { color:#7a7166; font-size:13px; margin:8px 2px 0; }
.eventLineList { margin-top:12px; display:flex; flex-direction:column; gap:8px; }
.eventLine { display:flex; align-items:flex-start; gap:6px; color:#3f392f; }
.eventLine .bullet { flex:0 0 auto; font-weight:950; color:#111; }
.eventLine .lineText { white-space:pre-wrap; flex:1; min-width:0; }
.itemMeta { margin-top:12px; }
.itemActions .btn.ghost { font-size:13px; padding:7px 10px; border-radius:12px; }
.roleTag { font-size:13px; padding:5px 9px; }
.itemHead h3 .btn.small { font-size:13px; padding:2px 7px; }
@media (max-width:620px) {

  .progressBody { padding:12px 10px; }
  .progressScroll { padding:7px; }
  .progressPaper { width:920px; padding:14px; }

@media (max-width:920px) { .roleGrid { grid-template-columns:repeat(3,minmax(0,1fr)); } }

</style>

<header>
  <div class="wrap hero"><h1>豐東管樂交接資料庫</h1></div>
</header>
<main>
  <div class="wrap">

    <section class="progressSection" id="progressSection">
      <div class="progressTop">
        <h2>初賽／決賽／成果展進度表</h2>
        <button type="button" class="progressToggle" id="progressToggleBtn">展開</button>
      </div>
      <div class="progressBody collapsed" id="progressBody">
        <div class="progressTabs" id="progressTabs"></div>
        <div class="progressTitleRow">
          <h3 id="progressTitleText">成果展進度表</h3>
          <button type="button" class="btn secondary" id="editProgressTitleBtn">修改</button>
        </div>
        <div class="progressScroll">
          <div class="progressPaper">
            <table class="progressTable" id="progressTable"></table>
          </div>
        </div>
        <div class="progressHint">手機可左右滑動表格；每一列都可以修改、上方新增、下方新增或刪除。</div>
      </div>
    </section>

    <div id="roleGrid" class="roleGrid"></div>
    <section id="rolePanel" class="rolePanel">
      <div class="rolePanelTop">
        <h2 id="currentRoleTitle"></h2>
        <button class="btn" id="addItemBtn">＋新增一項</button>
      </div>
      <p class="status" id="statusText">連線中…</p>
      <div id="content" class="list"></div>
    </section>
  </div>
</main>

<div class="modalBackdrop" id="modalBackdrop">
  <div class="modal">
    <h2 id="modalTitle">新增內容</h2>
    <form id="modalForm">
      <div class="field" id="titleField">
        <label for="titleInput">大項</label>
        <input type="text" id="titleInput" name="title" placeholder="例如：學生請假與臨時狀況">
      </div>
      <div class="field" id="contentField">
        <label for="contentInput" id="contentLabel">小項</label>
        <textarea id="contentInput" name="content" required placeholder="把這一項要記錄的細項內容寫在這裡"></textarea>
      </div>
      <div class="modalActions">
        <button type="button" class="btn secondary" id="cancelModalBtn">取消</button>
        <button type="submit" class="btn">儲存</button>
      </div>
    </form>
  </div>
</div>


<div class="modalBackdrop" id="progressModalBackdrop">
  <div class="modal">
    <h2 id="progressModalTitle">修改行程</h2>
    <form id="progressModalForm">
      <div class="field"><label>時間</label><div class="timeSelectRow"><select id="progressHourSelect"></select><span>:</span><select id="progressMinuteSelect"></select></div></div>
      <div class="field"><label for="progressItemInput">事項</label><textarea id="progressItemInput" required placeholder="要做的事情"></textarea></div>
      <div class="field"><label for="progressPrimarySelect">主要負責人</label><select id="progressPrimarySelect"></select><input type="text" id="progressPrimaryOther" placeholder="請輸入其他負責人" style="display:none;margin-top:8px"></div>
      <div class="field"><label for="progressHelperSelect">協助負責人</label><select id="progressHelperSelect"></select><input type="text" id="progressHelperOther" placeholder="請輸入其他協助負責人" style="display:none;margin-top:8px"></div>
      <div class="field"><label for="progressNoteInput">備註</label><textarea id="progressNoteInput" placeholder="備註內容"></textarea></div>
      <div class="modalActions">
        <button type="button" class="btn secondary" id="cancelProgressModalBtn">取消</button>
        <button type="submit" class="btn">儲存</button>
      </div>
    </form>
  </div>
</div>

<input id="fileInput" type="file" style="display:none" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx">

const $ = id => document.getElementById(id);
function esc(s='') { return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function roleStyle(role) { return roleColors[role] || roleColors['團務老師']; }
const RESPONSIBLE_OPTIONS = ['團務老師','會長','總務','文書','攝影','全體幹部','其他'];
function normalizeResponsible(value='') {
  const v = String(value || '').trim();
  if(!v) return '';
  if(v.includes('團務')) return '團務老師';
  if(v.includes('會長')) return '會長';
  if(v.includes('總務')) return '總務';
  if(v.includes('文書')) return '文書';
  if(v.includes('攝影')) return '攝影';
  if(v.includes('全體') || v === '全體') return '全體幹部';
  return '其他';
}
function progressRoleBg(value='') {
  const key = normalizeResponsible(value);
  return key && key !== '其他' ? roleColors[key]?.bg : '';
}
function responsibleSelectHTML(id, value='') {
  const key = normalizeResponsible(value);
  return `<select id="${id}">${RESPONSIBLE_OPTIONS.map(o => `<option value="${esc(o)}" ${o===key?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
}
function setupResponsibleSelect(selectId, otherId, value='') {
  const sel = $(selectId), other = $(otherId);
  if(!sel || !other) return;
  sel.innerHTML = RESPONSIBLE_OPTIONS.map(o => `<option value="${esc(o)}">${esc(o)}</option>`).join('');
  const key = normalizeResponsible(value);
  sel.value = key || '其他';
  other.value = key === '其他' ? String(value || '').trim() : '';
  const sync = () => { other.style.display = sel.value === '其他' ? 'block' : 'none'; if(sel.value === '其他') other.focus(); };
  sel.onchange = sync;
  sync();
}
function readResponsible(selectId, otherId) {
  const sel = $(selectId), other = $(otherId);
  if(!sel) return '';
  if(sel.value === '其他') {
    const v = (other?.value || '').trim();
    if(!v) throw new Error('選擇「其他」時，請輸入負責人名稱。');
    return v;
  }
  return sel.value;
}
function setRoleVars(role) {
  const c = roleStyle(role);
  document.documentElement.style.setProperty('--roleBg', c.bg);
  document.documentElement.style.setProperty('--roleAccent', c.accent);

function expandsToRole(value, role) {
  if(!value) return false;
  const v = value === '全體' || value === '幹部／全體幹部' ? '全體幹部' : value;
  if(v === role) return true;
  if(v === '全體幹部') return role === '全體幹部' || ['團務老師','會長','總務','文書','攝影'].includes(role);
  return false;
}
function visibleForRole(record, role) { return expandsToRole(record.main, role) || (record.collabs || []).some(c => expandsToRole(c, role)); }
function baseRecordsForRole(role) { return BASE_RECORDS.filter(r => visibleForRole(r, role)); }
function customItemsForRole(role) { return entries.filter(e => e.type === 'item' && e.role === role && !e.parentId); }
function repliesFor(parentId) { return entries.filter(e => e.type === 'reply' && e.parentId === parentId); }
function filesFor(parentId) { return entries.filter(e => e.type === 'file' && e.parentId === parentId); }
function baseContentEdits(parentId) { return entries.filter(e => e.type === 'baseContentEdit' && e.parentId === parentId); }
function baseContentOverride(parentId) { const a = baseContentEdits(parentId); return a.length ? a[a.length - 1] : null; }
function isMine(e) { return currentUser && e.ownerUid === currentUser.uid; }
function textForBase(r) { return (r.description || '').trim(); }
function roleDisplayName(role) { return ROLES.find(r => r.id === role)?.name || role; }

function closeModal() {
  $('modalBackdrop').classList.remove('show');
  $('titleInput').value = '';
  $('contentInput').value = '';

function configureModal() {
  const isNewItem = editing?.mode === 'newItem';
  $('titleField').classList.toggle('hidden', !isNewItem);
  $('titleInput').required = isNewItem;
  $('contentLabel').textContent = isNewItem ? '小項' : '補充內容';
  $('contentInput').placeholder = isNewItem ? '把這一項要記錄的細項內容寫在這裡' : '把要補充的內容寫在這裡';

function showModal(title, contentValue='', titleValue='') {
  $('modalTitle').textContent = title;
  $('contentInput').value = contentValue || '';
  $('titleInput').value = titleValue || '';
  configureModal();
  $('modalBackdrop').classList.add('show');
  setTimeout(() => (editing?.mode === 'newItem' ? $('titleInput') : $('contentInput')).focus(), 60);
}

async function saveModal(e) {
  e.preventDefault();
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  const content = $('contentInput').value.trim();
  const title = $('titleInput').value.trim();
  if(!content) return;
  try {
    if(editing?.mode === 'edit') {
      const data = { content, updatedAt: serverTimestamp() };
      if(editing.editType === 'item') data.title = title || '新增項目';
      await updateDoc(doc(db, 'fengtungHandoverEntries', editing.id), data);
    } else if(editing?.mode === 'reply') {
      await addDoc(entriesCol, { type:'reply', role:currentRole, parentId:editing.parentId, content, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    } else if(editing?.mode === 'newItem') {
      if(!title) return;
      await addDoc(entriesCol, { type:'item', role:currentRole, title, content, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    }
    closeModal();
  } catch(err) {
    console.error(err);
    alert('儲存失敗：' + (err.message || err));
  }
}

function openEdit(id) {
  const entry = entries.find(e => e.id === id);
  if(!entry || !isMine(entry)) return;
  editing = { mode:'edit', id, editType:entry.type };
  showModal(entry.type === 'item' ? '修改項目' : '修改內容', entry.content || '', entry.title || '');
}

async function deleteEntry(id) {
  const entry = entries.find(e => e.id === id);
  if(!entry || !isMine(entry)) return;
  if(!confirm('確定刪除這一筆內容？')) return;
  try { await deleteDoc(doc(db, 'fengtungHandoverEntries', id)); }
  catch(err) { alert('刪除失敗：' + (err.message || err)); }
}



async function promptAssign(parentId) {
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  const base = BASE_RECORDS.find(r => r.id === parentId);
  const item = entries.find(e => e.id === parentId);
  const current = base ? assignmentForBase(base) : item ? assignmentForItem(item) : { primaryRole: currentRole, backupRole:'尚未指定' };
  const primary = prompt('主要負責人', assignmentRoleName(current.primaryRole));
  if(primary === null) return;
  const backup = prompt('備援負責人', assignmentRoleName(current.backupRole));
  if(backup === null) return;
  if(!confirm('確定要調整負責人嗎？')) return;
  try { await addDoc(entriesCol, { type:'assignment', parentId, primaryRole:normalizeRole(primary.trim()), backupRole:normalizeRole(backup.trim()), ownerUid:currentUser.uid, createdAt:serverTimestamp() }); }
  catch(err) { alert('調整失敗：' + (err.message || err)); }
}

async function editBaseLine(parentId) {
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  const base = BASE_RECORDS.find(r => r.id === parentId);
  const item = entries.find(e => e.id === parentId);
  const current = baseContentOverride(parentId)?.content || base?.description || item?.content || '';
  const next = prompt('修改事件內容', current);

      await updateDoc(doc(db, 'fengtungHandoverEntries', parentId), { content: next.trim(), updatedAt: serverTimestamp() });
    } else {
      await addDoc(entriesCol, { type:'baseContentEdit', parentId, content:next.trim(), ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    }
  } catch(err) { alert('修改失敗：' + (err.message || err)); }
}

function openUpload(parentId) {
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  uploadTarget = parentId;
  $('fileInput').value = '';
  $('fileInput').click();
}

async function handleFilePicked(e) {
  const file = e.target.files && e.target.files[0];
  if(!file || !uploadTarget || !currentUser) return;
  if(file.size > 20 * 1024 * 1024) { alert('檔案不能超過 20MB。'); return; }
  $('statusText').textContent = '檔案上傳中…';
  const path = `fengtung-handover/${safePart(currentRole)}/${safePart(uploadTarget)}/${Date.now()}-${safePart(file.name)}`;
  try {
    const storageRef = ref(storage, path);
    await uploadBytes(storageRef, file, { contentType: file.type || 'application/octet-stream' });
    const fileUrl = await getDownloadURL(storageRef);
    await addDoc(entriesCol, {
      type:'file', role:currentRole, parentId:uploadTarget,
      fileName:file.name, fileUrl, storagePath:path, contentType:file.type || '', size:file.size,
      ownerUid:currentUser.uid, createdAt:serverTimestamp()
    });
    $('statusText').textContent = '已連線 Firebase，可共同填寫。';
  } catch(err) {
    console.error(err);
    $('statusText').textContent = '已連線 Firebase，可共同填寫。';
    alert('上傳失敗：' + (err.message || err));
  }
}

    await deleteDoc(doc(db, 'fengtungHandoverEntries', id));

}



function defaultProgressTitle(key=currentProgressKey) {
  return (PROGRESS_TYPES.find(t => t.key === key) || PROGRESS_TYPES[2]).defaultTitle;
}
function progressTitleEdit(key=currentProgressKey) {
  const a = entries.filter(e => e.type === 'progressTitle' && (e.progressKey || 'show') === key);
  return a.length ? a[a.length - 1].title : null;
}
function currentProgressTitle() { return progressTitleEdit() || defaultProgressTitle(); }
function isProgressScoped(e, key=currentProgressKey) {
  const k = e.progressKey || 'show';
  return k === key;
}
function renderProgressTabs() {
  const tabs = $('progressTabs');
  if(!tabs) return;
  tabs.innerHTML = PROGRESS_TYPES.map(t => `<button type="button" class="progressTab ${t.key===currentProgressKey?'active':''}" data-progress-tab="${esc(t.key)}">${esc(progressTitleEdit(t.key) || t.defaultTitle)}</button>`).join('');
  $('progressTitleText').textContent = currentProgressTitle();
}
function progressEditsFor(scheduleId) { return entries.filter(e => e.type === 'progressEdit' && e.scheduleId === scheduleId && isProgressScoped(e)); }
function latestProgressEdit(scheduleId) { const a = progressEditsFor(scheduleId); return a.length ? a[a.length - 1] : null; }
function progressRows() {
  const base = PROGRESS_BASE.map(r => ({...r, source:'base'}));
  const custom = entries.filter(e => e.type === 'progressRow' && isProgressScoped(e)).map(e => ({
    id:e.scheduleId || e.id, source:'custom', order:typeof e.order === 'number' ? e.order : 999,
    time:e.time || '', item:e.item || '', primary:e.primary || '', helper:e.helper || '', note:e.note || ''
  }));
  const rows = [...base, ...custom].map(r => {
    const edit = latestProgressEdit(r.id);
    if(!edit) return r;
    return {...r, time:edit.time ?? r.time, item:edit.item ?? r.item, primary:edit.primary ?? r.primary, helper:edit.helper ?? r.helper, note:edit.note ?? r.note, order:typeof edit.order === 'number' ? edit.order : r.order, hidden:!!edit.hidden};
  }).filter(r => !r.hidden);
  return rows.sort((a,b) => (a.order || 0) - (b.order || 0));
}
function progressCell(text, id, field) {
  return `<span class="progressCellText">${esc(text || '')}</span><button type="button" class="progressMiniBtn progressInlineEdit" data-progress-cell="${esc(id)}" data-field="${esc(field)}">修改</button>`;
}
function progressRoleCell(text, id, field) {
  const bg = field === 'primary' ? progressRoleBg(text) : '';
  const style = bg ? ` style="background:${bg}"` : '';
  return `<td class="${field === 'primary' ? 'progressRoleCell' : ''}"${style}>${progressCell(text, id, field)}</td>`;
}
function renderProgress() {
  renderProgressTabs();
  const rows = progressRows();
  const table = $('progressTable');
  if(!table) return;
  table.innerHTML = `<thead><tr>
    <th class="timeCol">時間</th><th class="itemCol">事項</th><th class="ownerCol">主要負責人</th><th class="helperCol">協助負責人</th><th class="noteCol">備註</th>
  </tr></thead><tbody>${rows.map(row => `
    <tr data-progress-row="${esc(row.id)}">
      <td class="timeCol">${progressCell(row.time, row.id, 'time')}
        <div class="progressActions">
          <button type="button" class="progressMiniBtn" data-progress-add-before="${esc(row.id)}">上方新增</button>
          <button type="button" class="progressMiniBtn" data-progress-add-after="${esc(row.id)}">下方新增</button>
          <button type="button" class="progressMiniBtn danger" data-progress-delete="${esc(row.id)}">刪除這一列</button>
        </div>
      </td>
      <td>${progressCell(row.item, row.id, 'item')}</td>
      ${progressRoleCell(row.primary, row.id, 'primary')}
      ${progressRoleCell(row.helper, row.id, 'helper')}
      <td>${progressCell(row.note, row.id, 'note')}</td>
    </tr>`).join('')}</tbody>`;
}
function fillTimeSelects(hourId, minuteId, value='') {
  const hSel = $(hourId), mSel = $(minuteId);
  if(!hSel || !mSel) return;
  if(!hSel.options.length) hSel.innerHTML = Array.from({length:24},(_,i)=>`<option value="${String(i).padStart(2,'0')}">${String(i).padStart(2,'0')}</option>`).join('');
  if(!mSel.options.length) mSel.innerHTML = ['00','10','20','30','40','50'].map(m=>`<option value="${m}">${m}</option>`).join('');
  const m = String(value||'').match(/^(\d{1,2}):(\d{2})/);
  const hh = m ? String(Math.min(23, Math.max(0, Number(m[1])))).padStart(2,'0') : '09';
  let mm = m ? m[2] : '00';
  if(!['00','10','20','30','40','50'].includes(mm)) mm = String(Math.round(Number(mm||0)/10)*10).padStart(2,'0');
  if(mm === '60') mm = '50';
  hSel.value = hh; mSel.value = ['00','10','20','30','40','50'].includes(mm) ? mm : '00';
}
function selectedTime(hourId, minuteId) { return `${$(hourId).value}:${$(minuteId).value}`; }
function openProgressModal(mode, row=null, order=null) {
  progressModalState = { mode, rowId: row?.id || null, order };
  $('progressModalTitle').textContent = mode === 'new' ? '新增行程' : '修改行程';
  fillTimeSelects('progressHourSelect','progressMinuteSelect', row?.time || '09:00');
  $('progressItemInput').value = row?.item || '';
  setupResponsibleSelect('progressPrimarySelect','progressPrimaryOther', row?.primary || '');
  setupResponsibleSelect('progressHelperSelect','progressHelperOther', row?.helper || '');
  $('progressNoteInput').value = row?.note || '';
  $('progressModalBackdrop').classList.add('show');
  setTimeout(() => $('progressItemInput').focus(), 50);
}
function closeProgressModal() {
  $('progressModalBackdrop').classList.remove('show');
  progressModalState = null;
}
async function saveProgressModal(e) {
  e.preventDefault();
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  const data = {
    progressKey: currentProgressKey,
    time:selectedTime('progressHourSelect','progressMinuteSelect'),
    item:$('progressItemInput').value.trim(),
    primary:readResponsible('progressPrimarySelect','progressPrimaryOther'),
    helper:readResponsible('progressHelperSelect','progressHelperOther'),
    note:$('progressNoteInput').value.trim(),
    ownerUid:currentUser.uid,
    createdAt:serverTimestamp()
  };
  if(!data.item) return;
  try {
    if(progressModalState?.mode === 'new') {
      const scheduleId = currentProgressKey + '-progress-' + Date.now() + '-' + Math.random().toString(36).slice(2,7);
      await addDoc(entriesCol, { type:'progressRow', scheduleId, order:progressModalState.order ?? Date.now(), ...data, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    } else if(progressModalState?.mode === 'edit') {
      await addDoc(entriesCol, { type:'progressEdit', scheduleId:progressModalState.rowId, ...data, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    }
    closeProgressModal();
  } catch(err) { alert('儲存行程失敗：' + (err.message || err)); }
}
async function saveProgressCell(rowId, field) {
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  const row = progressRows().find(r => r.id === rowId);
  if(!row) return;
  const data = { progressKey: currentProgressKey, time:row.time || '', item:row.item || '', primary:row.primary || '', helper:row.helper || '', note:row.note || '', order:row.order || 0 };
  if(field === 'time') {
    const cur = row.time || '09:00';
    const wrap = document.createElement('div');
    wrap.innerHTML = `<div style="padding:6px 0 2px;font-weight:900">請選擇時間</div><div class="timeSelectRow"><select id="tempHourSelect"></select><span>:</span><select id="tempMinuteSelect"></select></div>`;
    const modal = document.createElement('div');
    document.body.appendChild(modal);
    const next = await new Promise(resolve => {
      const box = document.createElement('div');
      box.className = 'modalBackdrop show';
      box.innerHTML = `<div class="modal"><h2>修改時間</h2>${wrap.innerHTML}<div class="modalActions"><button type="button" class="btn secondary" id="timeCancelBtn">取消</button><button type="button" class="btn" id="timeSaveBtn">儲存</button></div></div>`;
      document.body.appendChild(box);
      fillTimeSelects('tempHourSelect','tempMinuteSelect',cur);
      box.querySelector('#timeCancelBtn').onclick = () => { box.remove(); resolve(null); };
      box.querySelector('#timeSaveBtn').onclick = () => { const v = selectedTime('tempHourSelect','tempMinuteSelect'); box.remove(); resolve(v); };
      box.onclick = e => { if(e.target === box) { box.remove(); resolve(null); } };
    });
    modal.remove();
    if(next === null) return;
    if(!confirm('確定要修改時間嗎？')) return;
    data.time = next;
  } else if(field === 'primary' || field === 'helper') {
    const label = field === 'primary' ? '主要負責人' : '協助負責人';
    const next = await new Promise(resolve => {
      const box = document.createElement('div');
      box.className = 'modalBackdrop show';
      box.innerHTML = `<div class="modal"><h2>修改${label}</h2>
        <div class="field"><label>${label}</label>${responsibleSelectHTML('tempResponsibleSelect', row[field] || '')}<input type="text" id="tempResponsibleOther" placeholder="請輸入其他負責人" style="display:none;margin-top:8px"></div>
        <div class="modalActions"><button type="button" class="btn secondary" id="responsibleCancelBtn">取消</button><button type="button" class="btn" id="responsibleSaveBtn">儲存</button></div></div>`;
      document.body.appendChild(box);
      setupResponsibleSelect('tempResponsibleSelect','tempResponsibleOther', row[field] || '');
      box.querySelector('#responsibleCancelBtn').onclick = () => { box.remove(); resolve(null); };
      box.querySelector('#responsibleSaveBtn').onclick = () => {
        try { const v = readResponsible('tempResponsibleSelect','tempResponsibleOther'); box.remove(); resolve(v); }
        catch(err) { alert(err.message || err); }
      };
      box.onclick = e => { if(e.target === box) { box.remove(); resolve(null); } };
    });
    if(next === null) return;
    if(!confirm('確定要修改' + label + '嗎？')) return;
    data[field] = next;
  } else {
    const label = {item:'事項', note:'備註'}[field] || '內容';
    const next = prompt('修改' + label, row[field] || '');
    if(next === null) return;
    if(!confirm('確定要修改這一格嗎？')) return;
    data[field] = next.trim();
  }
  try { await addDoc(entriesCol, { type:'progressEdit', scheduleId:rowId, ...data, ownerUid:currentUser.uid, createdAt:serverTimestamp() }); }
  catch(err) { alert('修改失敗：' + (err.message || err)); }
}
async function deleteProgressRow(rowId) {
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  const row = progressRows().find(r => r.id === rowId);
  if(!row) return;
  if(!confirm('確定要刪除這一列嗎？')) return;
  try { await addDoc(entriesCol, { type:'progressEdit', progressKey:currentProgressKey, scheduleId:rowId, hidden:true, order:row.order || 0, ownerUid:currentUser.uid, createdAt:serverTimestamp() }); }
  catch(err) { alert('刪除失敗：' + (err.message || err)); }
}
function addProgressNear(rowId, after=false) {
  const rows = progressRows();
  const idx = rows.findIndex(r => r.id === rowId);
  const row = rows[idx];
  const neighbor = rows[after ? idx+1 : idx-1];
  let order;
  if(!row) order = Date.now();
  else if(neighbor) order = (row.order + neighbor.order) / 2;
  else order = row.order + (after ? 0.5 : -0.5);
  openProgressModal('new', null, order);
}
async function editProgressTitle() {
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  const next = prompt('修改進度表名稱', currentProgressTitle());
  if(next === null) return;
  const title = next.trim() || defaultProgressTitle();
  if(!confirm('確定要修改進度表名稱嗎？')) return;
  try { await addDoc(entriesCol, { type:'progressTitle', progressKey:currentProgressKey, title, ownerUid:currentUser.uid, createdAt:serverTimestamp() }); }
  catch(err) { alert('修改名稱失敗：' + (err.message || err)); }
}


$('roleGrid').addEventListener('click', e => {
  const btn = e.target.closest('[data-role]');
  if(!btn) return;
  currentRole = btn.dataset.role;
  render();
});
$('progressToggleBtn').addEventListener('click', () => {
  $('progressBody').classList.toggle('collapsed');
  $('progressToggleBtn').textContent = $('progressBody').classList.contains('collapsed') ? '展開' : '收合';
});
$('editProgressTitleBtn').addEventListener('click', editProgressTitle);
$('progressTabs').addEventListener('click', e => {
  const tab = e.target.closest('[data-progress-tab]');
  if(!tab) return;
  currentProgressKey = tab.dataset.progressTab;
  render();
});
$('progressTable').addEventListener('click', e => {
  const cell = e.target.closest('[data-progress-cell]');
  const del = e.target.closest('[data-progress-delete]');
  const before = e.target.closest('[data-progress-add-before]');
  const after = e.target.closest('[data-progress-add-after]');
  if(cell) saveProgressCell(cell.dataset.progressCell, cell.dataset.field);
  if(del) deleteProgressRow(del.dataset.progressDelete);
  if(before) addProgressNear(before.dataset.progressAddBefore, false);
  if(after) addProgressNear(after.dataset.progressAddAfter, true);
});
$('cancelProgressModalBtn').addEventListener('click', closeProgressModal);
$('progressModalBackdrop').addEventListener('click', e => { if(e.target.id === 'progressModalBackdrop') closeProgressModal(); });
$('progressModalForm').addEventListener('submit', saveProgressModal);

$('content').addEventListener('click', e => {
  const reply = e.target.closest('[data-reply]');
  const edit = e.target.closest('[data-edit]');
  const del = e.target.closest('[data-delete]');
  const upload = e.target.closest('[data-upload]');
  const fileDel = e.target.closest('[data-file-delete]');
  const baseLineEdit = e.target.closest('[data-base-line-edit]');
  const assign = e.target.closest('[data-assign]');
  if(reply) { editing = { mode:'reply', parentId:reply.dataset.reply }; showModal('補充內容'); }
  if(edit) openEdit(edit.dataset.edit);
  if(del) deleteEntry(del.dataset.delete);
  if(upload) openUpload(upload.dataset.upload);
  if(fileDel) deleteFileEntry(fileDel.dataset.fileDelete);
  if(baseLineEdit) editBaseLine(baseLineEdit.dataset.baseLineEdit);
  if(assign) promptAssign(assign.dataset.assign);
});
$('addItemBtn').addEventListener('click', () => { editing = { mode:'newItem' }; showModal('新增一項'); });
$('cancelModalBtn').addEventListener('click', closeModal);
$('modalBackdrop').addEventListener('click', e => { if(e.target.id === 'modalBackdrop') closeModal(); });
$('modalForm').addEventListener('submit', saveModal);
$('fileInput').addEventListener('change', handleFilePicked);

render();
setTimeout(render, 500);
setTimeout(render, 1500);

onAuthStateChanged(auth, user => {
  currentUser = user;
  if(user) {
    $('statusText').textContent = '已連線 Firebase，可共同填寫。';
    render();
  }
});

signInAnonymously(auth).catch(err => {
  console.error(err);
  $('statusText').textContent = 'Firebase 匿名登入失敗，請確認 Authentication 已啟用匿名登入。';
});

onSnapshot(query(entriesCol, orderBy('createdAt', 'asc')), snap => {
  entries = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  render();
}, err => {
  console.error(err);
  $('statusText').textContent = 'Firestore 讀取失敗，請確認規則已發布。';
});
</script>
</body>
</html>
