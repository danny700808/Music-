function editProgressRoles(title,current=''){return new Promise(resolve=>{const roleOpts=['團務老師','會長','總務','文書','攝影','全體幹部','家長志工','文化中心人員','學生','大團團員','新生團團員','其他'];const detailRoles=['家長志工','文化中心人員','學生','大團團員','新生團團員','其他'];let tags=progressRoleList(current);const bd=document.createElement('div');bd.className='modalBackdrop show';bd.innerHTML=`<div class="modal"><h2>${esc(title)}</h2><div class="field"><label>目前已加入</label><div class="roleEditorTags" id="roleEditorTags"></div><div class="roleEditorHint">可以加入多個人；按標籤上的 × 可移除。家長志工、文化中心人員、學生、大團團員、新生團員、其他會以白底框線顯示。</div></div><div class="roleEditorAdd"><div class="field"><label>新增對象</label><select id="roleEditorSelect">${roleOpts.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('')}</select></div><div class="field"><label>補充名稱</label><input type="text" id="roleEditorDetail" placeholder="可填姓名、組別或說明，也可以留空"></div><button type="button" class="btn" id="roleEditorAddBtn">加入</button></div><div class="modalActions"><button type="button" class="btn secondary" id="roleEditorClear">全部清空</button><button type="button" class="btn secondary" id="roleEditorCancel">取消</button><button type="button" class="btn" id="roleEditorOk">確定</button></div></div>`;document.body.appendChild(bd);const box=bd.querySelector('#roleEditorTags'),sel=bd.querySelector('#roleEditorSelect'),detail=bd.querySelector('#roleEditorDetail');const draw=()=>{box.innerHTML=tags.length?tags.map((t,i)=>{const st=progressRoleStyle(t);return `<span class="progressRoleTag" style="background:${st.bg};border-color:${st.accent};color:#1f1b14">${esc(t)} <button type="button" class="roleTagRemove" data-rm="${i}">×</button></span>`}).join(''):'<span class="progressCellText">空白</span>'};const close=v=>{bd.remove();resolve(v)};box.addEventListener('click',e=>{const b=e.target.closest('[data-rm]');if(!b)return;tags.splice(Number(b.dataset.rm),1);draw()});bd.querySelector('#roleEditorAddBtn').addEventListener('click',()=>{let v=sel.value,d=detail.value.trim();if(detailRoles.includes(v)&&d)v=`${v}：${d}`;if(!v)return;tags.push(v);detail.value='';draw();detail.focus()});bd.querySelector('#roleEditorClear').addEventListener('click',()=>{tags=[];draw()});bd.querySelector('#roleEditorCancel').addEventListener('click',()=>close(null));bd.querySelector('#roleEditorOk').addEventListener('click',()=>close(progressRoleString(tags)));bd.addEventListener('click',e=>{if(e.target===bd)close(null)});sel.addEventListener('change',()=>{detail.placeholder=detailRoles.includes(sel.value)?'可填姓名、組別或說明，也可以留空':'可留空'});draw();setTimeout(()=>sel.focus(),30)})}
async function saveProgressCell(id,f){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const r=progressRows().find(x=>x.id===id);if(!r)return;let v;if(f==='time')v=await promptTime(r.time);else if(f==='primary')v=await editProgressRoles('修改主要負責人',r.primary);else if(f==='helper')v=await editProgressRoles('修改協助負責人',r.helper);else v=prompt('修改內容',r[f]||'');if(v===null)return;if(!confirm('確定要修改這一格嗎？'))return;const data={time:r.time||'',item:r.item||'',primary:r.primary||'',helper:r.helper||'',note:r.note||'',order:r.order||0};data[f]=String(v).trim();await addDoc(entriesCol,{type:'progressEdit',progressKey:currentProgressKey,scheduleId:id,...data,ownerUid:currentUser.uid,createdAt:serverTimestamp()})} async function deleteProgressRow(id){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const r=progressRows().find(x=>x.id===id);if(!r||!confirm('確定要刪除這一列嗎？'))return;await addDoc(entriesCol,{type:'progressEdit',progressKey:currentProgressKey,scheduleId:id,hidden:true,order:r.order||0,ownerUid:currentUser.uid,createdAt:serverTimestamp()})} async function addProgressNear(id,after=false){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const rows=progressRows(),i=rows.findIndex(r=>r.id===id),row=rows[i],nb=rows[after?i+1:i-1];const order=!row?Date.now():nb?(row.order+nb.order)/2:row.order+(after?.5:-.5);const item=prompt('新增事項內容','');if(item===null||!item.trim())return;const time=await promptTime(row?.time||'09:00');if(time===null)return;await addDoc(entriesCol,{type:'progressRow',progressKey:currentProgressKey,scheduleId:'progress-'+Date.now(),order,time,item:item.trim(),primary:'',helper:'',note:'',ownerUid:currentUser.uid,createdAt:serverTimestamp()})} async function editProgressTitle(){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const t=prompt('修改進度表名稱',progressTitle());if(t===null||!t.trim())return;await addDoc(entriesCol,{type:'progressTitle',progressKey:currentProgressKey,title:t.trim(),ownerUid:currentUser.uid,createdAt:serverTimestamp()})} async function editBaseTitle(id){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const r=BASE_RECORDS.find(x=>x.id===id);if(!r)return;const t=prompt('修改主項目標題',effectiveTitle(r));if(t===null||!t.trim())return;if(!confirm('確定要修改這段文字嗎？'))return;await addDoc(entriesCol,{type:'baseEdit',parentId:id,title:t.trim(),content:effectiveContent(r),ownerUid:currentUser.uid,createdAt:serverTimestamp()})} async function editBaseContent(id){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const r=BASE_RECORDS.find(x=>x.id===id);if(!r)return;const t=prompt('修改事件內容',effectiveContent(r));if(t===null||!t.trim())return;if(!confirm('確定要修改這段文字嗎？'))return;await addDoc(entriesCol,{type:'baseEdit',parentId:id,title:effectiveTitle(r),content:t.trim(),ownerUid:currentUser.uid,createdAt:serverTimestamp()})} async function adjustOwner(id){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const r=BASE_RECORDS.find(x=>x.id===id)||entries.find(x=>x.id===id);if(!r)return;const mainRole=await promptResponsible('選擇主要負責人',effectiveMain(r));if(mainRole===null)return;const backupRole=await promptResponsible('選擇備援負責人',effectiveBackup(r));if(backupRole===null)return;await addDoc(entriesCol,{type:'assign',parentId:id,mainRole,backupRole,ownerUid:currentUser.uid,createdAt:serverTimestamp()})}
function render(){renderProgress();setRoleVars(currentRole);renderRoles();$('currentRoleTitle').textContent=roleDisplayName(currentRole);renderContent()}
function closeModal(){$('modalBackdrop').classList.remove('show');$('titleInput').value='';$('contentInput').value='';editing=null} function configureModal(){const isNew=editing?.mode==='newItem';$('titleField').classList.toggle('hidden',!isNew);$('titleInput').required=isNew;$('contentLabel').textContent=isNew?'小項':'補充內容'} function showModal(title,content='',titleValue=''){$('modalTitle').textContent=title;$('contentInput').value=content||'';$('titleInput').value=titleValue||'';configureModal();$('modalBackdrop').classList.add('show');setTimeout(()=> (editing?.mode==='newItem'?$('titleInput'):$('contentInput')).focus(),60)} async function saveModal(e){e.preventDefault();if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const content=$('contentInput').value.trim(),title=$('titleInput').value.trim();if(!content)return;try{if(editing?.mode==='edit'){if(!confirm('確定要修改這段文字嗎？'))return;const data={content,updatedAt:serverTimestamp()};if(editing.editType==='item')data.title=title||'新增項目';await updateDoc(doc(db,'fengtungHandoverEntries',editing.id),data)}else if(editing?.mode==='reply')await addDoc(entriesCol,{type:'reply',role:currentRole,parentId:editing.parentId,content,ownerUid:currentUser.uid,createdAt:serverTimestamp()});else if(editing?.mode==='newItem'){if(!title)return;await addDoc(entriesCol,{type:'item',role:currentRole,title,content,ownerUid:currentUser.uid,createdAt:serverTimestamp()})}closeModal()}catch(err){alert('儲存失敗：'+(err.message||err))}} function openEdit(id){const e=entries.find(x=>x.id===id);if(!e||!isMine(e))return;editing={mode:'edit',id,editType:e.type};showModal(e.type==='item'?'修改項目':'修改內容',e.content||'',e.title||'')} async function deleteEntry(id){const e=entries.find(x=>x.id===id);if(!e||!isMine(e))return;if(!confirm('確定刪除這一筆內容？'))return;await deleteDoc(doc(db,'fengtungHandoverEntries',id))} async function deleteFileEntry(id){const f=entries.find(e=>e.id===id);if(!f||!isMine(f))return;if(!confirm('確定刪除這個資料？'))return;if(f.storagePath)await deleteObject(ref(storage,f.storagePath)).catch(()=>{});await deleteDoc(doc(db,'fengtungHandoverEntries',id))} function openUpload(id){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');uploadTarget=id;$('fileInput').value='';$('fileInput').click()} async function handleFilePicked(e){const file=e.target.files&&e.target.files[0];if(!file||!uploadTarget||!currentUser)return;if(file.size>20*1024*1024)return alert('檔案不能超過 20MB。');const path=`fengtung-handover/${safePart(currentRole)}/${safePart(uploadTarget)}/${Date.now()}-${safePart(file.name)}`;const storageRef=ref(storage,path);await uploadBytes(storageRef,file,{contentType:file.type||'application/octet-stream'});const fileUrl=await getDownloadURL(storageRef);await addDoc(entriesCol,{type:'file',role:currentRole,parentId:uploadTarget,fileName:file.name,fileUrl,storagePath:path,contentType:file.type||'',fileSize:file.size,ownerUid:currentUser.uid,createdAt:serverTimestamp()})}
$('progressTop').addEventListener('click',()=>{progressCollapsed=!progressCollapsed;renderProgress()});$('progressTabs').addEventListener('click',e=>{const t=e.target.closest('[data-progress-tab]');if(!t)return;currentProgressKey=t.dataset.progressTab;progressCollapsed=false;renderProgress()});$('editProgressTitleBtn').addEventListener('click',editProgressTitle);$('progressTable').addEventListener('click',e=>{const c=e.target.closest('[data-progress-cell]'),d=e.target.closest('[data-progress-delete]'),b=e.target.closest('[data-progress-add-before]'),a=e.target.closest('[data-progress-add-after]');if(c)return saveProgressCell(c.dataset.progressCell,c.dataset.field);if(d)return deleteProgressRow(d.dataset.progressDelete);if(b)return addProgressNear(b.dataset.progressAddBefore,false);if(a)return addProgressNear(a.dataset.progressAddAfter,true)});$('roleGrid').addEventListener('click',e=>{const b=e.target.closest('[data-role]');if(!b)return;currentRole=b.dataset.role;render()});$('content').addEventListener('click',e=>{const reply=e.target.closest('[data-reply]'),edit=e.target.closest('[data-edit]'),del=e.target.closest('[data-delete]'),upload=e.target.closest('[data-upload]'),fileDel=e.target.closest('[data-file-delete]'),editTitle=e.target.closest('[data-edit-base-title]'),editContent=e.target.closest('[data-edit-base-content]'),assign=e.target.closest('[data-assign]');if(editTitle)return editBaseTitle(editTitle.dataset.editBaseTitle);if(editContent)return editBaseContent(editContent.dataset.editBaseContent);if(assign)return adjustOwner(assign.dataset.assign);if(reply){editing={mode:'reply',parentId:reply.dataset.reply};showModal('補充內容');return}if(edit)return openEdit(edit.dataset.edit);if(del)return deleteEntry(del.dataset.delete);if(upload)return openUpload(upload.dataset.upload);if(fileDel)return deleteFileEntry(fileDel.dataset.fileDelete)});$('addItemBtn').addEventListener('click',()=>{editing={mode:'newItem'};showModal('新增一項')});$('cancelModalBtn').addEventListener('click',closeModal);$('modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')closeModal()});$('modalForm').addEventListener('submit',saveModal);$('fileInput').addEventListener('change',handleFilePicked);
render(); onAuthStateChanged(auth,u=>{currentUser=u;if(u)render()}); signInAnonymously(auth).catch(err=>alert('Firebase 匿名登入失敗，請確認 Authentication 已啟用匿名登入。')); onSnapshot(query(entriesCol,orderBy('createdAt','asc')),snap=>{entries=snap.docs.map(d=>({id:d.id,...d.data()}));render()},err=>alert('Firestore 讀取失敗，請確認規則已發布。'));
