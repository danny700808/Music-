  </div>
</main>

};
const STORE_KEY = 'fengtung_handover_v1';
let state = loadState();

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { tasks:[], supplements:[] }; }
  catch(e) { return { tasks:[], supplements:[] }; }
}
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function uid(prefix='id') { return prefix + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,7); }
function normRole(role) { return role === '全體' ? '全體幹部' : role; }
function expandsToRole(value, role) {
  if(!value) return false;
  if(value === role) return true;
  if(value === '全體' || value === '全體幹部') return role === '全體幹部' || ['團務老師','會長','總務','文書','攝影'].includes(role);
  return false;
}
function visibleForRole(record, role) {
  const isMain = expandsToRole(record.main, role);
  const isCollab = (record.collabs||[]).some(c=>expandsToRole(c, role));
  return isMain || isCollab || (record.ownerRole === role);
}
function relation(record, role) {
  if(record.ownerRole === role && record.kind === 'custom') return '新增項目';
  if(expandsToRole(record.main, role)) return '主要負責';
  if((record.collabs||[]).some(c=>expandsToRole(c, role))) return '協作事項';
  return '相關事項';
}
function allRecords() { return [...BASE_RECORDS, ...state.tasks]; }
function stagesForRole(role) {
  const set = new Set(['全部']);
  allRecords().filter(r=>visibleForRole(r, role)).forEach(r=>set.add(r.stage||'未分類'));
  return [...set];
}
function esc(s='') { return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderRoles() {
  document.documentElement.style.setProperty('--role', roleColors[currentRole] || '#6b8f71');
  document.getElementById('roleGrid').innerHTML = ROLES.map(r => {
    const count = allRecords().filter(x=>visibleForRole(x, r.id)).length;
    return `<button class="roleBtn ${currentRole===r.id?'active':''}" onclick="selectRole('${r.id}')">
      <div class="roleName"><span class="dot" style="background:${roleColors[r.id]}"></span>${esc(r.name)} <span class="pill"><strong>${count}</strong> 項</span></div>
      <div class="roleSub">${esc(r.subtitle)}</div>
    </button>`;
  }).join('');
}
function selectRole(role) { currentRole = role; stageFilter='全部'; render(); }
function renderStageFilter() {
  const stages = stagesForRole(currentRole);
  const el = document.getElementById('stageFilter');
  el.innerHTML = stages.map(s=>`<option value="${esc(s)}" ${s===stageFilter?'selected':''}>${esc(s)}</option>`).join('');
}
function groupBy(arr, fn) { return arr.reduce((acc,x)=>{ const k=fn(x); (acc[k] ||= []).push(x); return acc; },{}); }
function supplementsFor(recordId) { return state.supplements.filter(s=>s.recordId===recordId); }
function renderSummary(records) {
  const main = records.filter(r=>relation(r,currentRole)==='主要負責').length;
  const collab = records.filter(r=>relation(r,currentRole)==='協作事項').length;
  const custom = records.filter(r=>r.kind==='custom').length;
  const supp = state.supplements.filter(s=>s.role===currentRole || records.some(r=>r.id===s.recordId)).length;
  document.getElementById('summary').innerHTML = `
    <span class="pill">目前區塊：<strong>${esc(currentRole)}</strong></span>
    <span class="pill">主要負責 <strong>${main}</strong></span>
    <span class="pill">協作事項 <strong>${collab}</strong></span>
    <span class="pill">新增項目 <strong>${custom}</strong></span>
    <span class="pill">補充紀錄 <strong>${supp}</strong></span>`;
}
function renderCard(r) {

    <div class="cardActions">
      <button class="btn ghost" onclick="openSupplement('${r.id}')">＋新增補充紀錄</button>
      ${canEditTask ? `<button class="btn secondary" onclick="openTask('${r.id}')">修改項目</button><button class="btn danger" onclick="deleteTask('${r.id}')">刪除項目</button>` : ''}
    </div>
    <div class="supplements">
      <strong>歷屆補充紀錄</strong>
      ${supps.length ? supps.map(s=>`<div class="supplement"><div class="top"><span>${esc(s.year||'未填年度')}／${esc(s.type||'補充')}</span><span><button class="btn secondary" onclick="openSupplement('${r.id}','${s.id}')">修改</button> <button class="btn danger" onclick="deleteSupplement('${s.id}')">刪除</button></span></div><p>${esc(s.content)}</p></div>`).join('') : '<div class="empty" style="margin-top:8px;padding:12px;">目前還沒有補充。可以把今年實際發生的問題、提醒、做法寫在這裡。</div>'}
    </div>
  </article>`;
}
function renderContent() {
  let records = allRecords().filter(r=>visibleForRole(r,currentRole));
  if(stageFilter !== '全部') records = records.filter(r=>(r.stage||'未分類')===stageFilter);
  renderSummary(records);
  const grouped = groupBy(records, r=>relation(r,currentRole));
  const order = ['主要負責','協作事項','新增項目','相關事項'];
  const html = order.filter(k=>grouped[k]?.length).map(k=>`<h2 class="sectionTitle">${k}</h2><div class="cards">${grouped[k].map(renderCard).join('')}</div>`).join('');
  document.getElementById('content').innerHTML = html || '<div class="empty">這個篩選條件目前沒有資料。</div>';
}
function render() { renderRoles(); renderStageFilter(); renderContent(); }

document.getElementById('stageFilter').addEventListener('change', e=>{ stageFilter=e.target.value; renderContent(); });
document.getElementById('addTaskBtn').addEventListener('click', ()=>openTask());
document.getElementById('resetBtn').addEventListener('click', ()=>{ if(confirm('確定要清除這台瀏覽器新增的項目與補充紀錄？原始資料不會刪除。')) { state={tasks:[],supplements:[]}; saveState(); render(); } });
document.getElementById('exportBtn').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='豐東成發交接資料備份.json'; a.click(); URL.revokeObjectURL(a.href);
});
document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{ try { const data=JSON.parse(reader.result); if(!data.tasks||!data.supplements) throw new Error('格式不符'); state=data; saveState(); render(); alert('匯入完成'); } catch(err) { alert('匯入失敗：不是正確的備份檔'); } };
  reader.readAsText(file);
});

function closeModal() { document.getElementById('modalBackdrop').classList.remove('show'); document.getElementById('modalForm').innerHTML=''; }
document.getElementById('modalBackdrop').addEventListener('click', e=>{ if(e.target.id==='modalBackdrop') closeModal(); });
function formButtons() { return `<div class="modalActions field full"><button type="button" class="btn secondary" onclick="closeModal()">取消</button><button type="submit" class="btn">儲存</button></div>`; }
function openTask(id=null) {
  const existing = id ? state.tasks.find(t=>t.id===id) : null;
  document.getElementById('modalTitle').textContent = existing ? '修改工作項目' : '新增工作項目';
  const form=document.getElementById('modalForm');
  form.innerHTML = `
    <div class="field"><label>角色區塊</label><select name="ownerRole">${ROLES.map(r=>`<option value="${esc(r.id)}" ${(existing?.ownerRole||currentRole)===r.id?'selected':''}>${esc(r.name)}</option>`).join('')}</select></div>
    <div class="field"><label>階段</label><input name="stage" value="${esc(existing?.stage||'')}" placeholder="例如：前期-餐飲禮品"></div>
    <div class="field"><label>時間順序</label><input name="timeOrder" value="${esc(existing?.timeOrder||'')}" placeholder="例如：前期／活動前／演出後"></div>
    <div class="field"><label>主要負責</label><input name="main" value="${esc(existing?.main||existing?.ownerRole||currentRole)}"></div>
    <div class="field full"><label>工作項目</label><input name="item" required value="${esc(existing?.item||'')}" placeholder="請輸入工作項目"></div>
    <div class="field full"><label>要做的事情</label><textarea name="description" required placeholder="把這件事要怎麼做寫清楚">${esc(existing?.description||'')}</textarea></div>
    <div class="field full"><label>補充備註</label><textarea name="note" placeholder="注意事項、今年狀況、下一屆提醒">${esc(existing?.note||'')}</textarea></div>
    ${formButtons()}`;
  form.onsubmit = e => {
    e.preventDefault(); const fd=new FormData(form);
    const task = { id: existing?.id || uid('task'), kind:'custom', sourceSheet:'網頁新增', year:'網頁新增', ownerRole:fd.get('ownerRole'), stage:fd.get('stage'), timeOrder:fd.get('timeOrder'), main:fd.get('main'), collabs:[], item:fd.get('item'), description:fd.get('description'), note:fd.get('note') };
    if(existing) state.tasks = state.tasks.map(t=>t.id===existing.id?task:t); else state.tasks.push(task);
    currentRole = task.ownerRole; saveState(); closeModal(); render();
  };
  document.getElementById('modalBackdrop').classList.add('show');
}
function deleteTask(id) {
  if(!confirm('確定刪除這個新增項目？相關補充紀錄也會刪除。')) return;
  state.tasks = state.tasks.filter(t=>t.id!==id); state.supplements = state.supplements.filter(s=>s.recordId!==id); saveState(); render();
}
function openSupplement(recordId, supplementId=null) {
  const record = allRecords().find(r=>r.id===recordId);
  const existing = supplementId ? state.supplements.find(s=>s.id===supplementId) : null;
  document.getElementById('modalTitle').textContent = existing ? '修改補充紀錄' : '新增補充紀錄';
  const form=document.getElementById('modalForm');
  form.innerHTML = `
    <div class="field full"><label>補充在哪個工作項目下面</label><input value="${esc(record?.item||'')}" disabled></div>
    <div class="field"><label>年度／屆數</label><input name="year" value="${esc(existing?.year||'')}" placeholder="例如：第 27 屆／2026"></div>
    <div class="field"><label>類型</label><select name="type"><option ${existing?.type==='注意事項'?'selected':''}>注意事項</option><option ${existing?.type==='實際狀況'?'selected':''}>實際狀況</option><option ${existing?.type==='建議做法'?'selected':''}>建議做法</option><option ${existing?.type==='待確認'?'selected':''}>待確認</option></select></div>
    <div class="field full"><label>補充內容</label><textarea name="content" required placeholder="把今年發生的事情、提醒、建議寫在這裡">${esc(existing?.content||'')}</textarea></div>
    ${formButtons()}`;
  form.onsubmit = e => {
    e.preventDefault(); const fd=new FormData(form);
    const supp = { id: existing?.id || uid('supp'), recordId, role: currentRole, year:fd.get('year'), type:fd.get('type'), content:fd.get('content'), createdAt: existing?.createdAt || new Date().toISOString(), updatedAt: new Date().toISOString() };
    if(existing) state.supplements = state.supplements.map(s=>s.id===existing.id?supp:s); else state.supplements.push(supp);
    saveState(); closeModal(); renderContent();
  };
  document.getElementById('modalBackdrop').classList.add('show');
}
function deleteSupplement(id) { if(confirm('確定刪除這一則補充紀錄？')) { state.supplements = state.supplements.filter(s=>s.id!==id); saveState(); renderContent(); } }

render();
</script>
</body>
</html>
