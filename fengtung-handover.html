];
const ROLE_OPTIONS = ['團務老師','會長','總務','文書','攝影','全體／新增','尚未指定'];
const roleColors = {
  '團務老師': { bg:'#DDEBF7', accent:'#5B9BD5' }, '會長': { bg:'#FFF2CC', accent:'#BF9000' }, '總務': { bg:'#E2F0D9', accent:'#70AD47' },
  '文書': { bg:'#EADCF8', accent:'#8E63C7' }, '攝影': { bg:'#FCE4D6', accent:'#ED7D31' }, '全體／新增': { bg:'#E7E6E6', accent:'#7F7F7F' }, '尚未指定': { bg:'#E7E6E6', accent:'#7F7F7F' }
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app); const db = getFirestore(app); const storage = getStorage(app);
const entriesCol = collection(db, 'fengtungHandoverEntries');
let currentUser = null, currentRole = '團務老師', docs = [], editing = null;

function normalizeRole(v) { if(!v) return '尚未指定'; if(v === '全體' || v === '全體幹部' || v === '幹部／全體幹部') return '全體／新增'; return v; }
function uid(prefix='id') { return prefix + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8); }
function esc(s='') { return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function roleStyle(role) { return roleColors[role] || roleColors['團務老師']; }
function setRoleVars(role) { const c=roleStyle(role); document.documentElement.style.setProperty('--roleBg', c.bg); document.documentElement.style.setProperty('--roleAccent', c.accent); }
function baseBackup(r) { const c=(r.collabs||[]).map(normalizeRole).find(x=>x && x !== normalizeRole(r.main)); return c || '尚未指定'; }
function overrideFor(id) { return docs.find(d=>d.type==='override' && d.recordId===id); }
function effectiveBase(r) { const o=overrideFor(r.id)||{}; return { id:r.id, source:'base', title:o.title ?? r.item, content:o.content ?? (r.description||''), main:normalizeRole(o.main ?? r.main), backup:normalizeRole(o.backup ?? baseBackup(r)), ownerUid:o.ownerUid||null }; }
function customItems() { return docs.filter(d=>d.type==='item').map(d=>({...d, source:'custom', title:d.title||'新增項目', content:d.content||'', main:normalizeRole(d.main||d.role||currentRole), backup:normalizeRole(d.backup||'尚未指定')})); }
function allRecords() { return [...BASE_RECORDS.map(effectiveBase), ...customItems()]; }
function repliesFor(parentId) { return docs.filter(d=>d.type==='reply' && d.parentId===parentId); }
function filesFor(parentId) { return docs.filter(d=>d.type==='file' && d.parentId===parentId); }
function canDelete(d) { return currentUser && d.ownerUid === currentUser.uid; }
function recordsFor(kind) { return allRecords().filter(r => kind==='main' ? r.main===currentRole : r.backup===currentRole && r.main!==currentRole); }

function renderRoles() {
  document.getElementById('roleGrid').innerHTML = ROLES.map(r=>{ const c=roleStyle(r.id); return `<button class="roleBtn ${currentRole===r.id?'active':''}" style="background:${c.bg}" onclick="selectRole('${r.id}')">${esc(r.name)}</button>`; }).join('');
}
window.selectRole = role => { currentRole = role; render(); };

function renderRecordCard(r) {
  const replies = repliesFor(r.id); const files = filesFor(r.id); const dataBtn = files.length ? `<button class="btn ghost dataBtn" onclick="openFiles('${r.id}')">📎 相關資料 ${files.length}</button>` : '';
  return `<article class="item">
    <div class="itemHeader"><h3 class="itemTitle"><span class="dot">•</span>${esc(r.title)} <a class="inlineEdit" onclick="openEditRecord('${r.source}','${r.id}')">修改</a></h3>${dataBtn}</div>
    ${r.content ? `<div class="itemDesc">${esc(r.content)}</div>` : ''}
    <div class="roleMeta"><span class="pill">主要：<b>${esc(r.main)}</b></span><span class="pill">備援：<b>${esc(r.backup)}</b></span></div>
    ${replies.map(renderReply).join('')}
    <div class="itemActions"><button class="btn ghost small" onclick="openReply('${r.id}')">＋補充內容</button><button class="btn ghost small" onclick="openUpload('${r.id}')">＋上傳資料</button><button class="btn ghost small" onclick="openAdjust('${r.source}','${r.id}')">調整負責人</button></div>
  </article>`;
}
function renderReply(e) { return `<div class="replyLine">${esc(e.content)} <a class="inlineEdit" onclick="openEditReply('${e.id}')">修改</a>${canDelete(e)?` <a class="inlineEdit" onclick="deleteDocById('${e.id}')">刪除</a>`:''}</div>`; }
function renderSection(title, hint, list) { return `<div class="sectionTitle">${title}</div>${hint?`<div class="sectionHint">${hint}</div>`:''}<div class="list">${list.length ? list.map(renderRecordCard).join('') : '<div class="empty">目前沒有內容。</div>'}</div>`; }
function renderContent() { document.getElementById('content').innerHTML = renderSection('主要負責','',recordsFor('main')) + renderSection('備援負責','原負責人不方便時，需要能接手的事情。',recordsFor('backup')); }
function render() { setRoleVars(currentRole); renderRoles(); document.getElementById('currentRoleTitle').textContent=currentRole; renderContent(); }

function setupRoleSelects() { const opts=ROLE_OPTIONS.map(r=>`<option value="${esc(r)}">${esc(r)}</option>`).join(''); document.getElementById('mainRoleInput').innerHTML=opts; document.getElementById('backupRoleInput').innerHTML=opts; }
function closeModal() { document.getElementById('modalBackdrop').classList.remove('show'); editing=null; document.getElementById('modalForm').reset(); }
window.closeModal = closeModal;
function showModal(title, mode) {
  document.getElementById('modalTitle').textContent=title; ['titleField','contentField','mainRoleField','backupRoleField','fileField'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('titleInput').required=false; document.getElementById('contentInput').required=false; document.getElementById('fileInput').required=false;
  if(['newItem','editRecord'].includes(mode)) { document.getElementById('titleField').classList.remove('hidden'); document.getElementById('contentField').classList.remove('hidden'); document.getElementById('titleInput').required=true; }
  if(['reply','editReply'].includes(mode)) { document.getElementById('contentField').classList.remove('hidden'); document.getElementById('contentInput').required=true; document.getElementById('contentLabel').textContent= mode==='reply'?'補充內容':'內容'; }
  if(mode==='adjust' || mode==='newItem') { document.getElementById('mainRoleField').classList.remove('hidden'); document.getElementById('backupRoleField').classList.remove('hidden'); }
  if(mode==='upload') { document.getElementById('fileField').classList.remove('hidden'); document.getElementById('fileInput').required=true; }
  document.getElementById('modalSubmitBtn').textContent = mode==='upload'?'上傳':'儲存'; document.getElementById('modalBackdrop').classList.add('show');
}
window.openReply = parentId => { editing={mode:'reply', parentId}; document.getElementById('contentInput').value=''; showModal('補充內容','reply'); };
window.openUpload = parentId => { editing={mode:'upload', parentId}; showModal('上傳資料','upload'); };
window.openAdjust = (source,id) => { const r=allRecords().find(x=>x.id===id); if(!r) return; editing={mode:'adjust', source, id}; document.getElementById('mainRoleInput').value=r.main; document.getElementById('backupRoleInput').value=r.backup; showModal('調整負責人','adjust'); };
window.openEditRecord = (source,id) => { const r=allRecords().find(x=>x.id===id); if(!r) return; editing={mode:'editRecord', source, id}; document.getElementById('titleInput').value=r.title; document.getElementById('contentInput').value=r.content; showModal('修改事件','editRecord'); };
window.openEditReply = id => { const e=docs.find(x=>x.id===id); if(!e) return; editing={mode:'editReply', id}; document.getElementById('contentInput').value=e.content||''; showModal('修改補充內容','editReply'); };

document.getElementById('addItemBtn').addEventListener('click',()=>{ editing={mode:'newItem'}; document.getElementById('mainRoleInput').value=currentRole; document.getElementById('backupRoleInput').value='尚未指定'; document.getElementById('titleInput').value=''; document.getElementById('contentInput').value=''; showModal('新增一項','newItem'); });
document.getElementById('modalBackdrop').addEventListener('click', e=>{ if(e.target.id==='modalBackdrop') closeModal(); });
document.getElementById('filesBackdrop').addEventListener('click', e=>{ if(e.target.id==='filesBackdrop') closeFilesModal(); });

async function saveDoc(id,data, merge=false) { if(!currentUser) return alert('Firebase 尚未連線，請稍等再試。'); await setDoc(doc(entriesCol,id), data, {merge}); }
function baseOverrideId(recordId) { return 'override_' + encodeURIComponent(recordId).replace(/%/g,'_'); }
async function ensureBaseOverride(r, changes) { const id=baseOverrideId(r.id); await saveDoc(id, { type:'override', recordId:r.id, title:r.title, content:r.content, main:r.main, backup:r.backup, ownerUid:currentUser.uid, updatedAt:serverTimestamp(), ...changes }, true); }

document.getElementById('modalForm').addEventListener('submit', async e=>{
  e.preventDefault(); if(!editing) return;
  try {
    if(editing.mode==='newItem') {
      const title=document.getElementById('titleInput').value.trim(), content=document.getElementById('contentInput').value.trim(); if(!title || !content) return;
      const id=uid('item'); await saveDoc(id, {id,type:'item',title,content,main:normalizeRole(document.getElementById('mainRoleInput').value),backup:normalizeRole(document.getElementById('backupRoleInput').value),ownerUid:currentUser.uid,createdAt:serverTimestamp()});
    } else if(editing.mode==='reply') {
      const content=document.getElementById('contentInput').value.trim(); if(!content) return;
      const id=uid('reply'); await saveDoc(id, {id,type:'reply',parentId:editing.parentId,content,ownerUid:currentUser.uid,createdAt:serverTimestamp()});
    } else if(editing.mode==='editReply') {
      const content=document.getElementById('contentInput').value.trim(); if(!content) return; if(!confirm('確定要修改這段文字嗎？')) return;
      await updateDoc(doc(entriesCol, editing.id), {content,updatedAt:serverTimestamp()});
    } else if(editing.mode==='editRecord') {
      const title=document.getElementById('titleInput').value.trim(), content=document.getElementById('contentInput').value.trim(); if(!title || !content) return; if(!confirm('確定要修改這段文字嗎？')) return;
      const r=allRecords().find(x=>x.id===editing.id); if(!r) return;
      if(editing.source==='base') await ensureBaseOverride(r, {title,content}); else await updateDoc(doc(entriesCol, editing.id), {title,content,updatedAt:serverTimestamp()});
    } else if(editing.mode==='adjust') {
      const r=allRecords().find(x=>x.id===editing.id); if(!r) return;
      const main=normalizeRole(document.getElementById('mainRoleInput').value), backup=normalizeRole(document.getElementById('backupRoleInput').value);
      if(editing.source==='base') await ensureBaseOverride(r, {main,backup}); else await updateDoc(doc(entriesCol, editing.id), {main,backup,updatedAt:serverTimestamp()});
    } else if(editing.mode==='upload') {
      const f=document.getElementById('fileInput').files[0]; if(!f) return; if(f.size > 20*1024*1024) return alert('檔案超過 20MB，請先壓縮或改用雲端連結。');
      const safe=f.name.replace(/[\/:*?"<>|#%]/g,'_'); const path=`fengtung-handover/${editing.parentId}/${Date.now()}_${safe}`; const storageRef=ref(storage,path);
      await uploadBytes(storageRef,f,{contentType:f.type||'application/octet-stream'}); const url=await getDownloadURL(storageRef); const id=uid('file');
      await saveDoc(id, {id,type:'file',parentId:editing.parentId,fileName:f.name,url,storagePath:path,contentType:f.type||'',ownerUid:currentUser.uid,createdAt:serverTimestamp()});
    }
    closeModal();
  } catch(err) { console.error(err); alert('儲存失敗，請確認 Firebase 規則或重新整理後再試。'); }
});

window.deleteDocById = async id => { if(!confirm('確定刪除這一筆內容？')) return; await deleteDoc(doc(entriesCol,id)); };
window.openFiles = parentId => {
  const files=filesFor(parentId); document.getElementById('filesTitle').textContent=`相關資料（${files.length}）`;
  document.getElementById('filesContent').innerHTML = files.length ? files.map(f=>`<div class="fileRow"><div class="fileName">${iconFor(f)} ${esc(f.fileName||'未命名資料')}</div><div class="fileBtns"><a class="btn ghost small" href="${esc(f.url)}" target="_blank" rel="noopener">開啟</a>${canDelete(f)?`<button class="btn danger small" onclick="deleteFile('${f.id}')">刪除</button>`:''}</div></div>`).join('') : '<div class="empty">目前沒有相關資料。</div>';
  document.getElementById('filesBackdrop').classList.add('show');
};
function iconFor(f) { const t=f.contentType||''; if(t.startsWith('image/')) return '🖼️'; if(t.includes('pdf')) return '📄'; if(t.includes('word')) return '📝'; if(t.includes('sheet')||t.includes('excel')) return '📊'; return '📎'; }
window.closeFilesModal = () => document.getElementById('filesBackdrop').classList.remove('show');
window.deleteFile = async id => { const f=docs.find(x=>x.id===id); if(!f || !confirm('確定刪除這個資料？')) return; try{ if(f.storagePath) await deleteObject(ref(storage,f.storagePath)); }catch(e){ console.warn(e); } await deleteDoc(doc(entriesCol,id)); };

setupRoleSelects(); render();
onAuthStateChanged(auth, user=>{ currentUser=user; });
signInAnonymously(auth).catch(err=>{ console.error(err); alert('Firebase 匿名登入失敗，請到 Firebase Authentication 啟用「匿名」登入方式。'); });
onSnapshot(entriesCol, snap=>{ docs = snap.docs.map(d=>({ id:d.id, ...d.data() })); render(); }, err=>{ console.error(err); alert('讀取 Firebase 資料失敗，請確認 Firestore 規則。'); });
</script>
</body>
</html>
