<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>豐東管樂交接資料庫</title>
<style>
:root {
  --bg:#f7f4ed; --panel:#fffdf8; --text:#2d2922; --muted:#7a7166; --line:#e4d9c8;
  --roleBg:#DDEBF7; --roleAccent:#5B9BD5; --danger:#b94a48; --shadow:0 12px 28px rgba(48,39,24,.10);
}
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif; background:linear-gradient(180deg,#fbf7ee 0%,#f2eadf 100%); color:var(--text); line-height:1.7; }
.wrap { max-width:1080px; margin:0 auto; }
header { padding:22px 14px 8px; }
.hero { background:#fff; border:1px solid var(--line); border-radius:22px; padding:22px 20px; box-shadow:var(--shadow); }
.hero h1 { margin:0; font-size:clamp(26px,5vw,40px); letter-spacing:.05em; text-align:center; }
main { padding:10px 14px 34px; }
button, textarea, input, select { font:inherit; }
.btn { border:none; border-radius:13px; padding:10px 14px; cursor:pointer; font-weight:800; background:var(--roleAccent); color:#fff; }
.btn.secondary { background:#fff; color:var(--text); border:1px solid var(--line); }
.btn.ghost { background:#fff; color:var(--roleAccent); border:1px solid var(--line); }
.btn.danger { background:var(--danger); color:#fff; }
.btn.small { padding:3px 8px; border-radius:999px; font-size:12px; line-height:1.45; margin-left:6px; vertical-align:baseline; }
.status { display:none !important; }

/* schedule */
.scheduleShell { margin:16px 0 18px; }
.scheduleDetails { background:#fffdf8; border:1px solid var(--line); border-radius:22px; box-shadow:var(--shadow); overflow:hidden; }
.scheduleDetails > summary { list-style:none; cursor:pointer; user-select:none; padding:18px 20px; font-size:clamp(22px,4vw,32px); font-weight:950; display:flex; justify-content:space-between; align-items:center; gap:12px; }
.scheduleDetails > summary::-webkit-details-marker { display:none; }
.scheduleDetails > summary::after { content:"點開查看"; font-size:14px; color:var(--muted); font-weight:800; }
.scheduleDetails[open] > summary::after { content:"收合"; }
.scheduleBody { border-top:1px solid var(--line); padding:14px; }
.scheduleTitleBar { display:flex; justify-content:center; align-items:baseline; gap:8px; margin:3px 0 8px; flex-wrap:wrap; }
.scheduleTitleText { font-size:22px; font-weight:950; letter-spacing:.04em; text-align:center; }
.a4Scroll { overflow-x:auto; padding-bottom:8px; -webkit-overflow-scrolling:touch; }
.a4Sheet { width:1040px; max-width:1040px; margin:0 auto; background:#fff; border:2px solid #222; padding:0; }
.scheduleTable { width:100%; border-collapse:collapse; table-layout:fixed; font-size:13px; line-height:1.35; }
.scheduleTable th, .scheduleTable td { border:1px solid #222; padding:5px 6px; vertical-align:top; word-break:break-word; white-space:pre-wrap; }
.scheduleTable th { text-align:center; background:#f6f2e8; font-weight:900; }
.scheduleTable .timeCol { width:70px; text-align:center; }
.scheduleTable .taskCol { width:355px; }
.scheduleTable .personCol { width:110px; }
.scheduleTable .noteCol { width:220px; }
.scheduleTable .opsCol { width:165px; }
.scheduleActions { display:flex; gap:4px; flex-wrap:wrap; }
.scheduleActions button { font-size:11px; padding:2px 6px; border-radius:999px; }

.roleGrid { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:12px; margin:16px 0 18px; }
.roleBtn { appearance:none; border:2px solid transparent; border-radius:18px; padding:18px 10px; min-height:76px; cursor:pointer; font-weight:900; font-size:20px; color:#2d2922; box-shadow:0 7px 18px rgba(41,32,18,.07); transition:.16s; }
.roleBtn:hover { transform:translateY(-2px); }
.roleBtn.active { border-color:var(--roleAccent); box-shadow:0 0 0 4px rgba(255,255,255,.8), var(--shadow); }
.rolePanel { background:var(--roleBg); border:2px solid rgba(0,0,0,.08); border-radius:24px; padding:16px; box-shadow:var(--shadow); }
.rolePanelTop { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
.rolePanel h2 { margin:0; font-size:clamp(24px,4.5vw,34px); }
.list { display:flex; flex-direction:column; gap:10px; }
.sectionBlock { display:flex; flex-direction:column; gap:10px; }
.sectionBlock + .sectionBlock { margin-top:18px; }
.sectionTitle { display:flex; align-items:center; gap:10px; font-size:22px; font-weight:900; margin:8px 2px 6px; color:#2d2922; }
.sectionTitle::after { content:""; height:1px; background:rgba(120,100,70,.22); flex:1; }
.sectionHint { font-size:15px; color:var(--muted); font-weight:700; margin:0 2px 12px; line-height:1.5; }
.item { background:rgba(255,255,255,.88); border:1px solid rgba(120,100,70,.18); border-left:8px solid var(--roleAccent); border-radius:18px; padding:13px 14px 12px; }
.item.added { border-left-style:dashed; background:#fff; }
.item.collab { background:rgba(255,255,255,.70); border-left-width:5px; }
.itemHead { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
.eventTitleWrap { flex:1 1 auto; min-width:0; display:flex; align-items:baseline; flex-wrap:wrap; gap:6px 9px; }
.eventTitle { font-size:22px; line-height:1.35; font-weight:900; letter-spacing:.01em; overflow:visible; white-space:normal; word-break:break-word; }
.textEditLink { appearance:none; border:0; background:transparent; color:var(--roleAccent); font-size:13px; font-weight:800; line-height:1.2; padding:0 2px; cursor:pointer; text-decoration:none; }
.childList { margin:12px 0 0; padding-left:0; display:flex; flex-direction:column; gap:8px; }
.childLine { background:rgba(255,255,255,.55); border:1px solid rgba(120,100,70,.14); border-radius:14px; padding:8px 10px; display:flex; align-items:flex-start; gap:7px; flex-wrap:wrap; overflow:visible; word-break:break-word; }
.childDot { font-weight:900; color:#111; line-height:1.55; font-size:17px; }
.childText { white-space:pre-wrap; word-break:break-word; font-size:17px; line-height:1.55; font-weight:600; flex:1 1 220px; min-width:0; }
.ownerMeta { display:flex; gap:7px; flex-wrap:wrap; margin:13px 0 0; }
.ownerPill { font-size:13px; line-height:1.25; font-weight:800; padding:4px 8px; border:1px solid rgba(120,100,70,.20); border-radius:999px; background:rgba(255,255,255,.86); color:#4f463c; white-space:normal; }
.ownerPill span { color:var(--roleAccent); }
.itemActions { display:flex; gap:7px; flex-wrap:wrap; margin-top:7px; }
.itemActions .btn.ghost { font-size:13px; line-height:1.2; padding:6px 9px; border-radius:10px; white-space:normal; }
.relatedBox { flex:0 0 auto; position:relative; }
.relatedBox summary { list-style:none; user-select:none; cursor:pointer; border:1px solid var(--line); border-radius:999px; background:#fff; color:var(--roleAccent); font-weight:900; font-size:14px; padding:6px 10px; line-height:1.25; box-shadow:0 4px 12px rgba(41,32,18,.06); white-space:normal; }
.relatedBox summary::-webkit-details-marker { display:none; }
.relatedBox[open] summary { background:var(--roleAccent); color:#fff; border-color:var(--roleAccent); }
.relatedPanel { position:absolute; right:0; top:calc(100% + 8px); z-index:20; width:min(330px,82vw); background:#fffdf8; border:1px solid var(--line); border-radius:16px; box-shadow:0 16px 40px rgba(42,34,20,.18); padding:10px; display:flex; flex-direction:column; gap:8px; }
.relatedPanelTitle { font-weight:900; color:var(--text); border-bottom:1px solid var(--line); padding:0 2px 6px; margin-bottom:2px; }
.relatedFile { background:#fff; border:1px solid rgba(120,100,70,.16); border-radius:12px; padding:8px 9px; display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.relatedFile button.openFile { appearance:none; border:0; background:transparent; color:var(--roleAccent); font-weight:800; text-decoration:none; text-align:left; padding:0; cursor:pointer; overflow:visible; text-overflow:clip; white-space:normal; word-break:break-word; }
.relatedFileActions { flex:0 0 auto; white-space:nowrap; }
.empty { background:#fff; border:1px dashed var(--line); border-radius:18px; padding:18px; color:var(--muted); }
.modalBackdrop { position:fixed; inset:0; background:rgba(30,24,15,.48); display:none; align-items:center; justify-content:center; padding:16px; z-index:50; }
.modalBackdrop.show { display:flex; }
.modal { width:min(680px,100%); max-height:88vh; overflow:auto; background:#fffdf8; border-radius:22px; box-shadow:0 24px 80px rgba(0,0,0,.28); padding:18px; }
.modal h2 { margin:0 0 10px; }
label { display:block; font-weight:900; margin-bottom:6px; }
input[type="text"], textarea, select { width:100%; border:1px solid var(--line); border-radius:14px; padding:11px; background:#fff; color:var(--text); }
input[type="text"], select { min-height:46px; }
textarea { min-height:150px; resize:vertical; }
.field { margin-bottom:12px; }
.field.hidden { display:none; }
.modalActions { display:flex; justify-content:flex-end; gap:8px; margin-top:12px; flex-wrap:wrap; }
.previewModal { width:min(920px,100%); }
.previewTop { display:flex; justify-content:space-between; gap:10px; align-items:center; margin-bottom:10px; }
.previewTop h2 { font-size:18px; word-break:break-word; }
.previewBody { max-height:75vh; overflow:auto; display:flex; align-items:center; justify-content:center; background:#f7f4ed; border-radius:14px; padding:10px; }
.previewBody img { max-width:100%; height:auto; border-radius:10px; }
@media (max-width:920px) { .roleGrid { grid-template-columns:repeat(3,minmax(0,1fr)); } }
@media (max-width:620px) {
  header { padding:12px 10px 6px; } main { padding:8px 10px 26px; } .hero { padding:18px 14px; border-radius:18px; }
  .roleGrid { grid-template-columns:repeat(2,minmax(0,1fr)); gap:9px; } .roleBtn { min-height:64px; font-size:18px; padding:14px 8px; } .rolePanel { padding:12px; border-radius:20px; }
  .eventTitle { font-size:20px; } .childDot { font-size:16px; } .childText { font-size:16px; flex-basis:180px; } .ownerPill, .itemActions .btn.ghost { font-size:12px; }
  .scheduleDetails > summary { padding:14px 16px; }
}
</style>
</head>
<body>
<header><div class="wrap hero"><h1>豐東管樂交接資料庫</h1></div></header>
<main>
  <div class="wrap">
    <section class="scheduleShell">
      <details class="scheduleDetails" id="scheduleDetails">
        <summary id="scheduleSummary">成果展進度表</summary>
        <div class="scheduleBody">
          <div class="scheduleTitleBar"><span class="scheduleTitleText" id="scheduleTitleText">成果展進度表</span><button class="textEditLink" id="editScheduleTitleBtn" type="button">修改</button></div>
          <div class="a4Scroll"><div class="a4Sheet" id="scheduleContent"></div></div>
        </div>
      </details>
    </section>
    <div id="roleGrid" class="roleGrid"></div>
    <section id="rolePanel" class="rolePanel">
      <div class="rolePanelTop"><h2 id="currentRoleTitle"></h2><button class="btn" id="addItemBtn">＋新增一項</button></div>
      <p class="status" id="statusText">連線中…</p>
      <div id="content" class="list"></div>
    </section>
  </div>
</main>

<div class="modalBackdrop" id="modalBackdrop"><div class="modal"><h2 id="modalTitle">新增內容</h2><form id="modalForm">
  <div class="field" id="titleField"><label for="itemTitle">大項</label><input type="text" id="itemTitle" placeholder="例如：場地申請與票務申請"></div>
  <div class="field"><label for="itemContent" id="contentLabel">小項／補充內容</label><textarea id="itemContent" required placeholder="請輸入內容"></textarea></div>
  <div class="modalActions"><button type="button" class="btn secondary" id="cancelModalBtn">取消</button><button type="submit" class="btn">儲存</button></div>
</form></div></div>

<div class="modalBackdrop" id="assignBackdrop"><div class="modal"><h2>調整負責人</h2><form id="assignForm">
  <div class="field"><label for="mainRoleSelect">主要負責人</label><select id="mainRoleSelect"></select></div>
  <div class="field"><label for="backupRoleSelect">備援負責人</label><select id="backupRoleSelect"></select></div>
  <div class="modalActions"><button type="button" class="btn secondary" id="cancelAssignBtn">取消</button><button type="submit" class="btn">儲存</button></div>
</form></div></div>

<div class="modalBackdrop" id="scheduleModalBackdrop"><div class="modal"><h2 id="scheduleModalTitle">修改列</h2><form id="scheduleForm">
  <div class="field"><label for="scheduleTime">時間</label><input type="text" id="scheduleTime"></div>
  <div class="field"><label for="scheduleTask">事項</label><textarea id="scheduleTask" required></textarea></div>
  <div class="field"><label for="schedulePrimary">主要負責人</label><input type="text" id="schedulePrimary"></div>
  <div class="field"><label for="scheduleBackup">協助負責人</label><input type="text" id="scheduleBackup"></div>
  <div class="field"><label for="scheduleNote">備註</label><textarea id="scheduleNote"></textarea></div>
  <div class="modalActions"><button type="button" class="btn secondary" id="cancelScheduleBtn">取消</button><button type="submit" class="btn">儲存</button></div>
</form></div></div>

<div class="modalBackdrop" id="previewBackdrop"><div class="modal previewModal"><div class="previewTop"><h2 id="previewTitle">圖片預覽</h2><button class="btn secondary" id="closePreviewBtn">× 關閉</button></div><div class="previewBody" id="previewBody"></div></div></div>
<input type="file" id="fileInput" hidden accept="image/*,.pdf,.doc,.docx,.xls,.xlsx">

  closeModal(); } catch(err) { alert('儲存失敗：'+(err.message||err)); } }
async function addEventDoc(data) { if(!currentUser) return alert('尚未連線'); await addDoc(entriesCol, {...data, ownerUid:currentUser.uid, createdAt:serverTimestamp()}); }
function openAssign(id) { const item=buildItems().find(i=>i.id===id); if(!item) return; assignTarget=id; $('mainRoleSelect').innerHTML = ['尚未指定',...ROLES].map(r=>`<option value="${esc(r)}">${esc(r)}</option>`).join(''); $('backupRoleSelect').innerHTML = ['尚未指定',...ROLES].map(r=>`<option value="${esc(r)}">${esc(r)}</option>`).join(''); $('mainRoleSelect').value=item.main; $('backupRoleSelect').value=item.backup; $('assignBackdrop').classList.add('show'); }
function closeAssign() { $('assignBackdrop').classList.remove('show'); assignTarget=null; }
async function saveAssign(e) { e.preventDefault(); await addEventDoc({type:'assign', parentId:assignTarget, mainRole:$('mainRoleSelect').value, backupRole:$('backupRoleSelect').value}); closeAssign(); }
function openUpload(id) { uploadTarget=id; $('fileInput').value=''; $('fileInput').click(); }
async function handleFilePicked(e) { const file=e.target.files?.[0]; if(!file || !uploadTarget || !currentUser) return; if(file.size > 20*1024*1024) return alert('單一檔案限制 20MB 以下。'); const path = `fengtung-handover/${currentRole}/${uploadTarget}/${Date.now()}-${file.name}`; try { const storageRef=ref(storage,path); await uploadBytes(storageRef,file); const fileUrl=await getDownloadURL(storageRef); await addDoc(entriesCol, {type:'file', parentId:uploadTarget, role:currentRole, fileName:file.name, fileUrl, storagePath:path, contentType:file.type||'', size:file.size, ownerUid:currentUser.uid, createdAt:serverTimestamp()}); } catch(err) { alert('上傳失敗：'+(err.message||err)); } }
function openFile(id) { const f=entries.find(e=>e.id===id); if(!f) return; if((f.contentType||'').startsWith('image/')) { $('previewTitle').textContent=f.fileName||'圖片預覽'; $('previewBody').innerHTML=`<img src="${esc(f.fileUrl)}" alt="${esc(f.fileName||'圖片')}">`; $('previewBackdrop').classList.add('show'); history.pushState({preview:true},''); } else window.open(f.fileUrl,'_blank'); }
function closePreview() { $('previewBackdrop').classList.remove('show'); $('previewBody').innerHTML=''; }

function buildScheduleRows() { const edits=latestByParent('scheduleEdit'); const deletes=new Set(entries.filter(e=>e.type==='scheduleDelete').map(e=>e.parentId)); let rows=BASE_SCHEDULE.filter(r=>!deletes.has(r.id)).map(r=>{ const ed=edits.get(r.id); return {...r, ...(ed?{time:ed.time,task:ed.task,primary:ed.primary,backup:ed.backup,note:ed.note}:{})}; }); entries.filter(e=>e.type==='scheduleRow' && !deletes.has(e.id)).forEach(e=>{ const ed=edits.get(e.id); rows.push({id:e.id, order:e.order||Date.now(), time:ed?.time??e.time??'', task:ed?.task??e.task??'', primary:ed?.primary??e.primary??'', backup:ed?.backup??e.backup??'', note:ed?.note??e.note??''}); }); return rows.sort((a,b)=>(a.order||0)-(b.order||0)); }
function getScheduleTitle() { const ts=entries.filter(e=>e.type==='scheduleTitle'); return ts.length ? (ts[ts.length-1].title || '成果展進度表') : '成果展進度表'; }
function renderSchedule() { const title=getScheduleTitle(); $('scheduleSummary').firstChild.nodeValue = title; $('scheduleTitleText').textContent = title; const rows=buildScheduleRows(); const html=`<table class="scheduleTable"><thead><tr><th class="timeCol">時間</th><th class="taskCol">事項</th><th class="personCol">主要負責人</th><th class="personCol">協助負責人</th><th class="noteCol">備註</th><th class="opsCol">操作</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td class="timeCol">${esc(r.time)}</td><td class="taskCol">${esc(r.task)}</td><td class="personCol">${esc(r.primary)}</td><td class="personCol">${esc(r.backup)}</td><td class="noteCol">${esc(r.note)}</td><td class="opsCol"><div class="scheduleActions"><button class="btn small ghost" data-schedule-edit="${esc(r.id)}">修改</button><button class="btn small ghost" data-schedule-insert-above="${esc(r.id)}">上方新增</button><button class="btn small ghost" data-schedule-insert-below="${esc(r.id)}">下方新增</button><button class="btn small danger" data-schedule-delete="${esc(r.id)}">刪除</button></div></td></tr>`).join('')}</tbody></table>`; $('scheduleContent').innerHTML=html; }
function openScheduleModal(mode,id) { const rows=buildScheduleRows(); let row=rows.find(r=>r.id===id); scheduleEditing={mode,id}; $('scheduleModalTitle').textContent = mode==='edit'?'修改進度表列':'新增進度表列'; $('scheduleTime').value = mode==='edit'?(row?.time||''):''; $('scheduleTask').value = mode==='edit'?(row?.task||''):''; $('schedulePrimary').value = mode==='edit'?(row?.primary||''):''; $('scheduleBackup').value = mode==='edit'?(row?.backup||''):''; $('scheduleNote').value = mode==='edit'?(row?.note||''):''; $('scheduleModalBackdrop').classList.add('show'); }
function closeScheduleModal() { $('scheduleModalBackdrop').classList.remove('show'); scheduleEditing=null; }
function orderForInsert(id, below) { const rows=buildScheduleRows(); const i=rows.findIndex(r=>r.id===id); if(i<0) return Date.now(); if(below) { const curr=rows[i].order||0, next=rows[i+1]?.order; return next ? (curr+next)/2 : curr+1000; } else { const curr=rows[i].order||0, prev=rows[i-1]?.order; return prev ? (prev+curr)/2 : curr-1000; } }
async function saveSchedule(e) { e.preventDefault(); const data={time:$('scheduleTime').value.trim(), task:$('scheduleTask').value.trim(), primary:$('schedulePrimary').value.trim(), backup:$('scheduleBackup').value.trim(), note:$('scheduleNote').value.trim()}; if(!data.task) return; try { if(scheduleEditing.mode==='edit') await addEventDoc({type:'scheduleEdit', parentId:scheduleEditing.id, ...data}); else await addEventDoc({type:'scheduleRow', order:orderForInsert(scheduleEditing.id, scheduleEditing.mode==='below'), ...data}); closeScheduleModal(); } catch(err) { alert('儲存失敗：'+(err.message||err)); } }
async function editScheduleTitle() { const old=getScheduleTitle(); const title=prompt('請輸入進度表名稱', old); if(title===null) return; const t=title.trim(); if(!t) return; await addEventDoc({type:'scheduleTitle', title:t}); }

$('roleGrid').addEventListener('click', e=>{ const btn=e.target.closest('[data-role]'); if(!btn) return; currentRole=btn.dataset.role; renderContent(); });
$('content').addEventListener('click', async e=>{ const t=e.target; const reply=t.closest('[data-reply]'), editTop=t.closest('[data-edit-top]'), editReply=t.closest('[data-edit-reply]'), delReply=t.closest('[data-delete-reply]'), delItem=t.closest('[data-delete-item]'), upload=t.closest('[data-upload]'), fileDel=t.closest('[data-file-delete]'), fileOpen=t.closest('[data-file-open]'), assign=t.closest('[data-assign]'); if(reply) { editing={mode:'reply',parentId:reply.dataset.reply}; showModal('補充內容'); } else if(editTop) openEditTop(editTop.dataset.editTop); else if(editReply) openEditReply(editReply.dataset.editReply); else if(delReply && confirm('確定要刪除這一筆補充內容嗎？')) await addEventDoc({type:'deleteReply', parentId:delReply.dataset.deleteReply}); else if(delItem && confirm('確定要刪除這個大項嗎？')) await addEventDoc({type:'deleteItem', parentId:delItem.dataset.deleteItem}); else if(upload) openUpload(upload.dataset.upload); else if(fileDel && confirm('確定要刪除這個資料連結嗎？')) await addEventDoc({type:'fileDelete', parentId:fileDel.dataset.fileDelete}); else if(fileOpen) openFile(fileOpen.dataset.fileOpen); else if(assign) openAssign(assign.dataset.assign); });
$('scheduleContent').addEventListener('click', async e=>{ const t=e.target; const ed=t.closest('[data-schedule-edit]'), above=t.closest('[data-schedule-insert-above]'), below=t.closest('[data-schedule-insert-below]'), del=t.closest('[data-schedule-delete]'); if(ed) openScheduleModal('edit',ed.dataset.scheduleEdit); else if(above) openScheduleModal('above',above.dataset.scheduleInsertAbove); else if(below) openScheduleModal('below',below.dataset.scheduleInsertBelow); else if(del && confirm('確定要刪除這一列嗎？')) await addEventDoc({type:'scheduleDelete', parentId:del.dataset.scheduleDelete}); });
$('editScheduleTitleBtn').addEventListener('click', editScheduleTitle);
$('addItemBtn').addEventListener('click',()=>{ editing={mode:'newItem'}; showModal('新增一項'); });
$('cancelModalBtn').addEventListener('click', closeModal); $('modalBackdrop').addEventListener('click',e=>{ if(e.target.id==='modalBackdrop') closeModal(); }); $('modalForm').addEventListener('submit',saveModal);
$('cancelAssignBtn').addEventListener('click', closeAssign); $('assignBackdrop').addEventListener('click',e=>{ if(e.target.id==='assignBackdrop') closeAssign(); }); $('assignForm').addEventListener('submit',saveAssign);
$('cancelScheduleBtn').addEventListener('click', closeScheduleModal); $('scheduleModalBackdrop').addEventListener('click',e=>{ if(e.target.id==='scheduleModalBackdrop') closeScheduleModal(); }); $('scheduleForm').addEventListener('submit',saveSchedule);
$('fileInput').addEventListener('change', handleFilePicked); $('closePreviewBtn').addEventListener('click', closePreview); $('previewBackdrop').addEventListener('click', e=>{ if(e.target.id==='previewBackdrop') closePreview(); }); window.addEventListener('popstate',()=>closePreview()); document.addEventListener('keydown',e=>{ if(e.key==='Escape') { closePreview(); closeModal(); closeAssign(); closeScheduleModal(); } });
renderContent();
onAuthStateChanged(auth, user=>{ currentUser=user; if(user) renderContent(); });
signInAnonymously(auth).catch(err=>{ console.error(err); alert('Firebase 匿名登入失敗，請確認 Authentication 已啟用匿名登入。'); });
onSnapshot(query(entriesCol, orderBy('createdAt','asc')), snap=>{ entries=snap.docs.map(d=>({id:d.id,...d.data()})); renderContent(); }, err=>{ console.error(err); alert('Firestore 讀取失敗，請確認規則已發布。'); });
</script>
</body>
</html>
