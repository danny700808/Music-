      <div class="modalActions">
        <button type="button" class="btn secondary" id="cancelModalBtn">取消</button>
        <button type="submit" class="btn">儲存</button>
      </div>
    </form>
  </div>
</div>

    main: effectiveMain(r),
    backup: effectiveBackup(r)
  };
}
function itemDisplay(e) {
  const edit = textEditFor(e.id);
  return {
    id:e.id,
    title: edit?.title || e.title || '新增項目',
    content: edit?.content ?? (e.content || ''),
    main: effectiveMain(e),
    backup: effectiveBackup(e)
  };
}
function effectiveMain(record) {
  const a = assignmentFor(record.id);
  if(a?.mainRole) return normalizeRole(a.mainRole);
  return normalizeRole(record.main || record.role || '尚未指定');
}
function effectiveBackup(record) {
  const a = assignmentFor(record.id);
  if(a?.backupRole) return normalizeRole(a.backupRole);
  if(record.kind === 'base' || BASE_RECORDS.some(r => r.id === record.id)) return defaultBackupForBase(record);
  return normalizeRole(record.backupRole || '尚未指定');
}
function primaryForRole(record, role) { return expandsToRole(effectiveMain(record), role); }
function backupForRole(record, role) { return !primaryForRole(record, role) && expandsToRole(effectiveBackup(record), role); }
function primaryBaseRecordsForRole(role) { return BASE_RECORDS.filter(r => primaryForRole(r, role)); }
function backupBaseRecordsForRole(role) { return BASE_RECORDS.filter(r => backupForRole(r, role)); }
function customItems() { return entries.filter(e => e.type === 'item' && !e.parentId); }
function customItemsPrimaryForRole(role) { return customItems().filter(e => primaryForRole(e, role)); }
function customItemsBackupForRole(role) { return customItems().filter(e => backupForRole(e, role)); }
function repliesFor(parentId) { return entries.filter(e => e.type === 'reply' && e.parentId === parentId); }
function filesFor(parentId) { return entries.filter(e => e.type === 'file' && e.parentId === parentId); }
function textForBase(r) { return (baseDisplay(r).content || '').trim(); }

function ensureAssignModal() {
  if($('assignBackdrop')) return;
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modalBackdrop" id="assignBackdrop">
      <div class="modal">
        <h2>調整負責人</h2>
        <form id="assignForm">
          <div class="field">
            <label for="mainRoleSelect">主要負責人</label>
            <select id="mainRoleSelect" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff;color:var(--text);"></select>
          </div>
          <div class="field">
            <label for="backupRoleSelect">備援負責人</label>
            <select id="backupRoleSelect" style="width:100%;border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff;color:var(--text);"></select>
          </div>
          <div class="modalActions">
            <button type="button" class="btn secondary" id="cancelAssignBtn">取消</button>
            <button type="submit" class="btn">儲存</button>
          </div>
        </form>
      </div>
    </div>`);
  const opts = ROLES.map(r => `<option value="${esc(r.id)}">${esc(r.name)}</option>`).join('');
  $('mainRoleSelect').innerHTML = opts;
  $('backupRoleSelect').innerHTML = opts;
  $('cancelAssignBtn').addEventListener('click', closeAssignModal);
  $('assignBackdrop').addEventListener('click', e => { if(e.target.id === 'assignBackdrop') closeAssignModal(); });
  $('assignForm').addEventListener('submit', saveAssignment);
}

function renderRoles() {
  $('roleGrid').innerHTML = VISIBLE_ROLES.map(r => {
    const c = roleStyle(r.id);
    return `<button class="roleBtn ${currentRole===r.id?'active':''}" style="background:${c.bg}" data-role="${esc(r.id)}">${esc(r.name)}</button>`;
  }).join('');
}

function childLines(parentId) {
  const replies = repliesFor(parentId);
  if(!replies.length) return '';
  return `<div class="childList">${replies.map(e => {
    const edit = replyEditFor(e.id);
    const content = edit?.content ?? e.content;
    return `<div class="childLine"><span class="childDot">•</span><span class="childText">${esc(content)}</span><button class="textEditLink" data-edit-reply="${esc(e.id)}">修改</button>${isMine(e) ? ` <button class="btn danger small" data-delete="${e.id}">刪除</button>` : ''}</div>`;
  }).join('')}</div>`;
}

function relatedMaterials(parentId) {
  const files = filesFor(parentId);
  if(!files.length) return '';
  return `<details class="relatedBox">
    <summary>📎 相關資料 ${files.length}</summary>
    <div class="relatedPanel">
      <div class="relatedPanelTitle">相關資料</div>
      ${files.map(f => `
        <div class="relatedFile">
          <a href="${esc(f.fileUrl)}" target="_blank" rel="noopener" title="${esc(f.fileName || '資料')}">${fileIcon(f)} ${esc(f.fileName || '資料')}</a>
          <span class="relatedFileActions">${isMine(f) ? `<button class="btn danger small" data-file-delete="${f.id}">刪除</button>` : ''}</span>
        </div>
      `).join('')}
    </div>
  </details>`;
}
function fileIcon(f) {
  const t = f.contentType || '';
  const name = (f.fileName || '').toLowerCase();
  if(t.startsWith('image/')) return '🖼️';
  if(t === 'application/pdf' || name.endsWith('.pdf')) return '📄';
  if(name.endsWith('.doc') || name.endsWith('.docx')) return '📝';
  if(name.endsWith('.xls') || name.endsWith('.xlsx')) return '📊';
  return '📎';
}
function actionButtons(parentId) {
  return `<div class="itemActions">
    <button class="btn ghost" data-reply="${esc(parentId)}">＋補充內容</button>
    <button class="btn ghost" data-upload="${esc(parentId)}">＋上傳資料</button>
    <button class="btn ghost" data-assign="${esc(parentId)}">調整負責人</button>
  </div>`;
}
function ownerMeta(d) {
  return `<div class="ownerMeta"><span class="ownerPill">主要：<span>${esc(roleDisplayName(d.main))}</span></span><span class="ownerPill">備援：<span>${esc(roleDisplayName(d.backup))}</span></span></div>`;
}
function topContentLine(id, content) {
  if(!content) return '';
  return `<div class="childList baseChildList"><div class="childLine baseChildLine"><span class="childDot">•</span><span class="childText">${esc(content)}</span><button class="textEditLink" data-edit-top="${esc(id)}">修改</button></div></div>`;
}
function renderCardShell(id, title, content, d, mode='', deletable=false) {
  return `<article class="item ${mode}">
    <div class="itemHead">
      <div class="eventTitleWrap"><span class="eventTitle">${esc(title)}</span><button class="textEditLink" data-edit-top="${esc(id)}">修改</button></div>
      ${relatedMaterials(id)}
    </div>
    ${topContentLine(id, content)}
    ${childLines(id)}
    ${ownerMeta(d)}
    ${deletable ? `<div style="margin-top:5px"><button class="btn danger small" data-delete="${esc(id)}">刪除</button></div>` : ''}
    ${actionButtons(id)}
  </article>`;
}
function renderBaseCard(r, mode='main') {
  const d = baseDisplay(r);
  return renderCardShell(r.id, d.title, d.content, d, mode === 'collab' ? 'collab' : '');
}
function renderCustomItemCard(e, mode='') {
  const d = itemDisplay(e);
  return renderCardShell(e.id, d.title, d.content, d, `added ${mode}`.trim(), isMine(e));
}
function sectionHtml(title, hint, cards) {
  if(!cards.length) return '';
  return `<div class="sectionBlock"><div><div class="sectionTitle">${esc(title)}</div>${hint ? `<div class="sectionHint">${esc(hint)}</div>` : ''}</div>${cards.join('')}</div>`;
}
function renderContent() {
  const primaryBases = primaryBaseRecordsForRole(currentRole).map(r => renderBaseCard(r, 'main'));
  const customsPrimary = customItemsPrimaryForRole(currentRole).map(e => renderCustomItemCard(e));
  const backupBases = backupBaseRecordsForRole(currentRole).map(r => renderBaseCard(r, 'collab'));
  const customsBackup = customItemsBackupForRole(currentRole).map(e => renderCustomItemCard(e, 'collab'));
  const html = [
    sectionHtml('主要負責', '', [...primaryBases, ...customsPrimary]),
    sectionHtml('備援負責', '原負責人不方便時，需要能接手的事情。', [...backupBases, ...customsBackup])
  ].join('');
  $('content').innerHTML = html || '<div class="empty">目前還沒有內容。</div>';
}
function render() {
  setRoleVars(currentRole);
  renderRoles();
  $('currentRoleTitle').textContent = roleDisplayName(currentRole);
  renderContent();
}
function closeModal() {
  $('modalBackdrop').classList.remove('show');
  $('titleInput').value = '';
  $('contentInput').value = '';
  editing = null;
}
function configureModal() {
  const needsTitle = editing?.mode === 'newItem' || editing?.mode === 'editTop';
  $('titleField').classList.toggle('hidden', !needsTitle);
  $('titleInput').required = needsTitle;
  $('contentLabel').textContent = editing?.mode === 'newItem' ? '小項' : (editing?.mode === 'editTop' ? '內容' : '補充內容');
  $('contentInput').placeholder = editing?.mode === 'newItem' ? '把這一項要記錄的細項內容寫在這裡' : '把要補充或修改的內容寫在這裡';
}
function showModal(title, contentValue='', titleValue='') {
  $('modalTitle').textContent = title;
  $('contentInput').value = contentValue || '';
  $('titleInput').value = titleValue || '';
  configureModal();
  $('modalBackdrop').classList.add('show');
  setTimeout(() => (editing?.mode === 'newItem' || editing?.mode === 'editTop' ? $('titleInput') : $('contentInput')).focus(), 60);
}
async function saveModal(e) {
  e.preventDefault();
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  const content = $('contentInput').value.trim();
  const title = $('titleInput').value.trim();
  if(!content) return;
  try {
    if(editing?.mode === 'editTop') {
      if(!title) return;
      if(!confirm('確定要修改這段文字嗎？')) return;
      await addDoc(entriesCol, { type:'textEdit', parentId:editing.parentId, title, content, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    } else if(editing?.mode === 'editReply') {
      if(!confirm('確定要修改這段文字嗎？')) return;
      await addDoc(entriesCol, { type:'replyEdit', parentId:editing.parentId, content, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    } else if(editing?.mode === 'reply') {
      await addDoc(entriesCol, { type:'reply', role:currentRole, parentId:editing.parentId, content, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    } else if(editing?.mode === 'newItem') {
      if(!title) return;
      await addDoc(entriesCol, { type:'item', role:currentRole, title, content, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    }
    closeModal();
  } catch(err) {
    console.error(err);
    alert('儲存失敗：' + (err.message || err));
  }
}
function openEditTop(parentId) {
  const base = baseById(parentId);
  const item = entryById(parentId);
  let title='', content='';
  if(base) { const d = baseDisplay(base); title = d.title; content = d.content; }
  else if(item) { const d = itemDisplay(item); title = d.title; content = d.content; }
  else return;
  editing = { mode:'editTop', parentId };
  showModal('修改事件', content || '', title || '');
}
function openEditReply(parentId) {
  const reply = entryById(parentId);
  if(!reply) return;
  const edit = replyEditFor(parentId);
  editing = { mode:'editReply', parentId };
  showModal('修改補充內容', edit?.content ?? reply.content ?? '');
}
async function deleteEntry(id) {
  const entry = entries.find(e => e.id === id);
  if(!entry || !isMine(entry)) return;
  if(!confirm('確定刪除這一筆內容？')) return;
  try { await deleteDoc(doc(db, 'fengtungHandoverEntries', id)); }
  catch(err) { alert('刪除失敗：' + (err.message || err)); }
}
function openUpload(parentId) {
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  uploadTarget = parentId;
  $('fileInput').value = '';
  $('fileInput').click();
}
async function handleFilePicked(e) {
  const file = e.target.files && e.target.files[0];
  if(!file || !uploadTarget || !currentUser) return;
  if(file.size > 20 * 1024 * 1024) { alert('檔案不能超過 20MB。'); return; }
  $('statusText').textContent = '檔案上傳中…';
  const path = `fengtung-handover/${safePart(currentRole)}/${safePart(uploadTarget)}/${Date.now()}-${safePart(file.name)}`;
  try {
    const storageRef = ref(storage, path);
    await uploadBytes(storageRef, file, { contentType: file.type || 'application/octet-stream' });
    const fileUrl = await getDownloadURL(storageRef);
    await addDoc(entriesCol, { type:'file', role:currentRole, parentId:uploadTarget, fileName:file.name, fileUrl, storagePath:path, contentType:file.type || '', size:file.size, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    $('statusText').textContent = '已連線 Firebase，可共同填寫。';
  } catch(err) {
    console.error(err);
    $('statusText').textContent = '已連線 Firebase，可共同填寫。';
    alert('上傳失敗：' + (err.message || err));
  }
}
async function deleteFileEntry(id) {
  const f = entries.find(e => e.id === id);
  if(!f || !isMine(f)) return;
  if(!confirm('確定刪除這筆相關資料？')) return;
  try {
    if(f.storagePath) await deleteObject(ref(storage, f.storagePath)).catch(() => {});
    await deleteDoc(doc(db, 'fengtungHandoverEntries', id));
  } catch(err) { alert('刪除相關資料失敗：' + (err.message || err)); }
}
function openAssignModal(parentId) {
  if(!currentUser) { alert('Firebase 匿名登入尚未完成，請稍後再試。'); return; }
  ensureAssignModal();
  assignTarget = parentId;
  const base = baseById(parentId);
  const item = entryById(parentId);
  const rec = base || item;
  if(!rec) return;
  $('mainRoleSelect').value = effectiveMain(rec);
  $('backupRoleSelect').value = effectiveBackup(rec);
  $('assignBackdrop').classList.add('show');
}
function closeAssignModal() {
  const bd = $('assignBackdrop');
  if(bd) bd.classList.remove('show');
  assignTarget = null;
}
async function saveAssignment(e) {
  e.preventDefault();
  if(!assignTarget || !currentUser) return;
  const mainRole = $('mainRoleSelect').value;
  const backupRole = $('backupRoleSelect').value;
  try {
    await addDoc(entriesCol, { type:'assign', parentId:assignTarget, mainRole, backupRole, ownerUid:currentUser.uid, createdAt:serverTimestamp() });
    closeAssignModal();
  } catch(err) { alert('調整負責人失敗：' + (err.message || err)); }
}
$('roleGrid').addEventListener('click', e => {
  const btn = e.target.closest('[data-role]');
  if(!btn) return;
  currentRole = btn.dataset.role;
  render();
});
$('content').addEventListener('click', e => {
  const reply = e.target.closest('[data-reply]');
  const editTop = e.target.closest('[data-edit-top]');
  const editReply = e.target.closest('[data-edit-reply]');
  const del = e.target.closest('[data-delete]');
  const upload = e.target.closest('[data-upload]');
  const fileDel = e.target.closest('[data-file-delete]');
  const assign = e.target.closest('[data-assign]');
  if(reply) { editing = { mode:'reply', parentId:reply.dataset.reply }; showModal('補充內容'); return; }
  if(editTop) { openEditTop(editTop.dataset.editTop); return; }
  if(editReply) { openEditReply(editReply.dataset.editReply); return; }
  if(del) { deleteEntry(del.dataset.delete); return; }
  if(upload) { openUpload(upload.dataset.upload); return; }
  if(fileDel) { deleteFileEntry(fileDel.dataset.fileDelete); return; }
  if(assign) { openAssignModal(assign.dataset.assign); return; }
});
$('addItemBtn').addEventListener('click', () => { editing = { mode:'newItem' }; showModal('新增一項'); });
$('cancelModalBtn').addEventListener('click', closeModal);
$('modalBackdrop').addEventListener('click', e => { if(e.target.id === 'modalBackdrop') closeModal(); });
$('modalForm').addEventListener('submit', saveModal);
$('fileInput').addEventListener('change', handleFilePicked);

ensureAssignModal();
render();

onAuthStateChanged(auth, user => {
  currentUser = user;
  if(user) {
    $('statusText').textContent = '已連線 Firebase，可共同填寫。';
    renderContent();
  }
});
signInAnonymously(auth).catch(err => {
  console.error(err);
  $('statusText').textContent = 'Firebase 匿名登入失敗，請確認 Authentication 已啟用匿名登入。';
});
onSnapshot(query(entriesCol, orderBy('createdAt', 'asc')), snap => {
  entries = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  renderContent();
}, err => {
  console.error(err);
  $('statusText').textContent = 'Firestore 讀取失敗，請確認規則已發布。';
});
</script>
</body>
</html>
