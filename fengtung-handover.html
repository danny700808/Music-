/* warm entry/detail theme override */
:root{
  --bg:#f5eadb;
  --panel:#fff3e4;
  --text:#332419;
  --muted:#7a6048;
  --line:#ddc0a0;
  --roleBg:#f7e4d0;
  --roleAccent:#b76e3c;
  --danger:#a94737;
  --shadow:0 14px 30px rgba(88,56,26,.14);
}
body{
  background:
    radial-gradient(circle at top left, rgba(255,227,196,.95), rgba(255,227,196,0) 34%),
    linear-gradient(180deg,#f8ecdc 0%,#efd9bd 100%);
  color:var(--text);
}
.hero{
  background:linear-gradient(135deg,#fff0dc 0%,#f8ddbc 100%);
  border-color:#d9b58d;
  box-shadow:0 16px 34px rgba(96,58,25,.15);
}
.hero h1{color:#3a2518;text-shadow:0 1px 0 rgba(255,255,255,.5)}
.entryMenu{
  background:linear-gradient(135deg,#fff0dd 0%,#f8dfc1 100%);
  border-color:#d9b58d;
  box-shadow:0 18px 36px rgba(96,58,25,.14);
}
.entryChoice{
  background:linear-gradient(135deg,#ffe7ca 0%,#f3cfa7 100%);
  border-color:#d2a373;
  color:#3a2518;
  box-shadow:0 12px 24px rgba(99,62,28,.16);
}
.entryChoice:nth-child(2){background:linear-gradient(135deg,#fff1df 0%,#f0d0b6 100%)}
.entryChoice:hover,.entryChoice:focus{
  border-color:#b76e3c;
  box-shadow:0 15px 30px rgba(99,62,28,.20);
}
.viewBackBtn,.btn.secondary,.btn.ghost,.progressMiniBtn,.roleCandidateBtn{
  background:#fff1df;
  border-color:#d8b58f;
  color:#5d341f;
}
.btn{background:#b76e3c;color:#fff}.btn.ghost{color:#9a5a35}.btn.secondary{color:#3a2518}
.progressSection{
  background:#fff1df;
  border-color:#d9b58d;
  box-shadow:0 16px 34px rgba(96,58,25,.14);
}
.progressTop{
  background:linear-gradient(135deg,#9f5434 0%,#c98755 100%);
  color:#fff8ef;
}
.progressToggle{background:rgba(255,241,223,.22);border-color:rgba(255,247,235,.65);color:#fff8ef}
.progressTab{
  background:#ca8451;
  color:#fff8ef;
  box-shadow:0 7px 16px rgba(122,71,35,.16);
}
.progressTab.active{
  background:#8f4d31;
  outline-color:rgba(255,244,230,.95);
  box-shadow:0 0 0 3px rgba(143,77,49,.25);
}
.progressBody{background:#fff1df}.progressScroll{background:#f7e1c6;border-color:#d8b58f}.progressPaper{background:#fff8ef}
.progressTable{background:#fff8ef;color:#21150e}.progressTable th{background:#ecd4b7}.progressTable td{background:#fff8ef}.progressTable tr:nth-child(even) td{background:#fff2e0}
.progressHint,.sectionHint,.roleEditorHint,.roleEditorNamePreview{color:#7a6048}
.rolePanel{
  background:linear-gradient(135deg,var(--roleBg) 0%,#fff1df 100%);
  border-color:rgba(122,84,52,.20);
  box-shadow:0 16px 34px rgba(96,58,25,.14);
}
.roleBtn{
  border-color:rgba(122,84,52,.10);
  box-shadow:0 9px 20px rgba(99,62,28,.12);
}
.roleBtn.active{
  border-color:var(--roleAccent);
  box-shadow:0 0 0 4px rgba(255,244,230,.86),0 16px 30px rgba(99,62,28,.18);
}
.item{
  background:#fff6ea;
  border-color:rgba(122,84,52,.20);
  box-shadow:0 7px 18px rgba(96,58,25,.08);
}
.item.collab{background:#f8e6d2}.item.added{background:#fff1df}.childLine,.relatedPanel,.officerConfigCard{background:#fff1df;border-color:rgba(122,84,52,.18)}
.ownerPill{background:#f7dfc2;border-color:rgba(122,84,52,.22);color:#4b2d1d}.eventLine{color:#3f2a1c}.sectionTitle{color:#3a2518}.sectionTitle::after{background:rgba(122,84,52,.25)}
.modalCard{background:#fff1df;border:1px solid #d9b58d}.modalBackdrop{background:rgba(59,36,20,.48)}
input,textarea,select{background:#fff8ef;border-color:#d9b58d;color:#332419}
/* end warm entry/detail theme override */

</style>

<header><div class="wrap hero"><h1>豐東管樂交接資料庫</h1></div></header>

function fileIcon(f){const t=f.contentType||'',n=(f.fileName||'').toLowerCase();if(t.startsWith('image/'))return'🖼️';if(t==='application/pdf'||n.endsWith('.pdf'))return'📄';if(n.endsWith('.doc')||n.endsWith('.docx'))return'📝';if(n.endsWith('.xls')||n.endsWith('.xlsx'))return'📊';return'📎'} function relatedMaterials(id){const files=filesFor(id);if(!files.length)return'';return`<details class="relatedBox"><summary>📎 相關資料 ${files.length}</summary><div class="relatedPanel"><div class="relatedPanelTitle">相關資料</div>${files.map(f=>`<div class="relatedFile"><a href="${esc(f.fileUrl)}" target="_blank" rel="noopener">${fileIcon(f)} ${esc(f.fileName||'資料')}</a><span class="relatedFileActions">${isMine(f)?`<button class="btn danger small" data-file-delete="${f.id}">刪除</button>`:''}</span></div>`).join('')}</div></details>`}

  listBox.addEventListener('click',e=>{const card=e.target.closest('[data-officer-year-card]');if(e.target.closest('[data-add-officer-person]')&&card){card.querySelector('[data-officer-person-list]').insertAdjacentHTML('beforeend',personRowHtml('會長',''));return}if(e.target.closest('[data-delete-officer-person]')){const row=e.target.closest('[data-officer-person-row]');if(row)row.remove();return}if(e.target.closest('[data-delete-officer-year]')&&card){const y=card.querySelector('[data-officer-year]')?.value||'這一屆';if(confirm(`確定刪除 ${y} 的整屆人員名單嗎？`))card.remove();return}});
  bd.querySelector('#officerAddYear').addEventListener('click',()=>{listBox.insertAdjacentHTML('beforeend',yearCardHtml(nextYear(),[]));const cards=listBox.querySelectorAll('[data-officer-year-card]');cards[cards.length-1].querySelector('[data-officer-year]').focus()});
  bd.querySelector('#officerCancel').addEventListener('click',close);
  bd.querySelector('#officerSave').addEventListener('click',async()=>{const lists=collect();if(!Object.keys(lists).length)return alert('至少要保留一屆人員名單。');if(!confirm('確定儲存人員名單嗎？'))return;await addDoc(entriesCol,{type:'officerConfig',lists,ownerUid:currentUser.uid,createdAt:serverTimestamp()});close()});

}
async function saveProgressCell(id,f){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const r=progressRows().find(x=>x.id===id);if(!r)return;let v;if(f==='time')v=await promptTime(r.time);else if(f==='primary')v=await editProgressRoles('修改主要負責人',r.primary);else if(f==='helper')v=await editProgressRoles('修改協助負責人',r.helper);else v=prompt('修改內容',r[f]||'');if(v===null)return;if(!confirm('確定要修改這一格嗎？'))return;const data=progressEditDataFromRow(r);if(f==='item'||f==='note'){const oldLines=progressLineData(r,f);const newLines=progressTextList(v).map((text,i)=>({text,roles:oldLines[i]?.roles||''}));applyProgressLinesToData(data,f,newLines)}else data[f]=String(v).trim();await addDoc(entriesCol,{type:'progressEdit',progressKey:currentProgressKey,scheduleId:id,...data,ownerUid:currentUser.uid,createdAt:serverTimestamp()})}
async function editProgressLine(id,field,index){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');field=progressLineField(field);const r=progressRows().find(x=>x.id===id);if(!r)return;const lines=progressLineData(r,field);const i=Number(index);if(!Number.isInteger(i)||!lines[i])return;const label=progressLineLabel(field);const text=prompt(`修改${label}內容`,lines[i].text||'');if(text===null)return;if(!text.trim())return alert(`${label}內容不能空白。`);const roles=await editProgressRoles(`修改${label}負責人`,lines[i].roles||'');if(roles===null)return;lines[i]={text:text.trim(),roles:roles||''};if(!confirm(`確定要修改這一個${label}嗎？`))return;const data=progressEditDataFromRow(r);applyProgressLinesToData(data,field,lines);await addDoc(entriesCol,{type:'progressEdit',progressKey:currentProgressKey,scheduleId:id,...data,ownerUid:currentUser.uid,createdAt:serverTimestamp()})}
async function addProgressLine(id,field){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');field=progressLineField(field);const r=progressRows().find(x=>x.id===id);if(!r)return;const label=progressLineLabel(field);const text=prompt(`新增${label}內容`,'');if(text===null||!text.trim())return;let roles=await editProgressRoles(`選擇${label}負責人`,'');if(roles===null)roles='';const lines=progressLineData(r,field);lines.push({text:text.trim(),roles:roles||''});const data=progressEditDataFromRow(r);applyProgressLinesToData(data,field,lines);await addDoc(entriesCol,{type:'progressEdit',progressKey:currentProgressKey,scheduleId:id,...data,ownerUid:currentUser.uid,createdAt:serverTimestamp()})}
async function deleteProgressRow(id){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const r=progressRows().find(x=>x.id===id);if(!r||!confirm('確定要刪除這一列嗎？'))return;await addDoc(entriesCol,{type:'progressEdit',progressKey:currentProgressKey,scheduleId:id,hidden:true,order:r.order||0,ownerUid:currentUser.uid,createdAt:serverTimestamp()})}
async function addProgressNear(id,after=false){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const rows=progressRows(),i=rows.findIndex(r=>r.id===id),row=rows[i],nb=rows[after?i+1:i-1];const order=!row?Date.now():nb?(row.order+nb.order)/2:row.order+(after?.5:-.5);const item=prompt('新增事項內容','');if(item===null||!item.trim())return;const time=await promptTime(row?.time||'09:00');if(time===null)return;let itemRoles=await editProgressRoles('選擇事項負責人','');if(itemRoles===null)itemRoles='';await addDoc(entriesCol,{type:'progressRow',progressKey:currentProgressKey,scheduleId:'progress-'+Date.now(),order,time,item:item.trim(),itemOwners:[itemRoles||''],primary:'',helper:'',note:'',noteOwners:[],ownerUid:currentUser.uid,createdAt:serverTimestamp()})}

function closeModal(){$('modalBackdrop').classList.remove('show');$('titleInput').value='';$('contentInput').value='';editing=null} function configureModal(){const isNew=editing?.mode==='newItem';$('titleField').classList.toggle('hidden',!isNew);$('titleInput').required=isNew;$('contentLabel').textContent=isNew?'小項':'補充內容'} function showModal(title,content='',titleValue=''){$('modalTitle').textContent=title;$('contentInput').value=content||'';$('titleInput').value=titleValue||'';configureModal();$('modalBackdrop').classList.add('show');setTimeout(()=> (editing?.mode==='newItem'?$('titleInput'):$('contentInput')).focus(),60)} async function saveModal(e){e.preventDefault();if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');const content=$('contentInput').value.trim(),title=$('titleInput').value.trim();if(!content)return;try{if(editing?.mode==='edit'){if(!confirm('確定要修改這段文字嗎？'))return;const data={content,updatedAt:serverTimestamp()};if(editing.editType==='item')data.title=title||'新增項目';await updateDoc(doc(db,'fengtungHandoverEntries',editing.id),data)}else if(editing?.mode==='reply')await addDoc(entriesCol,{type:'reply',role:currentRole,parentId:editing.parentId,content,ownerUid:currentUser.uid,createdAt:serverTimestamp()});else if(editing?.mode==='newItem'){if(!title)return;await addDoc(entriesCol,{type:'item',role:currentRole,title,content,ownerUid:currentUser.uid,createdAt:serverTimestamp()})}closeModal()}catch(err){alert('儲存失敗：'+(err.message||err))}} function openEdit(id){const e=entries.find(x=>x.id===id);if(!e||!isMine(e))return;editing={mode:'edit',id,editType:e.type};showModal(e.type==='item'?'修改項目':'修改內容',e.content||'',e.title||'')} async function deleteEntry(id){const e=entries.find(x=>x.id===id);if(!e||!isMine(e))return;if(!confirm('確定刪除這一筆內容？'))return;await deleteDoc(doc(db,'fengtungHandoverEntries',id))} async function deleteFileEntry(id){const f=entries.find(e=>e.id===id);if(!f||!isMine(f))return;if(!confirm('確定刪除這個資料？'))return;if(f.storagePath)await deleteObject(ref(storage,f.storagePath)).catch(()=>{});await deleteDoc(doc(db,'fengtungHandoverEntries',id))} function openUpload(id){if(!currentUser)return alert('Firebase 匿名登入尚未完成，請稍後再試。');uploadTarget=id;$('fileInput').value='';$('fileInput').click()} async function handleFilePicked(e){const file=e.target.files&&e.target.files[0];if(!file||!uploadTarget||!currentUser)return;if(file.size>20*1024*1024)return alert('檔案不能超過 20MB。');const path=`fengtung-handover/${safePart(currentRole)}/${safePart(uploadTarget)}/${Date.now()}-${safePart(file.name)}`;const storageRef=ref(storage,path);await uploadBytes(storageRef,file,{contentType:file.type||'application/octet-stream'});const fileUrl=await getDownloadURL(storageRef);await addDoc(entriesCol,{type:'file',role:currentRole,parentId:uploadTarget,fileName:file.name,fileUrl,storagePath:path,contentType:file.type||'',fileSize:file.size,ownerUid:currentUser.uid,createdAt:serverTimestamp()})}
function printProgressA4(){const wasCollapsed=progressCollapsed,wasRead=progressEditClosed;progressCollapsed=false;progressEditClosed=true;document.body.classList.add('print-progress-only');renderProgress();const cleanup=()=>{document.body.classList.remove('print-progress-only');progressCollapsed=wasCollapsed;progressEditClosed=wasRead;renderProgress();window.removeEventListener('afterprint',cleanup)};window.addEventListener('afterprint',cleanup);setTimeout(()=>window.print(),80)}$('progressTop').addEventListener('click',()=>{progressCollapsed=!progressCollapsed;renderProgress()});$('progressTabs').addEventListener('click',e=>{const t=e.target.closest('[data-progress-tab]');if(!t)return;currentProgressKey=t.dataset.progressTab;progressCollapsed=false;renderProgress()});$('editProgressTitleBtn').addEventListener('click',editProgressTitle);$('toggleProgressEditBtn').addEventListener('click',e=>{e.stopPropagation();progressEditClosed=!progressEditClosed;renderProgress()});$('editOfficerListsBtn').addEventListener('click',e=>{e.stopPropagation();editOfficerLists()});$('printProgressBtn').addEventListener('click',e=>{e.stopPropagation();printProgressA4()});$('progressTable').addEventListener('click',e=>{const le=e.target.closest('[data-progress-line-edit]'),la=e.target.closest('[data-progress-add-line]'),c=e.target.closest('[data-progress-cell]'),d=e.target.closest('[data-progress-delete]'),b=e.target.closest('[data-progress-add-before]'),a=e.target.closest('[data-progress-add-after]'),ai=e.target.closest('[data-progress-add-item]');if(le)return editProgressLine(le.dataset.progressLineEdit,le.dataset.field,Number(le.dataset.index));if(la)return addProgressLine(la.dataset.progressAddLine,la.dataset.field);if(c)return saveProgressCell(c.dataset.progressCell,c.dataset.field);if(ai)return addProgressItem(ai.dataset.progressAddItem);if(d)return deleteProgressRow(d.dataset.progressDelete);if(b)return addProgressNear(b.dataset.progressAddBefore,false);if(a)return addProgressNear(a.dataset.progressAddAfter,true)});$('roleGrid').addEventListener('click',e=>{const b=e.target.closest('[data-role]');if(!b)return;currentRole=b.dataset.role;render()});$('content').addEventListener('click',e=>{const reply=e.target.closest('[data-reply]'),edit=e.target.closest('[data-edit]'),del=e.target.closest('[data-delete]'),upload=e.target.closest('[data-upload]'),fileDel=e.target.closest('[data-file-delete]'),editTitle=e.target.closest('[data-edit-base-title]'),editContent=e.target.closest('[data-edit-base-content]'),assign=e.target.closest('[data-assign]');if(editTitle)return editBaseTitle(editTitle.dataset.editBaseTitle);if(editContent)return editBaseContent(editContent.dataset.editBaseContent);if(assign)return adjustOwner(assign.dataset.assign);if(reply){editing={mode:'reply',parentId:reply.dataset.reply};showModal('補充內容');return}if(edit)return openEdit(edit.dataset.edit);if(del)return deleteEntry(del.dataset.delete);if(upload)return openUpload(upload.dataset.upload);if(fileDel)return deleteFileEntry(fileDel.dataset.fileDelete)});$('addItemBtn').addEventListener('click',()=>{editing={mode:'newItem'};showModal('新增一項')});$('cancelModalBtn').addEventListener('click',closeModal);$('modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')closeModal()});$('modalForm').addEventListener('submit',saveModal);$('fileInput').addEventListener('change',handleFilePicked);
