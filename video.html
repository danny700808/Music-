<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>夏至狂響曲｜節目導覽影片</title>
  <style>
    :root {
      --bg: #060606;
      --text: #fffaf0;
      --gold: #f0d58a;
      --gold-dark: #20160a;
      --line: rgba(255,255,255,.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }

    body {
      min-height: 100svh;
      background: linear-gradient(180deg, #050505, #15100a 52%, #050505);
      overflow-x: hidden;
    }

    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 22px 14px calc(26px + env(safe-area-inset-bottom));
    }

    .video-card {
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(240,213,138,.25);
      box-shadow: 0 18px 52px rgba(0,0,0,.42);
    }

    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      display: grid;
      place-items: center;
      min-height: 56px;
      padding: 14px 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      text-decoration: none;
      font-size: 18px;
      font-weight: 900;
      color: var(--text);
      background: rgba(255,255,255,.12);
      text-align: center;
    }

    .btn.primary {
      color: var(--gold-dark);
      background: linear-gradient(135deg, #fff4cc, #d4a94f);
      border: 0;
    }

    .btn:active {
      transform: scale(.985);
    }
  </style>
</head>
<body>
  <main>
    <section class="video-card" aria-label="節目導覽影片播放器">
      <div class="video-wrap">
        <iframe
          src="https://www.youtube.com/embed/976ir0fyXq4?rel=0&playsinline=1"
          title="夏至狂響曲節目導覽影片"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>
    </section>

    <nav class="actions" aria-label="頁面操作">
      <a class="btn primary" href="https://youtu.be/976ir0fyXq4?si=doo8rmpexMSLJT6I" target="_blank" rel="noopener">用 YouTube 開啟影片</a>
      <a class="btn" href="program.html?v=20260608c">前往節目單</a>
      <a class="btn" href="index.html?v=10">回主頁</a>
    </nav>
  </main>
</body>
</html>
