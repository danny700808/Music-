<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>夏至狂響曲｜節目導覽影片</title>
  <style>
    :root{--bg:#070707;--text:#fffaf0;--muted:rgba(255,250,240,.74);--gold:#f0d58a;--gold2:#b98d3f;--line:rgba(255,255,255,.16)}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;}
    body{min-height:100svh;background:linear-gradient(180deg,#050505,#15100a 52%,#050505);padding:18px 14px calc(26px + env(safe-area-inset-bottom));}
    .wrap{max-width:920px;margin:0 auto;text-align:center;}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;}
    .title{text-align:left;min-width:0}.title strong{display:block;font-size:20px;letter-spacing:.08em;color:var(--gold)}.title span{display:block;margin-top:4px;font-size:13px;color:var(--muted)}
    .home{flex:0 0 auto;text-decoration:none;color:#20160a;background:linear-gradient(135deg,var(--gold),var(--gold2));font-weight:900;border-radius:999px;padding:11px 15px;font-size:14px;box-shadow:0 8px 22px rgba(0,0,0,.25)}
    .video-card{padding:12px;border:1px solid rgba(240,213,138,.26);border-radius:22px;background:rgba(255,255,255,.07);box-shadow:0 18px 52px rgba(0,0,0,.42);}
    .video-wrap{position:relative;width:100%;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:16px;background:#000;}
    .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
    .note{color:var(--muted);font-size:14px;line-height:1.7;margin:18px 6px 0;}
    .actions{display:grid;gap:10px;margin:22px auto 0;max-width:520px;}
    .btn{display:block;text-decoration:none;color:var(--text);border:1px solid var(--line);background:rgba(255,255,255,.11);border-radius:16px;padding:15px 16px;font-weight:900;-webkit-tap-highlight-color:transparent;}
    .btn.primary{color:#20160a;background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:transparent;}
    .btn:active{transform:scale(.985)}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div class="title"><strong>節目導覽影片</strong><span>夏至狂響曲</span></div>
      <a class="home" href="index.html?v=12">回主頁</a>
    </div>

    <section class="video-card" aria-label="YouTube 導覽影片">
      <div class="video-wrap">
        <iframe
          src="https://www.youtube.com/embed/pCR04zNOtsU"
          title="節目導覽影片"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>
    </section>

    <p class="note">影片若無法播放，可點下方按鈕直接用 YouTube 開啟。</p>
    <div class="actions">
      <a class="btn primary" href="https://youtu.be/pCR04zNOtsU" target="_blank" rel="noopener">用 YouTube 開啟影片</a>
      <a class="btn" href="program.html?v=12">前往節目單</a>
      <a class="btn" href="index.html?v=12">回主頁</a>
    </div>
  </main>
</body>
</html>
